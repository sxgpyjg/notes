<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记目录</title>
<script src="./data.js"></script>
<style>
*{
  margin:0;padding:0;box-sizing:border-box;
  font-family:system-ui,-apple-system,sans-serif;
}
body{
  background:#fff;
  padding:0 4px;
  max-width:1280px;
  margin:0 auto;
}
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 6px;
  border-bottom:1px solid #e4e7f3;
}
h1#secretTrigger{
  font-size:17px;font-weight:600;color:#1d2133;
  cursor:pointer;
  -webkit-user-select:none;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
#fullPageBtn{
  width:40px;height:40px;border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;
}
#fullPageBtn svg{width:22px;height:22px;}
#fullPageBtn path{fill:none;stroke:#9ca3af;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.note-card{
  display:flex;gap:14px;
  padding:12px;
  border-radius:16px;
  cursor:pointer;
  align-items:flex-start;
}
.note-card:active{background:#f7f8fc;}

.card-img-box{
  width:100px;height:75px;
  border-radius:7px;overflow:hidden;
  flex-shrink:0;background:#f2f5fc;
}
.card-img-box img{width:100%;height:100%;object-fit:cover;}

.card-body{
  flex:1;min-width:0;
  display:flex;flex-direction:column;gap:4px;
}

/* ✅ 标题行 */
.title-row{
  display:flex;align-items:center;gap:6px;
}
.title{
  font-size:15px;font-weight:600;color:#111827;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.code-badge{
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  font-size:11px;
  background:#eef2ff;color:#6366F1;
  padding:1px 5px;border-radius:4px;
  flex-shrink:0;
}

.tag{
  font-size:10px;padding:2px 7px;border-radius:99px;flex-shrink:0;
}
.tag-note{background:#e8eaff;color:#3950cc;}
.tag-doc{background:#e6f8ee;color:#148246;}
.tag-custom{background:#fff0e6;color:#b8460c;}

.date{font-size:10px;color:#6b7280;}

/* ✅ 摘要 */
.summary{
  font-size:13px;color:#6b7280;line-height:1.35;
  max-height:calc(1.35em * 3);
  overflow:hidden;position:relative;
}
/* 表格保留原样 */
.summary table{
  display:block;max-width:100%;overflow-x:auto;
  border-collapse:collapse;font-size:12px;margin:4px 0;
}
.summary table th,.summary table td{
  border:1px solid #ddd;padding:3px 6px;white-space:nowrap;
}
/* 代码块不显示 */
.summary pre,.summary code{display:none!important;}

.filter-collapse{border:1px solid #dbeafe;border-radius:12px;margin:0 2px 12px;overflow:hidden;}
.filter-header{padding:10px 16px;background:#eff6ff;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:500;font-size:15px;}
.filter-body{padding:12px;display:none;background:#fff;}
.filter-body.show{display:block;}
.arrow{transition:transform .24s;}
.arrow.rotate{transform:rotate(180deg);}
.filter-btn{padding:6px 11px;border:none;border-radius:8px;margin:4px;background:#e0e7ff;color:#334155;font-size:13px;}
.filter-btn.active{background:#6366F1;color:#fff;}
</style>
</head>
<body>

<header>
  <h1 id="secretTrigger">笔记目录</h1>
  <button id="fullPageBtn">
    <svg viewBox="0 0 24 24" id="fullSvg">
      <path d="M10 7 H7 V10"/>
      <path d="M14 7 H17 V10"/>
      <path d="M14 17 H17 V14"/>
      <path d="M10 17 H7 V14"/>
    </svg>
  </button>
</header>

<div class="filter-collapse">
  <div class="filter-header" onclick="toggleFilterPanel()">
    <span>笔记分类筛选</span>
    <span class="arrow" id="filterArrow">▼</span>
  </div>
  <div class="filter-body" id="filterBody"></div>
</div>

<div class="note-list" id="noteWrap"></div>

<script>
const wrap=document.getElementById('noteWrap');
const dataList=window.NOTE_DATA||[];
let currentFilter='';
const trigger=document.getElementById('secretTrigger');

/* ========== 全屏 ========== */
document.getElementById('fullPageBtn').addEventListener('click',()=>{
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
    document.getElementById('fullSvg').innerHTML=`
      <path d="M7 10 H10 V7"/>
      <path d="M17 10 H14 V7"/>
      <path d="M17 14 H14 V17"/>
      <path d="M7 14 H10 V17"/>`;
  }else{
    document.exitFullscreen();
    document.getElementById('fullSvg').innerHTML=`
      <path d="M10 7 H7 V10"/>
      <path d="M14 7 H17 V10"/>
      <path d="M14 17 H17 V14"/>
      <path d="M10 17 H7 V14"/>`;
  }
});

/* ========== 长按 → 编辑页 ========== */
let lpTimer=null,isLP=false;
trigger.addEventListener('contextmenu',e=>e.preventDefault());
trigger.addEventListener('mousedown',()=>{
  isLP=false;
  lpTimer=setTimeout(()=>{isLP=true;location.href='edit.html'},2000);
});
trigger.addEventListener('mouseup',()=>clearTimeout(lpTimer));
trigger.addEventListener('mouseleave',()=>clearTimeout(lpTimer));
trigger.addEventListener('touchstart',()=>{
  isLP=false;
  lpTimer=setTimeout(()=>{isLP=true;location.href='edit.html'},2000);
});
trigger.addEventListener('touchend',()=>clearTimeout(lpTimer));
trigger.addEventListener('touchmove',()=>clearTimeout(lpTimer));

/* ========== 5击 → 管理页（输密码） ========== */
trigger.addEventListener('click',()=>{
  if(isLP) return;
  let c=Number(sessionStorage.getItem('cc')||0)+1;
  sessionStorage.setItem('cc',c);
  if(c>=5){
    sessionStorage.removeItem('cc');
    if(localStorage.getItem('admin_save_pwd')==='admin123'){
      location.href='admin-list.html';
    }else{
      const p=prompt('请输入管理员密码：');
      if(p==='admin123'){
        localStorage.setItem('admin_save_pwd',p);
        location.href='admin-list.html';
      }else if(p!==null){
        alert('密码错误');
      }
    }
  }
  setTimeout(()=>sessionStorage.removeItem('cc'),2000);
});

/* ========== 工具 ========== */
function getFirstImg(h){
  const m=h.match(/<img[^>]+src=['"]([^'"]+)['"][^>]*>/);
  return m?m[1]:'';
}
function stripPreview(h){
  if(!h) return '';
  h=h.replace(/```[\s\S]*?```/g,'').replace(/`[^`]+`/g,'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
  return h;
}

/* ========== 筛选 ========== */
function renderFilter(){
  const s=new Set(dataList.filter(i=>i.type).map(i=>i.type));
  let h='<button class="filter-btn active" onclick="setFilter(\'\')">全部</button>';
  s.forEach(t=>h+=`<button class="filter-btn" onclick="setFilter('${t}')">${t}</button>`);
  document.getElementById('filterBody').innerHTML=h;
}
function setFilter(t){
  currentFilter=t;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  renderNotes();
}
function toggleFilterPanel(){
  const b=document.getElementById('filterBody'),a=document.getElementById('filterArrow');
  b.classList.toggle('show');a.classList.toggle('rotate');
}

/* ========== 渲染 ========== */
function renderNotes(){
  let l=[...dataList];
  if(currentFilter) l=l.filter(i=>i.type===currentFilter);
  l.sort((a,b)=>new Date(b.date.replace(' ','T'))-new Date(a.date.replace(' ','T')));
  if(!l.length){wrap.innerHTML='<div style="padding:60px;text-align:center;color:#888;">暂无笔记</div>';return;}
  wrap.innerHTML=l.map(item=>{
    const hasCode=/```/.test(item.content);
    const img=item.cover||getFirstImg(item.content);
    const prev=stripPreview(item.content);
    let tc='tag-custom',tt=item.type;
    if(item.type==='note'){tc='tag-note';tt='开发笔记';}
    if(item.type==='doc'){tc='tag-doc';tt='实操教程';}
    return `
    <div class="note-card" onclick="openRead('${item.id}')">
      ${img?`<div class="card-img-box"><img src="${img}"></div>`:''}
      <div class="card-body">
        <div class="title-row">
          <div class="title">${item.title}</div>
          ${hasCode?`<span class="code-badge">&lt;/&gt;</span>`:''}
        </div>
        <div class="summary">${prev}</div>
        <div class="date">${item.date}</div>
        <span class="tag ${tc}">${tt}</span>
      </div>
    </div>`;
  }).join('');
}

function openRead(id){
  localStorage.setItem('readNoteId',id);
  location.href='read.html';
}

renderFilter();
renderNotes();
</script>
</body>
</html>
