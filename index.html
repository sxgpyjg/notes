<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记目录</title>
<!-- 统一和管理页、编辑器一致的线上路径 /notes/data.js -->
<script src="/notes/data.js"></script>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}
body{
  background: #ffffff;
  padding: 0 4px;
  max-width: 1280px;
  margin: 0 auto;
}
header{
  margin-bottom: 12px;
  padding: 8px 6px;
  border-bottom: 1px solid #e4e7f3;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
h1{
  font-size: 20px;
  color: #1d2133;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  letter-spacing: 1px;
  -webkit-user-select: none;
}
#fullPageBtn{
width:48px;height:48px;
border:none;background:transparent;
display:flex;align-items:center;justify-content:center;
-webkit-tap-highlight-color:transparent;
transition:all 0.12s;
padding:0;
}
#fullPageBtn:active{transform:scale(0.92);}
#fullPageBtn svg{
  width:26px;height:26px;
}
#fullPageBtn path{
  fill:none;
  stroke:#9ca3af;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.empty-tip{
  text-align: center;
  padding: 80px 4px;
  color: #888;
  font-size: 16px;
}
.note-list{
  display: flex;
  flex-direction: column;
  gap: 0;
}
.note-card{
  background: #fff;
  padding: 12px;
  cursor: pointer;
  display: flex;
  gap: 14px;
  border-radius: 16px;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
}

.note-card:active{
  background: #f7f8fc;
}
.card-img-box{
  width: 100px;
  height: 75px;
  flex-shrink: 0;
  border-radius: 7px;
  overflow: hidden;
  background: #f2f5fc;
}
.card-img-box img{
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-right-wrap{
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 3px 0;
}

.card-head{
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.card-title{
  font-size: 15px;
  font-weight: 600;
  color: #111827;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tag{
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 99px;
  flex-shrink: 0;
  max-width: 80px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tag-note{
  background: #e8eaff;
  color: #3950cc;
}
.tag-doc{
  background: #e6f8ee;
  color: #148246;
}
.tag-custom{
  background: #fff0e6;
  color: #b8460c;
}

.card-date{
  font-size: 10px;
  color: #6b7280;
  margin-top: -2px;
}

.card-preview{
  font-size: 13px;
  color: #6b7280;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.filter-collapse{
  border:1px solid #dbeafe;
  border-radius:12px;
  margin:0 2px 16px;
  overflow:hidden;
}
.filter-header{
  padding:12px 16px;
  background:#eff6ff;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:500;
  font-size:15px;
}
.filter-body{
  padding:12px;
  display:none;
  background:#fff;
}
.filter-body.show{
  display:block;
}
.arrow{
  transition:transform 0.24s ease;
  font-size:14px;
}
.arrow.rotate{
  transform:rotate(180deg);
}
.filter-btn{
  padding:6px 11px;
  border:none;
  border-radius:8px;
  margin:4px;
  background:#e0e7ff;
  color:#334155;
  font-size:13px;
  transition:0.2s;
}
.filter-btn.active{
  background:#6366F1;
  color:#fff;
}
.filter-btn:active{
  opacity:0.85;
}
</style>
</head>
<body>
<header>
  <h1 id="secretTrigger">笔记目录</h1>
  <button id="fullPageBtn">
    <svg viewBox="0 0 24 24" id="fullSvg">
      <path d="M10 7 H7 V10"/>
      <path d="M14 7 H17 V10"/>
      <path d="M14 17 H17 V14"/>
      <path d="M10 17 H7 V14"/>
    </svg>
  </button>
</header>

<div class="filter-collapse">
  <div class="filter-header" onclick="toggleFilterPanel()">
    <span>笔记分类筛选</span>
    <span class="arrow" id="filterArrow">▼</span>
  </div>
  <div class="filter-body" id="filterBody">
    <button class="filter-btn active" onclick="filterByType('')">全部</button>
  </div>
</div>

<div class="note-list" id="noteWrap"></div>

<script>
const wrap = document.getElementById('noteWrap');
const trigger = document.getElementById('secretTrigger');
const fullBtn = document.getElementById('fullPageBtn');
const fullSvg = document.getElementById('fullSvg');
let currentFilter = "";
let allTypes = new Set();
const ADMIN_PWD = "admin123";
const LONG_PRESS_TIME = 400;
const MOVE_THRESHOLD = 8;

// 统一存储键（和管理页/编辑器完全一致）
const PWD_STORE_KEY = "admin_save_pwd";
const LOCAL_NOTE_KEY = "notes";
let dataList = [];

// 1. 数据加载函数：线上data.js优先，兜底本地缓存
function loadNoteData(){
  // 优先线上全局变量
  if(window.NOTE_DATA && Array.isArray(window.NOTE_DATA)){
    dataList = JSON.parse(JSON.stringify(window.NOTE_DATA));
    // 同步到本地存储，断网可用
    localStorage.setItem(LOCAL_NOTE_KEY, JSON.stringify(dataList));
  }else{
    // 线上加载失败，读取本地缓存
    const localRaw = localStorage.getItem(LOCAL_NOTE_KEY);
    try{
      dataList = localRaw ? JSON.parse(localRaw) : [];
    }catch(e){
      dataList = [];
    }
  }
  // 过滤编辑器临时草稿，首页不显示未保存草稿
  dataList = dataList.filter(item => !item._isTempNew);
}

// 等待页面全部资源加载完毕再渲染（修复执行时机提前空白）
window.addEventListener('load', ()=>{
  loadNoteData();
  bindTitleLongPress();
  renderFilter();
  renderNotes();
});

// 全屏切换逻辑
fullBtn.addEventListener('click',()=>{
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
    fullSvg.innerHTML = `
      <path d="M7 10 H10 V7"/>
      <path d="M17 10 H14 V7"/>
      <path d="M17 14 H14 V17"/>
      <path d="M7 14 H10 V17"/>
    `;
  }else{
    document.exitFullscreen();
    fullSvg.innerHTML = `
      <path d="M10 7 H7 V10"/>
      <path d="M14 7 H17 V10"/>
      <path d="M14 17 H17 V14"/>
      <path d="M10 17 H7 V14"/>
    `;
  }
})

// 统一密码校验函数（和后台页面逻辑对齐）
function verifyAdminPwd(cb){
  const savedPwd = localStorage.getItem(PWD_STORE_KEY);
  if(savedPwd === ADMIN_PWD){
    cb();
    return;
  }
  const inputPwd = prompt("请输入管理员密码：");
  if(inputPwd === ADMIN_PWD){
    localStorage.setItem(PWD_STORE_KEY, inputPwd);
    cb();
  }else if(inputPwd !== null){
    alert("密码错误，无权限进入后台");
  }
}

// 标题长按进入编辑器
function bindTitleLongPress(){
  let pressTimer = null;
  let isLongPress = false;
  let startX = 0, startY = 0;
  let isScroll = false;

  const start = (e)=>{
    isLongPress = false;
    isScroll = false;
    const touch = e.touches[0];
    startX = touch.clientX;
    startY = touch.clientY;
    pressTimer = setTimeout(()=>{
      isLongPress = true;
      verifyAdminPwd(()=>location.href = "edit.html");
    }, LONG_PRESS_TIME);
  };
  const move = (e)=>{
    const touch = e.touches[0];
    const dx = Math.abs(touch.clientX - startX);
    const dy = Math.abs(touch.clientY - startY);
    if(dx > MOVE_THRESHOLD || dy > MOVE_THRESHOLD){
      isScroll = true;
      clearTimeout(pressTimer);
    }
  };
  const end = ()=> clearTimeout(pressTimer);
  const cancel = ()=> clearTimeout(pressTimer);

  trigger.addEventListener('touchstart', start);
  trigger.addEventListener('touchmove', move);
  trigger.addEventListener('touchend', end);
  trigger.addEventListener('touchcancel', cancel);
  trigger.addEventListener('mousedown', start);
  trigger.addEventListener('mousemove', (e)=>{
    const dx = Math.abs(e.clientX - startX);
    const dy = Math.abs(e.clientY - startY);
    if(dx > MOVE_THRESHOLD || dy > MOVE_THRESHOLD){
      isScroll = true;
      clearTimeout(pressTimer);
    }
  });
  trigger.addEventListener('mouseup', end);
  trigger.addEventListener('mouseleave', cancel);
}

function toggleFilterPanel(){
  const body = document.getElementById('filterBody');
  const arrow = document.getElementById('filterArrow');
  body.classList.toggle('show');
  arrow.classList.toggle('rotate');
}

// 提取正文第一张图片
function getFirstImgFromHtml(html){
  const reg = /<img[^>]+src=['"]([^'"]+)['"][^>]*>/;
  const match = html.match(reg);
  return match ? match[1] : '';
}

// 纯文字预览（去除代码块、图片）
function getPureTextPreview(rawContent){
  let text = rawContent.replace(/```[\s\S]*?```/g,"");
  text = text.replace(/<img[^>]*>/g,"");
  return text;
}

// 渲染分类筛选按钮
function renderFilter(){
  allTypes.clear();
  dataList.forEach(item=>{
    if(item.type) allTypes.add(item.type);
  })
  const filterBody = document.getElementById('filterBody');
  let html = `<button class="filter-btn ${currentFilter===''?'active':''}" onclick="filterByType('')">全部</button>`;
  allTypes.forEach(t=>{
    html += `<button class="filter-btn ${currentFilter===t?'active':''}" onclick="filterByType('${t}')">${t}</button>`;
  })
  filterBody.innerHTML = html;
}

// 切换分类筛选
function filterByType(type){
  currentFilter = type;
  renderFilter();
  renderNotes();
}

// 打开阅读页
function openRead(noteId){
  localStorage.setItem('readNoteId', noteId);
  location.href = "read.html";
}

// 长按卡片进入管理列表
function openAdminPage(){
  verifyAdminPwd(()=>location.href = "admin-list.html");
}

// 渲染笔记卡片列表
function renderNotes(){
  let list = [...dataList];
  if(currentFilter) list = list.filter(item=>item.type === currentFilter);
  // 按创建时间倒序，最新在前
  const sorted = list.sort((a,b)=>new Date(b.date.replace(" ","T")) - new Date(a.date.replace(" ","T")));
  if(sorted.length === 0){
    wrap.innerHTML = `<div class="empty-tip">暂无笔记，长按顶部标题新建</div>`;
    return;
  }
  let html = '';
  sorted.forEach((item)=>{
    let tagClass = 'tag-custom';
    let tagText = item.type;
    if(item.type === 'note'){
      tagClass = 'tag-note';
      tagText = '开发笔记';
    }
    if(item.type === 'doc'){
      tagClass = 'tag-doc';
      tagText = '实操教程';
    }
    
    const previewHtml = getPureTextPreview(item.content);
    
    let leftImgSrc = '';
    if(item.cover){
      leftImgSrc = item.cover;
    }else{
      leftImgSrc = getFirstImgFromHtml(item.content);
    }
    let imgBoxHtml = '';
    if(leftImgSrc){
      imgBoxHtml = `<div class="card-img-box"><img src="${leftImgSrc}" alt=""></div>`;
    }

    html += `
    <div class="note-card" data-id="${item.id}">
      ${imgBoxHtml}
      <div class="card-right-wrap">
        <div class="card-head">
          <div class="card-title">${item.title}</div>
          <span class="tag ${tagClass}">${tagText}</span>
        </div>
        <div class="card-date">发布时间：${item.date}</div>
        <div class="card-preview">${previewHtml}</div>
      </div>
    </div>
    `;
  })
  wrap.innerHTML = html;

  // 卡片长按/点击逻辑
  const cards = document.querySelectorAll('.note-card');
  cards.forEach(card=>{
    let pressTimer = null;
    let isLongPress = false;
    let startX = 0, startY = 0;
    let isScroll = false;
    const noteId = card.dataset.id;

    const startPress = (e)=>{
      isLongPress = false;
      isScroll = false;
      const touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      pressTimer = setTimeout(()=>{
        isLongPress = true;
        openAdminPage();
      }, LONG_PRESS_TIME);
    };
    const movePress = (e)=>{
      const touch = e.touches[0];
      const dx = Math.abs(touch.clientX - startX);
      const dy = Math.abs(touch.clientY - startY);
      if(dx > MOVE_THRESHOLD || dy > MOVE_THRESHOLD){
        isScroll = true;
        clearTimeout(pressTimer);
      }
    };
    const endPress = ()=>{
      clearTimeout(pressTimer);
      if(!isScroll && !isLongPress){
        openRead(noteId);
      }
    };
    const cancelPress = ()=> clearTimeout(pressTimer);

    card.addEventListener('touchstart', startPress);
    card.addEventListener('touchmove', movePress);
    card.addEventListener('touchend', endPress);
    card.addEventListener('touchcancel', cancelPress);
    card.addEventListener('mousedown', startPress);
    card.addEventListener('mousemove', (e)=>{
      const dx = Math.abs(e.clientX - startX);
      const dy = Math.abs(e.clientY - startY);
      if(dx > MOVE_THRESHOLD || dy > MOVE_THRESHOLD){
        isScroll = true;
        clearTimeout(pressTimer);
      }
    });
    card.addEventListener('mouseup', endPress);
    card.addEventListener('mouseleave', cancelPress);
  })
}
</script>
</body>
</html>
