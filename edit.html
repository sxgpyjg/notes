let list = [], targetNote = null;
const editId = new URLSearchParams(location.search).get("id");
let imgUploadList = [], currentEditMode = "rich";

let richRecordStack = [], richRecordIndex = -1;

//========== 工具函数 ==========
function getNowTimeStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function addImgSerial(){ globalImgSerial++; localStorage.setItem("img_serial",globalImgSerial); }

//========== 标签颜色 ==========
function getTagColor(t){
  const k=t.toLowerCase().trim();
  if(tagColorMap[k]) return tagColorMap[k];
  const idx=currentTags.findIndex(x=>x.toLowerCase()===k);
  return tagColorMap[k]=TAG_COLOR_PRESETS[idx%TAG_COLOR_PRESETS.length];
}
function setTagColor(t,c){
  const k=t.toLowerCase().trim();
  if(!c) return;
  tagColorMap[k]=c;
  renderTagsChips();
}
function pickTagColorAtIndex(idx){
  const t=currentTags[idx]; if(!t)return;
  const ci=document.createElement('input'); ci.type='color'; ci.value=getTagColor(t); ci.style.cssText='position:fixed;opacity:0;pointer-events:none;';
  document.body.appendChild(ci);
  ci.addEventListener('input',e=>setTagColor(t,e.target.value));
  ci.addEventListener('change',()=>{ document.body.removeChild(ci); });
  setTimeout(()=>ci.click(),50);
}
function renderTagsChips(){
  Array.from(tagsInputWrap.querySelectorAll('.tag-chip')).forEach(n=>n.remove());
  currentTags.forEach((t,i)=>{
    const c=getTagColor(t);
    let textColor = c;
    let bgColor = c + '22';
    if(c === '#000000' || c === '#000'){
      textColor = '#fff';
      bgColor = '#333333';
    }
    const chip=document.createElement('span');
    chip.className='tag-chip';
    chip.style.cssText=`background:${bgColor};border-left:3px solid ${c};color:${textColor};`;
    const dot=document.createElement('span');
    dot.style.cssText=`display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};margin-right:3px;cursor:pointer;flex-shrink:0;`;
    dot.title='点击换色';
    dot.addEventListener('click',e=>{ e.stopPropagation(); e.preventDefault(); pickTagColorAtIndex(i); });
    const txt=document.createElement('span'); txt.className='tag-chip-text'; txt.textContent=t;
    const rm=document.createElement('span'); rm.className='tag-chip-remove'; rm.style.cssText=`color:${textColor};background:${bgColor};`;
    rm.addEventListener('click',e=>{ e.stopPropagation(); removeTagAt(i); });
    chip.append(dot,txt,rm);
    tagsInputWrap.insertBefore(chip, tagChipInput);
  });
}
function addTag(r){
  let s=String(r||'').trim(); if(!s||s.length>20)return;
  if(currentTags.some(t=>t.toLowerCase()===s.toLowerCase())){ tagChipInput.value=''; return; }
  if(currentTags.length>=10){ alert('最多10个标签'); tagChipInput.value=''; return; }
  currentTags.push(s);
  tagColorMap[s.toLowerCase().trim()]=TAG_COLOR_PRESETS[(currentTags.length-1)%TAG_COLOR_PRESETS.length];
  renderTagsChips(); tagChipInput.value='';
}
function getCurrentTags(){ return currentTags.slice(); }
function removeTagAt(i){ if(i>=0&&i<currentTags.length){ currentTags.splice(i,1); renderTagsChips(); } }
function setCurrentTags(arr,m){
  if(!Array.isArray(arr))arr=[];
  tagColorMap={}; const seen=new Set(); currentTags=[];
  arr.forEach((t,i)=>{
    const s=String(t||'').trim(); if(!s)return;
    const k=s.toLowerCase(); if(seen.has(k))return; seen.add(k);
    currentTags.push(s); tagColorMap[k]=(m&&m[k])?m[k]:TAG_COLOR_PRESETS[i%TAG_COLOR_PRESETS.length];
  });
  renderTagsChips();
}
if(tagChipInput){
  tagsInputWrap.addEventListener('click',e=>{ if(e.target===tagsInputWrap) tagChipInput.focus(); });
  tagChipInput.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key===','){ e.preventDefault(); addTag(tagChipInput.value); }
    else if(e.key==='Backspace'&&!tagChipInput.value&&currentTags.length) removeTagAt(currentTags.length-1);
  });
  tagChipInput.addEventListener('paste',e=>{
    const txt=(e.clipboardData||window.clipboardData).getData('text');
    if(/[,\n，]/.test(txt)){ e.preventDefault(); txt.split(/[,\n，]/).forEach(p=>addTag(p)); }
  });
}

//========== 数据持久化 ==========
function saveLocalCache() { localStorage.setItem(CACHE_KEY,JSON.stringify({list,targetId:targetNote?.id,imgUploadList,serial:globalImgSerial})); }
function loadLocalCache() {
  let raw = null;
  try { raw = localStorage.getItem("notes"); } catch(e) { console.warn("读取 localStorage 失败",e); }
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) {
        list = parsed;
        list.forEach(item => { if (!Array.isArray(item.tags) && item.type) item.tags = [item.type]; });
        console.log("✅ loadLocalCache: 从 localStorage 加载了",list.length,"条笔记");
      } else { throw new Error("localStorage 数据为空或无效"); }
    } catch(e) { console.warn("回退到 window.NOTE_DATA",e); fallbackToWindowData(); }
  } else { console.warn("localStorage 无数据，回退到 window.NOTE_DATA"); fallbackToWindowData(); }
  if (!list || !Array.isArray(list)) { console.error("list 初始化失败，强制设为空数组"); list = []; }
  console.log("✅ 最终 list 长度:",list.length);
}
function fallbackToWindowData() {
  if (window.NOTE_DATA && Array.isArray(window.NOTE_DATA)) { list = JSON.parse(JSON.stringify(window.NOTE_DATA)); console.log("✅ 从 window.NOTE_DATA 加载了",list.length,"条笔记"); }
  else { list = []; console.warn("window.NOTE_DATA 也不存在，list 为空"); }
}

function checkPwd(){
  const pwd=document.getElementById("pwdInput").value.trim();
  if(pwd!==ADMIN_PASSWORD){ alert("密码错误"); return; }
  localStorage.setItem("admin_save_pwd",pwd);

      title: "",

      tags: [],
      tagColors: {},
      content: "",

      private: false,
      carousel: false,
      _isTempNew: true
    };
    console.log("新建笔记模式，ID:", targetNote.id, "(临时对象，未入 list)");
  } else {
    const t = list.find(i => i.id === Number(editId));
    if(!t) {
      alert("笔记不存在");

      return;
    }
    targetNote = t;
  }

  titleInput.value = targetNote.title;
  let tags = Array.isArray(targetNote.tags) ? targetNote.tags.slice() : [];

  richBox.innerHTML = targetNote.content || "";

  richRecordIndex = 0;

  mdBox.value = htmlToMd(targetNote.content || "").replace(/\n{3,}/g, "\n\n");
  saveMdRecord();
  renderMdPreview();
  checkFormatActive();
  calcWordCount();

// ========== 同步表单数据到目标笔记对象 ==========
function syncFormToNoteList() {
  if (!targetNote) return;

  targetNote.title = titleInput.value;
  targetNote.tags = getCurrentTags();
  targetNote.tagColors = { ...tagColorMap };
  targetNote.private = document.getElementById("privateCheck").checked;
  targetNote.carousel = isCarouselOn;

  if (currentEditMode === 'rich') {
    targetNote.content = richBox.innerHTML;
  } else {
    targetNote.content = mdToHtml(mdBox.value);
  }

  targetNote.date = getNowTimeStr();

  if (targetNote._isTempNew) {
    delete targetNote._isTempNew;
    list.unshift(targetNote);
    console.log("✅ 新建笔记已入 list:", targetNote.id);
  }
}

//========== 转换（升级：方案 B + C） ==========
function mdToHtml(s){
  s = s.replace(/::slide\n([\s\S]*?)\n::end/g, (_, inner) => {
    const items = [];
    inner.split(/\n(?=!\[)/).forEach(chunk => {
      const m = chunk.match(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)/);
      if (!m) return;
      const introMatch = chunk.match(/::intro\s+(.+)/);
      items.push({
        alt: m[1] || '',
        url: m[2],
        intro: introMatch ? introMatch[1].trim() : ''
      });
    });
    if (!items.length) return '';
    const slides = items.map(it =>
      `<div class="slide"><img src="${it.url}" alt="${escapeHtml(it.alt)}" loading="lazy">${it.intro ? `<div class="intro"><b>${escapeHtml(it.alt||'图')}</b>${escapeHtml(it.intro)}</div>` : ''}</div>`
    ).join('');
    const dots = items.map((_, i) => `<button class="dot ${i===0?'active':''}" data-idx="${i}" aria-label="第${i+1}张"></button>`).join('');
    return `<div class="carousel-render" data-idx="0">` +
           `<div class="counter" style="display:${items.length>1?'block':'none'}">1 / ${items.length}</div>` +
           `<div class="track">${slides}</div>` +
           (items.length>1 ? `<button class="arrow prev" aria-label="上一张">‹</button><button class="arrow next" aria-label="下一张">›</button>` : '') +
           (items.length>1 ? `<div class="dots">${dots}</div>` : '') +
           `</div>`;
  });

  let html=s.replace(/```([\s\S]*?)```/g,'<pre style="background:#f5f5f5;padding:8px;border-radius:6px;white-space:pre-wrap;"><code>$1</code></pre>');
  html=html.replace(/(^|\n)(\|.+\|\n)((?:\|[-:| ]+\|)(?:\n|$))+(\|.+\|)/g,(_,pre,hRow,sep,cRow)=>{
    const rows=(hRow+sep+cRow).split('\n').filter(r=>r.trim());
    let table='<table style="width:100%;border-collapse:collapse;margin:6px 0;"><tr>';
    rows[0].split('|').filter(s=>s.trim()).forEach(t=>table+=`<th style="border:1px solid #999;padding:4px 6px;">${t.trim()}</th>`);
    table+='</tr>';
    for(let i=1;i<rows.length;i++){
      table+='<tr>';
      rows[i].split('|').filter(s=>s.trim()).forEach(t=>table+=`<td style="border:1px solid #999;padding:4px 6px;">${t.trim()}</td>`);
      table+='</tr>';
    }
    return pre+table+'</table>';
  });
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>').replace(/^\- (.+)$/gm,'<li>$1</li>')
    .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;margin:6px 0;display:block;">');
  return html.replace(/\n/g,'<br>');
}

function htmlToMd(s){
  s = s.replace(/<div class="carousel-render"[^>]*>([\s\S]*?)<\/div>/g, (_, inner) => {
    const mdLines = [];
    const slideMatches = inner.match(/<div class="slide">([\s\S]*?)<\/div>/g) || [];
    slideMatches.forEach(blk => {
      const imgMatch = blk.match(/<img[^>]*src="([^"]+)"[^>]*alt="([^"]*)"/);
      if (!imgMatch) return;
      const [, url, alt] = imgMatch;
      mdLines.push(`![${alt || ''}](${url})`);
      const introM = blk.match(/<div class="intro"[^>]*>(?:<b>[^<]*<\/b>)?([\s\S]*?)<\/div>/);
      if (introM && introM[1].trim()) mdLines.push(`::intro ${introM[1].trim()}`);
    });
    if (!mdLines.length) return '';
    return `\n::slide\n${mdLines.join('\n')}\n::end\n`;
  });

  let md=s.replace(/<pre[^>]*><code>([\s\S]*?)<\/code><\/pre>/g,'```\n$1\n```')
    .replace(/<h1>(.*?)<\/h1>/g,'# $1').replace(/<h2>(.*?)<\/h2>/g,'## $1').replace(/<h3>(.*?)<\/h3>/g,'### $1')
    .replace(/<strong>(.*?)<\/strong>/g,'**$1**').replace(/<em>(.*?)<\/em>/g,'*$1*').replace(/<s>(.*?)<\/s>/g,'~~$1~~')
    .replace(/<li>(.*?)<\/li>/g,'- $1').replace(/<br>/g,'\n');
  md=md.replace(/<(?!p style="text-align:center"|u|table|tr|th|td)[^>]+>/g,'');
  return md.replace(/<img[^>]*src="([^"]+)"[^>]*alt="([^"]*)"[^>]*>/g,'![$2]($1)');
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderMdPreview(){
  const html = mdToHtml(mdBox.value);
  mdPreviewBox.innerHTML = html;
  if (typeof initAllCarousels === 'function') initAllCarousels(mdPreviewBox);
}

function initAllCarousels(scope){
  (scope||document).querySelectorAll('.carousel-render').forEach(el => initOneCarousel(el));
}

function initOneCarousel(el){
  if (el.__inited) return;
  el.__inited = true;
  const track = el.querySelector('.track');
  const slides = el.querySelectorAll('.slide');
  const dots = el.querySelectorAll('.dot');
  const prev = el.querySelector('.arrow.prev');
  const next = el.querySelector('.arrow.next');
  const counter = el.querySelector('.counter');
  const total = slides.length;
  if (total <= 1) return;

  let idx = 0;
  let autoplay = null;
  const INTERVAL = 4500;

  function show(i){
    idx = (i + total) % total;
    track.style.transform = `translateX(-${idx*100}%)`;
    dots.forEach((d,j)=>d.classList.toggle('active', j===idx));
    if (counter) counter.textContent = `${idx+1} / ${total}`;
  }
  function start(){ stop(); autoplay = setInterval(()=> show(idx+1), INTERVAL); }
  function stop(){ if (autoplay){ clearInterval(autoplay); autoplay=null; } }

  prev && (prev.onclick = ()=>{ show(idx-1); start(); });
  next && (next.onclick = ()=>{ show(idx+1); start(); });
  dots.forEach(d => d.onclick = ()=>{ show(+d.dataset.idx); start(); });
  el.addEventListener('mouseenter', stop);
  el.addEventListener('mouseleave', start);
  el.addEventListener('click', e => {
    if (e.target.closest('.arrow')||e.target.closest('.dot')) return;
    show(idx+1); start();
  });

  let sx=0, dx=0, dragging=false;
  el.addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; dragging=true; stop(); }, {passive:true});
  el.addEventListener('touchmove',  e=>{ if(!dragging) return; dx=e.touches[0].clientX - sx; }, {passive:true});
  el.addEventListener('touchend',   ()=>{
    if (!dragging) return;
    dragging = false;
    if (Math.abs(dx) > 50) show(idx + (dx<0?1:-1));
    dx = 0;
    start();
  });

  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const img = e.target.querySelector('img');
          if (img && img.dataset.src) { img.src = img.dataset.src; delete img.dataset.src; }
        }
      });
    }, { root: el, threshold: 0.5 });
    slides.forEach(s => io.observe(s));
  }

  start();
}

//========== 撤销重做 ==========
function saveMdRecord(){ mdRecordStack.splice(mdRecordIndex+1); mdRecordStack.push(mdBox.value); mdRecordIndex=mdRecordStack.length-1; }
function mdUndo(){ if(mdRecordIndex<=0)return; mdRecordIndex--; mdBox.value=mdRecordStack[mdRecordIndex]; renderMdPreview(); calcWordCount(); }
function mdRedo(){ if(mdRecordIndex>=mdRecordStack.length-1)return; mdRecordIndex++; mdBox.value=mdRecordStack[mdRecordIndex]; renderMdPreview(); calcWordCount(); }
function globalUndo(){
  if(currentEditMode==='rich'){
    if(richRecordIndex<=0)return alert("已到最早");
    richRecordIndex--; richBox.innerHTML=richRecordStack[richRecordIndex]; checkFormatActive(); calcWordCount();
  } else mdUndo();
}
function globalRedo(){
  if(currentEditMode==='rich'){
    if(richRecordIndex>=richRecordStack.length-1)return alert("无后续");
    richRecordIndex++; richBox.innerHTML=richRecordStack[richRecordIndex]; checkFormatActive(); calcWordCount();
  } else mdRedo();
}
let mdRenderTimer = null;
richBox.addEventListener('input',()=>{
  richRecordStack.splice(richRecordIndex+1);
  richRecordStack.push(richBox.innerHTML);
  if(richRecordStack.length>RICH_RECORD_MAX) richRecordStack.shift();
  richRecordIndex=richRecordStack.length-1;
  checkFormatActive();
  if (mdRenderTimer) clearTimeout(mdRenderTimer);
  mdRenderTimer = setTimeout(()=>{ calcWordCount(); if(typeof initAllCarousels==='function') initAllCarousels(richBox); }, 250);
});
mdBox.addEventListener('input',()=>{
  saveMdRecord();
  if (mdRenderTimer) clearTimeout(mdRenderTimer);
  mdRenderTimer = setTimeout(()=>{ renderMdPreview(); calcWordCount(); }, 250);
});

function checkFormatActive(){
  document.querySelectorAll('.icon-btn').forEach(b=>b.classList.remove('active-format'));
  if(currentEditMode!=='rich')return;
  if(document.queryCommandState('bold')) document.querySelector('[onclick="formatBold()"]')?.classList.add('active-format');
  if(document.queryCommandState('italic')) document.querySelector('[onclick="formatItalic()"]')?.classList.add('active-format');
  if(document.queryCommandState('underline')) document.querySelector('[onclick="insertUnderline()"]')?.classList.add('active-format');
  if(document.queryCommandState('strikeThrough')) document.querySelector('[onclick="formatStrikeThrough()"]')?.classList.add('active-format');
  const sel=window.getSelection(); if(!sel.rangeCount)return;
  let el=sel.getRangeAt(0).commonAncestorContainer;
  while(el.nodeType===1){
    if(el.tagName==='H1'){ document.querySelector('[onclick="insertH1()"]')?.classList.add('active-format'); break; }
    if(el.tagName==='H2'){ document.querySelector('[onclick="insertH2()"]')?.classList.add('active-format'); break; }
    if(el.tagName==='H3'){ document.querySelector('[onclick="insertH3()"]')?.classList.add('active-format'); break; }
    el=el.parentNode; if(el===richBox)break;
  }
}
document.addEventListener('selectionchange',checkFormatActive);

function calcWordCount(){
  const t=currentEditMode==='rich'?(richBox.innerText||''):mdBox.value;
  wordCountTip.innerText=`纯文字数：${t.replace(/\s/g,'').length} | 总字符：${t.length}`;
}

//========== 格式化插入 ==========
function setCaretInMd(tpl){
  const len=mdBox.value.length; mdBox.value+=tpl; saveMdRecord(); renderMdPreview(); calcWordCount();
  mdBox.selectionStart=mdBox.selectionEnd=len+Math.floor(tpl.length/2); mdBox.focus();
}
function formatBold(){ if(currentEditMode==='rich'){ richBox.focus(); document.execCommand('bold'); checkFormatActive(); calcWordCount(); } else setCaretInMd('****'); }
function formatItalic(){ if(currentEditMode==='rich'){ richBox.focus(); document.execCommand('italic'); setTimeout(checkFormatActive,20); calcWordCount(); } else setCaretInMd('**'); }
function formatStrikeThrough(){ if(currentEditMode==='rich'){ richBox.focus(); document.execCommand('strikeThrough'); checkFormatActive(); calcWordCount(); } else setCaretInMd('~~~~'); }

function insertCenter(){
  if(currentEditMode==='rich'){
    richBox.focus();
    let b=window.getSelection().getRangeAt(0).commonAncestorContainer;
    while(b.nodeType!==1||!['P','H1','H2','H3','DIV'].includes(b.tagName)){ b=b.parentNode; if(!b||b===richBox)break; }
    if(b&&b.style.textAlign==='center'){ document.execCommand('justifyLeft'); b.style.textAlign=''; } else document.execCommand('justifyCenter');
    checkFormatActive(); calcWordCount();
  }else{ mdBox.value+='<p style="text-align:center"></p>'; saveMdRecord(); renderMdPreview(); calcWordCount(); }
}
['H1','H2','H3'].forEach(tag=>{
  const pre={H1:'# ',H2:'## ',H3:'### '}[tag];
  window['insert'+tag]=function(){
    if(currentEditMode==='rich'){
      richBox.focus();
      let el=window.getSelection().getRangeAt(0).commonAncestorContainer;
      while(el.nodeType===1){
        if(el.tagName===tag){ document.execCommand('formatBlock',false,'p'); break; }
        el=el.parentNode; if(el===richBox){ document.execCommand('formatBlock',false,tag.toLowerCase()); break; }
      }
      checkFormatActive(); calcWordCount();
    }else{ mdBox.value+=pre; saveMdRecord(); renderMdPreview(); calcWordCount(); }
  };
});

//========== 图片 / 轮播 核心 ==========
function itemToMd(item){
  let line = `![$${item.alt||''}]($${item.url})`;
  if (item.intro) line += `\n::intro ${item.intro}`;
  return line + '\n';
}

function updateCarouselStatusUI(){
  const on = isCarouselOn && carouselImageQueue.length > 0;
  finishCarouselBtn.style.display = on ? 'inline-flex' : 'none';
  carouselQueueCount.textContent = carouselImageQueue.length;
}

function insertImageToEditor(url, alt, intro){
  if (!url) return;
  const item = { url, alt: alt || '', intro: intro || '' };

  if (isCarouselOn) {
    carouselImageQueue.push(item);
    clearTimeout(carouselCloseTimer);
    updateCarouselStatusUI();

    carouselCloseTimer = setTimeout(()=> flushCarousel(), 2000);
  } else {
    processNormalImageInsert(itemToMd(item));
  }
}

function flushCarousel(){
  if (!carouselImageQueue.length) return;
  if (!isCarouselOn) {
    carouselImageQueue.forEach(it => processNormalImageInsert(itemToMd(it)));
    carouselImageQueue = [];
    updateCarouselStatusUI();
    return;
  }
  const slideBlock = `::slide\n${carouselImageQueue.map(itemToMd).join('')}::end\n`;

  if (currentEditMode === 'rich') {
    richBox.focus();
    document.execCommand('insertHTML', false, mdToHtml(slideBlock));
    richRecordStack.splice(richRecordIndex+1);
    richRecordStack.push(richBox.innerHTML);
    if(richRecordStack.length>RICH_RECORD_MAX) richRecordStack.shift();
    richRecordIndex=richRecordStack.length-1;
    setTimeout(()=>initAllCarousels(richBox), 50);
  } else {
    mdBox.value += slideBlock;
    saveMdRecord();
    renderMdPreview();
  }

  carouselImageQueue = [];
  updateCarouselStatusUI();
  calcWordCount();
}

function finishCarouselNow(){
  if (!carouselImageQueue.length) {
    alert('轮播队列为空，先插入几张图片');
    return;
  }
  clearTimeout(carouselCloseTimer);
  flushCarousel();
}

function processNormalImageInsert(mdLine) {
  if (currentEditMode === 'rich') {
    const htmlImg = mdToHtml(mdLine).replace(/<br\s*\/?>/gi, '');
    richBox.focus();
    document.execCommand('insertHTML', false, htmlImg + '<br>');
    richRecordStack.splice(richRecordIndex+1);
    richRecordStack.push(richBox.innerHTML);
    if(richRecordStack.length>RICH_RECORD_MAX) richRecordStack.shift();
    richRecordIndex=richRecordStack.length-1;
    setTimeout(()=>initAllCarousels(richBox), 50);
  } else {
    mdBox.value += mdLine + '\n';
    saveMdRecord();
    renderMdPreview();
  }
  calcWordCount();
}

function handleFileUpload(files){
  if(!files||!files.length)return;
  Array.from(files).forEach(file=>{
    const originalName = file.name;
    const safeName = originalName.replace(/[^\w\-\.\u4e00-\u9fa5]/g, '_');
    let realFilePath = file.path||'';
    if(!realFilePath){
      const fn = originalName.toLowerCase();
      if (/screenshot/i.test(fn)) realFilePath = `/storage/emulated/0/Pictures/Screenshots/${originalName}`;
      else if (/wx_|wechat/i.test(fn)) realFilePath = `/storage/emulated/0/tencent/MicroMsg/WeiXin/${originalName}`;
      else realFilePath = `/storage/emulated/0/Download/${originalName}`;
    } else {
      realFilePath = realFilePath.replace(/^\/storage\/emulated\/0\//i,'/storage/emulated/0/');
    }
    const userSetPath = prompt(`确认图片源路径：\n${safeName}`, realFilePath);
    const finalPath = (userSetPath&&userSetPath.trim()) ? userSetPath.trim() : realFilePath;
    const copyCmd = `cp "$${finalPath}" ~/storage/shared/notes/images/"$${safeName}"`;
    imgUploadList.push({ name:safeName, originalName, src:finalPath, copyCmd:copyCmd });
    insertLocalImgRecord(safeName);
    addImgSerial();
  });
}

    '</div>' +
    '<div class="net-img-actions">' +
      '<button id="cancelNetImg">取消</button>' +
      '<button id="confirmNetImg">确定插入</button>' +
    '</div>';
  mask.appendChild(box);
  document.body.appendChild(mask);

  const style = document.createElement('style');
  style.textContent = `
    .net-row { display:grid; grid-template-columns:1fr 90px 14px; gap:4px; align-items:center; }
    .net-row input { border:none; border-bottom:1px solid #ddd; padding:5px 0; font-size:13px; outline:none; background:transparent; }

    .net-row .net-del { background:transparent; border:none; color:#dc2626; cursor:pointer; font-size:14px; }
    #netImgList label { font-size:10px; color:#94a3b8; display:block; margin-bottom:1px; padding-left:2px; }
  `;
  document.head.appendChild(style);

  const listWrap = document.getElementById('netImgList');
  const confirmBtn = document.getElementById('confirmNetImg');
  const cancelBtn = document.getElementById('cancelNetImg');
  const addRowBtn = document.getElementById('netAddRowBtn');
  const carouselHint = document.getElementById('netCarouselHint');
  const readClipboardBtn = document.getElementById('netReadClipboard');

  carouselHint.style.display = isCarouselOn ? 'inline-block' : 'none';

  function buildRow(prefill){
    const row = document.createElement('div');
    row.className = 'net-row';
    row.style.gridTemplateColumns = '1fr 90px 14px';
    row.innerHTML =
      '<div><label>图片URL（https 开头）</label><input class="net-url" type="url" placeholder="https://..." autocomplete="off"></div>' +
      '<div><label>描述 (alt)</label><input class="net-alt" type="text" placeholder="说明" autocomplete="off"></div>' +
      '<button type="button" class="net-del" title="删除">×</button>';
    if (prefill){
      row.querySelector('.net-url').value = prefill.url || '';
      row.querySelector('.net-alt').value = prefill.alt || '';
    }
    row.querySelector('.net-del').onclick = ()=>{
      if (listWrap.children.length <= 1){ alert('至少保留 1 行'); return; }
      row.remove();
    };
    const inputs = row.querySelectorAll('input');
    inputs.forEach((inp, i) => {
      inp.addEventListener('keydown', e=>{
        if (e.key === 'Enter'){
          e.preventDefault();
          if (i === inputs.length - 1){
            confirmBtn.click();
          } else {
            inputs[i + 1].focus();
          }
        }

      items.forEach(it => insertImageToEditor(it.url, it.alt));
    }

  };

  cancelBtn.onclick = closeModal;
  mask.onclick = e=>{ if (e.target === mask) closeModal(); };

  setTimeout(()=> listWrap.querySelector('.net-url')?.focus(), 80);

//========== 批量图床链接 ==========
function batchInsertImagesByUrls(urls){
  if(!urls.length) return 0;
  let count = 0;
  if (isCarouselOn) {
    urls.forEach(url => {
      if (!url || !url.startsWith('http')) return;
      insertImageToEditor(url, '配图');
      count++;
    });
    if (carouselImageQueue.length) {
      clearTimeout(carouselCloseTimer);
      flushCarousel();
    }
  } else {
    urls.forEach(url => {
      if (!url || !url.startsWith('http')) return;
      if(currentEditMode==='rich'){
        richBox.focus();
        const html = `<img loading="lazy" src="${url}" alt="配图" style="max-width:100%;margin:6px 0;display:block;" onerror="this.src='';this.alt='图片加载失败';"><br>`;
        document.execCommand('insertHTML', false, html);
      } else {
        mdBox.value += `![配图](${url})\n\n`;
      }
      count++;
    });
    if(currentEditMode==='md') { saveMdRecord(); renderMdPreview(); calcWordCount(); }
    if(currentEditMode==='rich' && richRecordStack){
      richRecordStack.splice(richRecordIndex+1);
            richRecordStack.push(richBox.innerHTML);
      if(richRecordStack.length>RICH_RECORD_MAX) richRecordStack.shift();
      richRecordIndex=richRecordStack.length-1;
      calcWordCount();
    }
  }
  return count;
}

document.getElementById('batchImgBtn').onclick = function(){
  navigator.clipboard.readText().then(clipText => {
    if(clipText && /^https?:\/\/[\w\W]*\.(\w{2,5})/.test(clipText) && /\r?\n/.test(clipText)){
      const arr = clipText.split(/\r?\n/).map(u=>u.trim()).filter(u=>u.startsWith('http'));
      const n = batchInsertImagesByUrls(arr);
      if(n>0) return alert(`从剪贴板批量插入了 ${n} 张图${isCarouselOn?'（轮播模式）':''}`);
    }
    askAndInsert();
  }).catch(()=>{
    askAndInsert();
  });

  function askAndInsert(){
    const urls = prompt("批量粘贴图床链接，一行一张：", "");
    if(!urls) return;
    const arr = urls.split(/\r?\n/).map(u=>u.trim()).filter(u=>u.startsWith('http'));
    const n = batchInsertImagesByUrls(arr);
    alert(`插入了 ${n} 张图片${isCarouselOn?'（轮播模式）':''}`);
  }
};

//========== 生成推送命令（修复版） ==========
document.getElementById('showTemplateBtn').onclick = async function(){
  syncFormToNoteList();
  
  const currentNotes = list.filter(i => i && i.id);
  
  const uniqueNotes = [];
  const idSet = new Set();
  currentNotes.forEach(note=>{
    if(!idSet.has(note.id)){
      idSet.add(note.id);
      uniqueNotes.push(note);
    }
  });

  const nowStr = getNowTimeStr();
  const useDownloadMode = document.getElementById('useDownloadCheck').checked;

  let shellBatch = 'cd ~/storage/shared/notes || exit 1\nmkdir -p images\n\n';
  imgUploadList.forEach((item, idx) => {
    const safeFileName = item.name.replace(/"/g, '\\"');
    shellBatch += `# ${idx+1}. ${item.originalName}\n`;
    shellBatch += `SRC=$(find /storage/emulated/0 -name "${safeFileName}" 2>/dev/null | head -n1)\n`;
    shellBatch += `[ -n "$SRC" ] && cp "$SRC" images/"${safeFileName}" || echo "未找到文件：${safeFileName}"\n\n`;
  });

  const finalJson = JSON.stringify(uniqueNotes, null, 2);
  const jsContent = `window.NOTE_DATA = ${finalJson};\n`;

  let gitCmd = 'git add images/ data.js\n';
  gitCmd += 'if ! git diff --cached --quiet; then\n';
  gitCmd += `  git commit -m "update notes ${nowStr}"\n`;
  gitCmd += '  git push origin main\n';
  gitCmd += 'else\n';
  gitCmd += '  echo "无变更内容，跳过推送"\n';
  gitCmd += 'fi\n';

  if (useDownloadMode) {
    const blob = new Blob([jsContent], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'data.js';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    const fullScript =
      '#!/bin/bash\n' +
      '#==================== 部署脚本·手动复贴板 ====================\n' +
      shellBatch +
      '\n' +
      '#==================== 把 data.js 拷贝到仓库根 ====================\n' +
      'DATA_SRC=""\n' +
      'for CANDIDATE in \\\n' +
      '  ~/storage/downloads/data.js \\\n' +
      '  ~/storage/shared/Download/data.js \\\n' +
      '  /storage/emulated/0/Download/data.js \\\n' +
      '  ~/downloads/data.js \\\n' +
      '  ./data.js; do\n' +
      '  if [ -f "$CANDIDATE" ]; then\n' +
      '    DATA_SRC="$CANDIDATE"\n' +
      '    echo "✅ 找到下载文件: $DATA_SRC"\n' +
      '    break\n' +
      '  fi\n' +
      'done\n\n' +
      'if [ -z "$DATA_SRC" ]; then\n' +
      '  echo "⚠️ 没自动找到下载的 data.js"\n' +
      '  read -p "请粘贴 data.js 的完整路径: " DATA_SRC\n' +
      '  if [ ! -f "$DATA_SRC" ]; then\n' +
      '    echo "❌ 路径无效: $DATA_SRC"\n' +
      '    exit 1\n' +
      '  fi\n' +
      'fi\n\n' +
      'cp -f "$DATA_SRC" ./data.js\n' +
      'echo "✅ data.js 已更新"\n\n' +
      gitCmd;

    await navigator.clipboard.writeText(fullScript);
    alert(`已下载 data.js 到 Download/，智能部署脚本已复制剪贴板 (${uniqueNotes.length} 条笔记)`);
  } else {
    // 关闭下载方式：data.js 内嵌到 shell 脚本里
    const fullScript = shellBatch + '\n' + 'cat > data.js << \'ENDOFFILE\'\n' + jsContent + '\nENDOFFILE\n\n' + gitCmd;
    await navigator.clipboard.writeText(fullScript);
    alert(`完整推送部署脚本已复制到剪贴板 (${uniqueNotes.length} 条笔记)`);
  }
};

//========== 图片点击预览 ==========
function bindImgPreview(scope){
  (scope||document).querySelectorAll('img').forEach(img=>{
    if (img.__previewBound) return;
    img.__previewBound = true;
    img.addEventListener('click', e=>{
      if (e.target.closest('.carousel-render')) return;
      e.preventDefault();
      const previewMask = document.getElementById('imgPreviewMask');
      const previewImg = document.getElementById('previewImg');
      previewImg.src = img.src;
      previewMask.classList.add('show');
    });
  });
}

richBox.addEventListener('click', e=>{
  bindImgPreview(richBox);
});
document.getElementById('imgPreviewMask').onclick = function(){
  this.classList.remove('show');
  document.getElementById('previewImg').src = '';
};

//========== 查找替换（拖拽越界修复） ==========
const findBox = document.getElementById('findReplaceBox');
let dragStartX = 0, dragStartY = 0, boxStartX = 0, boxStartY = 0;
findBox.addEventListener('mousedown', e=>{
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  const rect = findBox.getBoundingClientRect();
  boxStartX = rect.left;
  boxStartY = rect.top;
  findBox.style.left = boxStartX + 'px';
  findBox.style.top = boxStartY + 'px';
  document.addEventListener('mousemove', dragMoveFindBox);
  document.addEventListener('mouseup', dragEndFindBox, {once:true});
});
function dragMoveFindBox(e){
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  const maxX = window.innerWidth - findBox.offsetWidth - 6;
  const maxY = window.innerHeight - findBox.offsetHeight - 6;
  findBox.style.left = Math.max(6, Math.min(maxX, boxStartX + dx)) + 'px';
  findBox.style.top  = Math.max(6, Math.min(maxY, boxStartY + dy)) + 'px';
}
function dragEndFindBox(){ document.removeEventListener('mousemove', dragMoveFindBox); }

document.getElementById('findReplaceBtn').onclick = ()=>{
  findReplaceMask.classList.add('show');
  findInput.focus();
};
document.getElementById('findReplaceClose').onclick = ()=>{
  findReplaceMask.classList.remove('show');
  matchList = []; searchIndex = 0;
};

document.getElementById('findNextBtn').onclick = function(){
  const keyword = findInput.value.trim();
  if(!keyword) return alert('请输入查找内容');
  matchCase = matchCaseCheck.checked;
  const fullText = currentEditMode === 'rich' ? richBox.innerText : mdBox.value;
  const reg = new RegExp(keyword, matchCase ? 'g' : 'gi');
  matchList = [];
  let res;
  while((res = reg.exec(fullText)) !== null){ matchList.push(res.index); }
  if(!matchList.length) return alert('未匹配到内容');
  if(searchIndex >= matchList.length) searchIndex = 0;
  alert(`第 ${searchIndex+1}/${matchList.length} 处匹配`);
  searchIndex++;
};

document.getElementById('replaceSingleBtn').onclick = function(){
  const keyword = findInput.value.trim();
  const repStr = replaceInput.value;
  if(!keyword) return;
  if(currentEditMode === 'rich') return alert('富文本仅支持全部替换，请切换到Markdown');
  const pos = matchList[searchIndex -1];
  if(pos === undefined) return alert('请先执行查找');
  const origin = mdBox.value;
  const left = origin.slice(0, pos);
  const right = origin.slice(pos + keyword.length);
  mdBox.value = left + repStr + right;
  saveMdRecord(); renderMdPreview(); calcWordCount();
  document.getElementById('findNextBtn').click();
};

document.getElementById('replaceAllBtn').onclick = function(){
  const keyword = findInput.value.trim();
  const repStr = replaceInput.value;
  if(!keyword) return;
  if(currentEditMode === 'rich') return alert('富文本不支持全部替换，切换Markdown');
  matchCase = matchCaseCheck.checked;
  const reg = new RegExp(keyword, matchCase ? 'g' : 'gi');
  const newMd = mdBox.value.replace(reg, repStr);
  if(newMd === mdBox.value) return alert('无内容被替换');
  mdBox.value = newMd;
  saveMdRecord(); renderMdPreview(); calcWordCount();
  alert('全部替换完成');
};

//========== 页面退出前保存草稿 ==========
window.addEventListener('beforeunload', ()=>{
  try {
    syncFormToNoteList();
    saveLocalCache();
  } catch(e) { console.warn('草稿保存失败', e); }
});

//========== 页面加载完毕初始化 ==========
window.addEventListener("DOMContentLoaded", ()=>{
  renderMdPreview();
  calcWordCount();
});

//========== 移动端键盘高度适配 ==========
(function(){
  let initViewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const keyboardOffset = -20;
  function viewportResizeHandler(){
    const currentH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    const keyboardHeight = initViewportHeight - currentH;
    const isKeyboardOpen = keyboardHeight > 100;
    document.body.classList.toggle('keyboard-opened', isKeyboardOpen);
    if(isKeyboardOpen){
      document.documentElement.style.setProperty('--keyboard-height', (keyboardHeight + keyboardOffset) + 'px');
      setTimeout(()=>{
        const activeEl = document.activeElement;
        if(activeEl&&(activeEl.id==='richEditor'||activeEl.id==='mdEditor')){
          activeEl.scrollIntoView({behavior:'smooth',block:'end'});
        }
      },200);
    } else {
      document.documentElement.style.setProperty('--keyboard-height','0px');
    }
  }
  if(window.visualViewport) window.visualViewport.addEventListener('resize',viewportResizeHandler);
  else window.addEventListener('resize',viewportResizeHandler);
})();

// 暴露给阅读端
window.NoteCarousel = { initAll: initAllCarousels, initOne: initOneCarousel };
