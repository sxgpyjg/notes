<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>稳定版笔记编辑器</title>
<script src="./data.js?v=1"></script>
<!-- KaTeX公式渲染 -->
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
html,body{height:100%;overflow-x:hidden;}
body{background:#f7f8fc;padding:10px 10px 110px;}
.lock-scroll{overflow:hidden !important;touch-action:none !important;}
.tool-box,.tool-row,.save-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 10px;}
.tool-bar{display:flex;gap:8px;margin-bottom:10px;}
.link-btn{border:0;border-radius:10px;padding:9px 0;font-size:14px;color:#fff;flex:1;min-width:0;}
.blog-link{background:#10b981;}
.album-link{background:#f97316;}
.tool-btn{background:#ffffff;border:0;border-radius:8px;padding:10px 6px;font-size:14px;box-shadow:0 1px 4px rgba(99,102,241,0.06);transition:0.2s;}
.tool-btn:active{background:#edefff;}
.save-btn{background:#6366F1;color:white;border:0;border-radius:8px;padding:11px 0;width:100%;font-size:15px;box-shadow:0 2px 6px rgba(99,102,241,0.15);}
.save-btn-time{background:#4f46e5;}
#exportFullBackup{background:#22c55e;}
#importBackup{background:#f59e0b;}
.save-btn:active{opacity:0.9;}
.title-input,.type-input{width:100%;border:1px solid #e0e3f0;border-radius:8px;padding:10px;font-size:15px;margin-bottom:10px;outline:none;background:#fff;}
.title-input:focus,.type-input:focus{border-color:#6366F1;}
.edit-toolbar-wrap{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #e0e3f0;z-index:999;padding-bottom: env(safe-area-inset-bottom);}
body.keyboard-opened .edit-toolbar-wrap{position:absolute;}
.toolbar-main{display:flex;flex-wrap:wrap;gap:1px;padding:4px 6px;align-items:center;}
.toolbar-more{display:none;padding:4px 6px;border-top:1px solid #eee;grid-template-columns:repeat(8, 1fr);gap:0px;}
.toolbar-more.show{display:grid;}
.icon-btn{border:1px solid #ddd;background:#fff;border-radius:2px;width:24px;height:24px;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;touch-action:none;}
.icon-btn:active{background:#eef2ff;}
.icon-btn.active-format{background:#6366F1 !important;color:#fff !important;border-color:#4f46e5 !important;}
@media (min-width:769px){
  .icon-btn:hover::after{content:attr(data-tip);position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:10px;padding:2px 4px;border-radius:3px;white-space:nowrap;z-index:9999;}
}
.edit-toolbar select{border:1px solid #ddd;border-radius:3px;padding:2px;font-size:11px;height:24px;width:38px;}
.color-input{width:24px;height:24px;border:none;cursor:pointer;border-radius:3px;}
.editor-wrap{margin-bottom:10px;}
.rich-editor{width:100%;min-height:560px;border:1px solid #e0e3f0;border-radius:8px;padding:10px;font-size:15px;outline:none;background:#fff;line-height:1.7;position:relative;}
.rich-editor img{max-width:100%;height:auto;border-radius:6px;margin:8px 0;display:block;content-visibility:auto;loading:lazy;}
.md-editor{width:100%;min-height:280px;border:1px solid #e0e3f0;border-radius:8px;padding:10px;font-size:15px;outline:none;background:#fff;line-height:1.7;font-family:monospace;resize:vertical;}
.md-preview{width:100%;min-height:280px;border:1px solid #e0e3f0;border-radius:8px;padding:10px;background:#fff;margin-top:6px;line-height:1.7;}
.rich-editor pre code,.md-editor pre code{white-space:pre-wrap !important;word-break:break-all !important;}
.mode-switch{margin-bottom:8px;display:flex;gap:8px;}
.mode-switch button{flex:1;padding:8px 0;border-radius:8px;border:1px solid #6366F1;background:#fff;color:#6366F1;font-size:14px;}
.mode-switch button.active{background:#6366F1;color:#fff;}
#imgFileInput,#backupFileInput,#hiddenImgFile1,#hiddenImgFile2{opacity:0;position:absolute;width:0;height:0;pointer-events:auto;}
.warn{color:#e53e3e;font-size:12px;margin-bottom:8px;background:#fff2f4;padding:5px 8px;border-radius:6px;}
.tip-green{color:#16a34a;font-size:12px;margin-bottom:8px;background:#f0fdf4;padding:5px 8px;border-radius:6px;}
.tip-red{color:#dc2626;font-weight:bold;font-size:13px;margin-bottom:8px;background:#fee2e2;padding:6px 8px;border-radius:6px;}
body.bg-dark .tip-green,body.bg-midnight .tip-green{background:#163428;color:#86efac;}
body.bg-dark .warn,body.bg-midnight .warn{background:#421a22;color:#fca5a5;}
.login-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;padding:18px;border-radius:10px;width:90%;max-width:300px;}
.login-box input[type="password"]{width:100%;padding:9px;margin:8px 0;border:1px solid #ddd;border-radius:6px;}
.login-box button{width:100%;padding:9px;background:#6366F1;color:#fff;border:none;border-radius:6px;}
.img-collapse{border:1px solid #dbeafe;border-radius:8px;margin:8px 0;overflow:hidden;}
.img-collapse-head{padding:10px 12px;background:#eff6ff;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:500;font-size:14px;}
.img-collapse-body{padding:10px;display:none;}
.img-collapse-body.show{display:block;}
.arrow{transition:transform 0.2s;}
.arrow.rotate{transform:rotate(180deg);}
.img-quick-btn{background:#eef2ff;color:#4338ca;border:0;border-radius:4px;padding:3px 6px;font-size:12px;margin-bottom:6px;}
body.keyboard-opened{padding-bottom:30px;}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99999;display:flex;align-items:center;justify-content:center;padding:10px;}
.modal-box{width:100%;max-width:400px;background:#fff;border-radius:12px;padding:18px;}
.modal-input{width:100%;border:none;border-bottom:1px solid #999;padding:7px 0;font-size:15px;outline:none;background:transparent;}
.modal-btn{background:transparent;border:none;color:#009688;font-size:16px;}
.rich-editor table,.md-preview table{width:100%;border-collapse:collapse;margin:6px 0;}
.rich-editor th,.rich-editor td,.md-preview th,.md-preview td{border:1px solid #999;padding:5px 6px;min-width:50px;}
.find-replace-mask{position:fixed;inset:0;background:rgba(0,0,0,0.25);display:none;align-items:center;justify-content:center;z-index:9999;overflow:hidden;touch-action:none;}
.find-replace-mask.show{display:flex;}
.find-replace-box{background:rgba(255,255,255,0.85);width:min(80%, 320px);border-radius:12px;padding:12px;backdrop-filter: blur(6px);position:absolute;cursor:move;will-change:left,top;}
body.bg-dark .find-replace-box,body.bg-midnight .find-replace-box{background:rgba(30,30,40,0.9);color:#eee;}
body.bg-dark .find-replace-item input,body.bg-midnight .find-replace-item input{background:#222;color:#fff;border-color:#555;}
.find-replace-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.find-replace-title{font-size:15px;font-weight:600;}
.find-replace-close{border:none;background:transparent;font-size:18px;color:#666;cursor:pointer;}
body.bg-dark .find-replace-close,body.bg-midnight .find-replace-close{color:#ddd;}
.find-replace-item{margin-bottom:10px;}
.find-replace-item label{display:block;font-size:12px;color:#444;margin-bottom:3px;}
body.bg-dark .find-replace-item label,body.bg-midnight .find-replace-item label{color:#ddd;}
.find-replace-item input{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;}
.find-replace-btns{display:flex;gap:5px;margin-top:12px;}
.find-replace-btns button{flex:1;padding:7px 2px;border:none;border-radius:6px;font-size:12px;cursor:pointer;}
.btn-find{background:#e0e7ff;color:#2d3748;}
.btn-replace-all{background:#6366F1;color:#fff;}
.editor-bg-select{border:1px solid #ddd;border-radius:3px;padding:2px;font-size:11px;height:24px;width:38px;}
.rich-editor,.md-editor,.md-preview{transition: background 0.25s, color 0.25s, border-color 0.25s;}
body.bg-cream .rich-editor{background:#fffbeb;color:#222;border-color:#e0e3f0;}
body.bg-cream .md-editor{background:#fffbeb;color:#222;border-color:#e0e3f0;}
body.bg-cream .md-preview{background:#fffbeb;color:#222;border-color:#e0e3f0;}
body.bg-gray .rich-editor{background:#f3f4f6;color:#222;border-color:#d1d5db;}
body.bg-gray .md-editor{background:#f3f4f6;color:#222;border-color:#d1d5db;}
body.bg-gray .md-preview{background:#f3f4f6;color:#222;border-color:#d1d5db;}
body.bg-dark .rich-editor{background:#121212;color:#eeeeee;border-color:#444;}
body.bg-dark .md-editor{background:#121212;color:#eeeeee;border-color:#444;}
body.bg-dark .md-preview{background:#121212;color:#eeeeee;border-color:#444;}
body.bg-paper .rich-editor{background:#f8f3e6;color:#222;border-color:#e0d9c8;}
body.bg-paper .md-editor{background:#f8f3e6;color:#222;border-color:#e0d9c8;}
body.bg-paper .md-preview{background:#f8f3e6;color:#222;border-color:#e0d9c8;}
body.bg-softblue .rich-editor{background:#eef6ff;color:#222;border-color:#c7e0ff;}
body.bg-softblue .md-editor{background:#eef6ff;color:#222;border-color:#c7e0ff;}
body.bg-softblue .md-preview{background:#eef6ff;color:#222;border-color:#c7e0ff;}
body.bg-sepia .rich-editor{background:#f4e9d8;color:#2d2010;border-color:#ddccb0;}
body.bg-sepia .md-editor{background:#f4e9d8;color:#2d2010;border-color:#ddccb0;}
body.bg-sepia .md-preview{background:#f4e9d8;color:#2d2010;border-color:#ddccb0;}
body.bg-midnight .rich-editor{background:#1a2436;color:#e6edf7;border-color:#344460;}
body.bg-midnight .md-editor{background:#1a2436;color:#e6edf7;border-color:#344460;}
body.bg-midnight .md-preview{background:#1a2436;color:#e6edf7;border-color:#344460;}
body{--custom-bg:#fff;--custom-text:#222;--custom-border:#ddd;}
body.bg-custom .rich-editor{background:var(--custom-bg);color:var(--custom-text);border-color:var(--custom-border);}
body.bg-custom .md-editor{background:var(--custom-bg);color:var(--custom-text);border-color:var(--custom-border);}
body.bg-custom .md-preview{background:var(--custom-bg);color:var(--custom-text);border-color:var(--custom-border);}
.img-preview-mask{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999999;display:none;align-items:center;justify-content:center;}
.img-preview-mask.show{display:flex;}
.img-preview-img{max-width:95vw;max-height:95vh;object-fit:contain;}
</style>
</head>
<body>
<div id="loginWrap" class="login-modal">
  <div class="login-box">
    <h3>管理员验证</h3>
    <input type="password" id="pwdInput" placeholder="输入管理员密码">
    <button id="loginBtn">确认进入</button>
  </div>
</div>
<div id="mainWrap" style="display:none">
<div class="tool-bar">
  <button class="link-btn blog-link" onclick="window.open('https://sxgpyjg.github.io','_blank')">博客主页</button>
  <button class="link-btn album-link" onclick="window.open('https://sxgpyjg.github.io/blog','_blank')">图文相册</button>
</div>
<div class="tool-box">
<button class="tool-btn" onclick="location.href='admin-list.html'">返回管理列表</button>
<button class="tool-btn" id="logoutBtn">退出登录</button>
</div>
<div class="tip-green" id="wordCountTip">纯文字数：0 | 总字符(含空格换行)：0</div>
<div class="img-collapse">
  <div class="img-collapse-head" id="imgPanelHead">
    <span>图片素材面板</span>
    <span class="arrow" id="imgArrow">▼</span>
  </div>
  <div class="img-collapse-body" id="imgPanelBody">
    <div class="tip-red">【高危禁止】cd/cp/git终端命令不要粘贴到data.js，会损坏笔记文件！</div>
    <div class="tip-green">图片复制规则：选中图片仅生成对应cp指令，不会读取手机全部图片</div>
    <div class="warn">不生成base64图片，仅保存images文件夹相对路径，图片需手动上传仓库
    <br>vivo手机多选提示：相册长按批量勾选，单次单选可多次叠加</div>
    <div class="tool-row">
    <button class="tool-btn" id="copyJsonBtn">一键复制完整data.js代码（仅本段可粘贴nano）</button>
    <button class="tool-btn" id="showTemplateBtn">生成选中图片复制命令</button>
    </div>
    <div class="tool-row">
      <button class="tool-btn" id="clearImgListBtn">清空已选图片记录</button>
      <button class="tool-btn" id="exportSingleNoteMd">导出本篇MD</button>
    </div>
    <div class="tool-row">
      <button class="tool-btn" id="exportSingleNoteHtml">导出本篇HTML</button>
      <button class="tool-btn" id="insertCodeBtn">插入代码块模板</button>
      <button class="tool-btn" id="forceReloadRemoteBtn">刷新远程data.js</button>
      <button class="tool-btn" id="loadCleanSnapshot">加载纯净管理快照</button>
    </div>
    <input type="file" id="imgFileInput" multiple>
  </div>
</div>
<div class="save-row">
  <button class="save-btn" id="saveNormalBtn">下载 data.js（无时间戳）</button>
  <button class="save-btn save-btn-time" id="saveTimeBtn">下载 data_时间戳.js（留存旧文件）</button>
</div>
<div class="save-row">
  <button class="save-btn" id="exportFullBackup">导出完整备份notes.json</button>
  <button class="save-btn" id="importBackup">导入本地备份文件</button>
  <input type="file" id="backupFileInput" accept=".json,.js">
</div>
<input class="title-input" id="titleInput" placeholder="填写笔记标题">
<input class="type-input" id="typeInput" placeholder="自定义分类（开发笔记/随笔/教程）">
<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
  <input type="checkbox" id="privateCheck">
  <label for="privateCheck">设为私密（仅管理员登录可见，博客/相册游客完全不显示）</label>
</div>

<div class="mode-switch">
  <button id="modeRich" class="active">富文本可视化编辑</button>
  <button id="modeMd">Markdown纯文本</button>
</div>
<div class="edit-toolbar-wrap">
  <div class="toolbar-main">
    <button class="icon-btn" data-tip="撤销" id="undoBtn">↩</button>
    <button class="icon-btn" data-tip="重做" id="redoBtn">↪</button>    
    <div style="position:relative;width:24px;height:24px;flex-shrink:0;">
<input type="color" class="color-input" id="fontColor" data-tip="文字颜色" value="#000000" style="width:100%;height:100%;border-radius:3px;border:1px solid #ddd;margin:0;padding:0;">
<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:bold;pointer-events:none;">字</span>
</div>
<div style="position:relative;width:24px;height:24px;flex-shrink:0;">
<input type="color" class="color-input" id="bgColor" data-tip="文字高亮底色" value="#fff2cc" style="width:100%;height:100%;border-radius:3px;border:1px solid #ddd;margin:0;padding:0;">
<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#333;font-weight:bold;pointer-events:none;">底</span>
</div>

    <button class="icon-btn" data-tip="加粗" id="boldBtn">B</button>
    <button class="icon-btn" data-tip="斜体" id="italicBtn">I</button>
    <button class="icon-btn" data-tip="下划线" id="underlineBtn">U</button>
    <button class="icon-btn" data-tip="删除线" id="strikeBtn">S̶</button>
    <button class="icon-btn" data-tip="清除文字格式" id="clearFormatBtn">T</button>
    <button class="icon-btn" data-tip="居中排版" id="centerBtn">≡</button>
    <button class="icon-btn" data-tip="一级标题" id="h1Btn">H1</button>
    <button class="icon-btn" data-tip="二级标题" id="h2Btn">H2</button>
    <button class="icon-btn" data-tip="三级标题" id="h3Btn">H3</button>
    <button class="icon-btn" data-tip="代码块" id="codeBtn">&lt;/&gt;</button>
    <select id="fontSizeSel">
      <option value="12px">12</option>
      <option value="14px">14</option>
      <option value="16px" selected>16</option>
      <option value="18px">18</option>
      <option value="20px">20</option>
      <option value="24px">24</option>
    </select>
    <button class="icon-btn" data-tip="行内代码" id="inlineCodeBtn">`</button>
    <button class="icon-btn" data-tip="引用块" id="quoteBtn">></button>
    <button class="icon-btn" data-tip="无序列表" id="ulBtn">•</button>
    <button class="icon-btn" data-tip="清空全部内容" id="clearAllContentBtn">🗑️</button>
    <button class="icon-btn" data-tip="表格" id="tableBtn">▦</button>
    <button class="icon-btn" data-tip="本地图片上传" id="localImgBtn">🖼</button>
    <button class="icon-btn" data-tip="批量图床链接" id="batchImgBtn">🔗</button>  
    <button class="icon-btn" data-tip="插入链接" id="linkBtn">[]()</button>
    <button class="icon-btn" data-tip="固定宽度图片" id="imgWidthBtn">Img</button>
    <button class="icon-btn" data-tip="查找替换" id="findReplaceBtn">🔍</button>
    <button class="icon-btn" data-tip="分割线" id="split1Btn">—</button>
    <button class="icon-btn" data-tip="更多工具" id="moreToolsBtn">⋮</button>
    <input type="file" id="hiddenImgFile1" multiple>
<input type="file" id="hiddenImgFile2" multiple>
  </div>
  <div class="toolbar-more" id="moreToolsPanel">    
    <button class="icon-btn" data-tip="行内公式" id="inlineMathBtn">∑</button>
    <button class="icon-btn" data-tip="复制选中内容" id="copySelectBtn">📋</button>
    <button class="icon-btn" data-tip="段落上移" id="moveUpBtn">↑</button>
    <button class="icon-btn" data-tip="段落下移" id="moveDownBtn">↓</button>
    <button class="icon-btn" data-tip="嵌套引用" id="foldQuoteBtn">>></button>
    <button class="icon-btn" data-tip="有序列表" id="orderedListBtn">1.</button>
    <button class="icon-btn" data-tip="任务列表" id="taskListBtn">☐</button>
    <button class="icon-btn" data-tip="插入网络图床图片" id="netImgBtn">🖼</button>
    <button class="icon-btn" data-tip="空白复选框" id="emptyCheckBtn">[]</button>
    <button class="icon-btn" data-tip="已完成复选框" id="checkedCheckBtn">[✓]</button>    
    <button class="icon-btn" data-tip="块级公式" id="blockLatexBtn">√∑</button>
    <button class="icon-btn" data-tip="折叠详情块" id="detailsBtn">▼</button>
    <button class="icon-btn" data-tip="取色器" id="colorPickerBtn">🎨</button>
<div style="display:flex;align-items:center;gap:4px;">
  <select class="editor-bg-select" id="bgSelect">
    <option value="white">纯白</option>
    <option value="cream">米黄护眼</option>
    <option value="gray">浅灰</option>
    <option value="paper">羊皮纸</option>
    <option value="softblue">浅蓝柔和</option>
    <option value="sepia">棕褐护眼</option>
    <option value="dark">深色黑底</option>
    <option value="midnight">午夜深蓝</option>
    <option value="custom">自定义底色</option>
  </select>
  <input type="color" id="customBgColor" style="width:24px;height:24px;display:none;flex-shrink:0;" value="#ffffff">
</div>
    <button class="icon-btn" data-tip="重置默认纯白" id="resetBgBtn">◇</button>
    <button class="icon-btn" data-tip="长分割线" id="split2Btn">===</button>
  </div>
</div>
<div class="editor-wrap">
  <div class="rich-editor" id="richEditor" contenteditable="true"></div>
  <textarea class="md-editor" id="mdEditor" style="display:none" placeholder="在此书写Markdown内容..."></textarea>
  <div class="md-preview" id="mdPreview" style="display:none"></div>
</div>
</div>
<!-- 查找替换弹窗 -->
<div class="find-replace-mask" id="findReplaceMask">
  <div class="find-replace-box">
    <div class="find-replace-top">
      <div class="find-replace-title">查找与替换</div>
      <button class="find-replace-close" id="findReplaceClose">×</button>
    </div>
    <div class="find-replace-item">
      <label>查找内容</label>
      <input type="text" id="findInput" placeholder="输入要查找的文字">
    </div>
    <div class="find-replace-item">
      <label>替换为</label>
      <input type="text" id="replaceInput" placeholder="替换后的文字">
    </div>
    <div class="find-replace-item" style="display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="matchCase">
      <label style="margin:0;">区分大小写</label>
    </div>
    <div class="find-replace-btns">
  <button class="btn-find" id="findNextBtn">下一处</button>
  <button class="btn-find" id="replaceSingleBtn">替换</button>

function mdToHtml(mdStr){
  let s = mdStr;
  if(window.katex){
    s = s.replace(/\$\$([\s\S]*?)\$\$/g,(m,f)=>{try{return katex.renderToString(f,{displayMode:true})}catch{return m;}})
         .replace(/\$([^\$]+?)\$/g,(m,f)=>{try{return katex.renderToString(f,{displayMode:false})}catch{return m;}});
  }
  s = s.replace(/```([\s\S]*?)```/g, '<pre style="background:#f5f5f5;padding:10px;border-radius:6px;white-space:pre-wrap;"><code>$1</code></pre>')
       .replace(/^### (.*)$/gm, '<h3>$1</h3>')
       .replace(/^## (.*)$/gm, '<h2>$1</h2>')
       .replace(/^# (.*)$/gm, '<h1>$1</h1>')
       .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
       .replace(/\*(.*?)\*/g, '<em>$1</em>')
       .replace(/~~(.*?)~~/g, '<s>$1</s>')
       .replace(/^\- (.*)$/gm, '<li>$1</li>')
       .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)\{width=(\d+)\}/g, '<img src="$2" alt="$1" style="max-width:100%;margin:8px 0;width:$3px;">')
       .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;margin:8px 0;">')
       .replace(/\n/g, '<br>');
  return s;
}
function htmlToMd(htmlStr){
  let text = htmlStr
    .replace(/<pre style="background:#f5f5f5;padding:10px;border-radius:6px;white-space:pre-wrap;"><code>([\s\S]*?)<\/code><\/pre>/g, '```\n$1\n```')
    .replace(/<h1>(.*?)<\/h1>/g, '# $1')
    .replace(/<h2>(.*?)<\/h2>/g, '## $1')
    .replace(/<h3>(.*?)<\/h3>/g, '### $1')
    .replace(/<strong>(.*?)<\/strong>/g, '**$1**')
    .replace(/<em>(.*?)<\/em>/g, '*$1*')
    .replace(/<s>(.*?)<\/s>/g, '~~$1~~')
    .replace(/<li>(.*?)<\/li>/g, '- $1')
    .replace(/<img.*?width="(\d+)px".*?src="(.*?)".*?alt="(.*?)".*?>/g, '![$3]($2){width=$1}')
    .replace(/<img.*?src="(.*?)".*?alt="(.*?)".*?>/g, '![$2]($1)')
    .replace(/<br>/g, '\n');
  text = text.replace(/<(?!p style="text-align:center"|u|table|tr|th|td)[^>]+>/g, '');
  return text;
}

  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const rng = sel.getRangeAt(0);
  let tagEl = rng.commonAncestorContainer;
  let curTag = "";
  while(tagEl.nodeType === 1){
    const tag = tagEl.tagName.toLowerCase();
    if(["h1","h2","h3"].includes(tag)){ curTag = tag; break; }
    tagEl = tagEl.parentNode;
    if(tagEl === richBox) break;
  }
  if(curTag === "h1") h1Btn.classList.add("active-format");
  if(curTag === "h2") h2Btn.classList.add("active-format");
  if(curTag === "h3") h3Btn.classList.add("active-format");
  let curBlock = rng.commonAncestorContainer;
  while(curBlock && curBlock.nodeType !== 1 || !["P","H1","H2","H3","DIV"].includes(curBlock.tagName)){
    curBlock = curBlock.parentNode;
    if(!curBlock || curBlock === richBox) break;

}

// 同步表单到笔记列表
function syncFormToNoteList(){
  const title = titleInput.value.trim();
  const type = typeInput.value.trim();
  const isPrivate = privateCheck.checked;
  let content = currentEditMode === "rich" ? richBox.innerHTML.trim() : mdToHtml(mdBox.value);
  const now = getNowTimeStr();
  if(targetNote){
    const idx = list.findIndex(n=>n.id === targetNote.id);
    if(idx > -1){
      list[idx].title = title;
      list[idx].type = type;
      list[idx].content = content;
      list[idx].date = now;
      list[idx].private = isPrivate;
      delete list[idx]._isTempNew;
    }
  }else{
    const tempIdx = list.findIndex(n=>n._isTempNew);
    if(tempIdx > -1){
      list[tempIdx].title = title;
      list[tempIdx].type = type;
      list[tempIdx].content = content;
      list[tempIdx].date = now;
      list[tempIdx].private = isPrivate;
    }else{
      list.push({
        id: Date.now(), title, type, content, date: now, private: isPrivate, _isTempNew:true
      });
    }
  }
  saveLocalCache();
  saveNoteToStorage(list);
}
function downloadDataJs(isTimeStamp){
  const title = titleInput.value.trim();
  const type = typeInput.value.trim();
  if(!title){ alert("笔记标题不能为空"); return; }
  let content = currentEditMode === "rich" ? richBox.innerHTML.trim() : mdToHtml(mdBox.value);
  const now = getNowTimeStr();
  if(targetNote){
    const idx = list.findIndex(n=>n.id === targetNote.id);
    if(idx > -1) delete list[idx]._isTempNew;
    list[idx].title = title;
    list[idx].type = type;
    list[idx].content = content;
    list[idx].date = now;
    list[idx].private = privateCheck.checked;
  }else{
    list.push({id:Date.now(), title, type, content, date:now, private:privateCheck.checked});
  }
  list = list.filter(item=> (item.title||"").trim() && item.id && item.content);
  saveLocalCache();
  saveNoteToStorage(list);
  const jsText = getFullJsText();
  const blob = new Blob([jsText], {type:"application/javascript"});
  const a = document.createElement("a");
  let fname = "data.js";
  if(isTimeStamp) fname = `data_${now.replace(/[: ]/g,"-")}.js`;
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(a.href);
  document.body.removeChild(a);
  alert(`${fname} 下载完成`);
}
function exportSingleNoteMd(){
  syncFormToNoteList();

  URL.revokeObjectURL(a.href);
}

  resetBgBtn.addEventListener("click", ()=>{
    document.body.classList.remove("bg-cream","bg-gray","bg-paper","bg-softblue","bg-sepia","bg-dark","bg-midnight","bg-custom");
    richBox.style.backgroundColor = ""; mdBox.style.backgroundColor = ""; mdPreviewBox.style.backgroundColor = "";
    customBgColor.style.display = "none";
    calcWordCount();
  });
  split2Btn.addEventListener("click", splitLine2);
  undoBtn.addEventListener("click", globalUndo);
  redoBtn.addEventListener("click", globalRedo);
  imgPanelHead.addEventListener("click", toggleImgPanel);
  findReplaceClose.addEventListener("click", ()=>{
    findReplaceMask.classList.remove("show"); document.body.classList.remove("lock-scroll");
  });
  findReplaceMask.addEventListener("click", e=>{ if(e.target === findReplaceMask){ findReplaceMask.classList.remove("show"); document.body.classList.remove("lock-scroll"); } });
  matchCase.addEventListener("change", ()=>{ matchCaseFlag = matchCase.checked; });
  findNextBtn.addEventListener("click", ()=>{
    const fTxt = findInput.value.trim();
    if(!fTxt){ alert("输入查找内容"); return; }
    const text = currentEditMode === "rich" ? richBox.innerText : mdBox.value;
    const reg = new RegExp(fTxt, matchCaseFlag ? "g" : "gi");
    const matches = [];
    let m;
    while((m=reg.exec(text))!==null) matches.push(m.index);
    if(!matches.length){ alert("未找到"); return; }
    let idx = 0;
    if(window._searchIdx !== undefined) idx = (window._searchIdx +1) % matches.length;
    window._searchIdx = idx;
    const pos = matches[idx];
    if(currentEditMode === "rich"){
      // 简易文本遍历选中文本
      let offset=0, targetNode=null, nodeOff=0;
      function walk(el){
        for(const n of el.childNodes){
          if(targetNode) return true;
          if(n.nodeType === Node.TEXT_NODE){
            const l = n.textContent.length;
            if(offset + l > pos){ targetNode = n; nodeOff = pos-offset; return true; }
            offset += l;
          }else if(n.nodeType === Node.ELEMENT_NODE){ if(walk(n)) return true; }
        }
        return false;
      }
      walk(richBox);
      if(targetNode){
        const r = document.createRange();
        r.setStart(targetNode, nodeOff);
        r.setEnd(targetNode, nodeOff + fTxt.length);
        const sel = window.getSelection();
        sel.removeAllRanges(); sel.addRange(r);
      }
    }else{
      mdBox.focus();
      mdBox.setSelectionRange(pos, pos + fTxt.length);
    }
  });
  replaceSingleBtn.addEventListener("click", ()=>{
    const fTxt = findInput.value.trim();
    const rTxt = replaceInput.value;
    if(!fTxt) return;
    if(currentEditMode === "md"){
      const pos = mdBox.selectionStart;
      const val = mdBox.value;
      mdBox.value = val.slice(0,pos) + rTxt + val.slice(pos + fTxt.length);
      saveMdRecord(); renderMdPreview(); calcWordCount();
    }else{
      document.execCommand("insertText", false, rTxt);
      calcWordCount();
    }
  });
  replaceAllBtn.addEventListener("click", ()=>{
    const fTxt = findInput.value.trim();
    const rTxt = replaceInput.value;
    if(!fTxt) return;
    if(currentEditMode === "rich"){ alert("富文本不支持批量替换"); return; }
    const reg = new RegExp(fTxt, matchCaseFlag ? "g" : "gi");
    const newVal = mdBox.value.replace(reg, rTxt);
    const cnt = (mdBox.value.match(reg) || []).length;
    mdBox.value = newVal;
    saveMdRecord(); renderMdPreview(); calcWordCount();
    alert(`替换${cnt}处`);
  });
  bgSelect.addEventListener("change", function(){
    document.body.classList.remove("bg-cream","bg-gray","bg-paper","bg-softblue","bg-sepia","bg-dark","bg-midnight","bg-custom");
    richBox.style.backgroundColor = ""; mdBox.style.backgroundColor = ""; mdPreviewBox.style.backgroundColor = "";
    if(this.value === "custom"){
      document.body.classList.add("bg-custom");
      customBgColor.style.display = "block";
    }else{
      document.body.classList.add("bg-"+this.value);
      customBgColor.style.display = "none";
    }
    calcWordCount();
  });
  customBgColor.addEventListener("input", function(){
    document.body.style.setProperty("--custom-bg", this.value);
    richBox.style.backgroundColor = this.value;
    mdBox.style.backgroundColor = this.value;
    mdPreviewBox.style.backgroundColor = this.value;
    calcWordCount();
  });
  previewMask.addEventListener("click", ()=>previewMask.classList.remove("show"));

  // 编辑输入监听
  richBox.addEventListener("input", ()=>{
    richRecordStack.splice(richRecordIndex+1);
    richRecordStack.push(richBox.innerHTML);
    if(richRecordStack.length > RICH_RECORD_MAX) richRecordStack.shift();
    richRecordIndex = richRecordStack.length-1;
    checkFormatActive(); calcWordCount();
  });
  richBox.addEventListener("selectionchange", checkFormatActive);
  mdBox.addEventListener("input", ()=>{
    saveMdRecord(); renderMdPreview(); calcWordCount();
  });

  // 键盘快捷键
  window.addEventListener("keydown", e=>{
    if(e.ctrlKey || e.metaKey){
      switch(e.key.toLowerCase()){
        case "s": e.preventDefault(); copyJsonBtn.click(); break;
        case "z": e.preventDefault(); globalUndo(); break;
        case "y": e.preventDefault(); globalRedo(); break;
        case "f": e.preventDefault(); findReplaceBtn.click(); break;
        case "b": e.preventDefault(); formatBold(); break;
      }
    }
  });

  // 初始化流程
  autoLoginCheck();
  renderMdPreview();
  calcWordCount();
});
</script>
</body>
</html>
