<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>笔记编辑器（完整移植纯写作原生交互）</title>
<script src="./data.js"></script>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,-apple-system,sans-serif;
}
html,body{
  height:100%;
  overflow-x:hidden;
}
body{
  background:#f7f8fc;
  padding:10px 10px 110px;
}

/* 双列按钮 绝对均分对称 */
.tool-box,.tool-row,.save-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin:8px 0 10px;
}

.tool-bar{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.link-btn{
  border:0;
  border-radius:10px;
  padding:9px 0;
  font-size:14px;
  color:#fff;
  flex:1;
  min-width:0;
}
.blog-link{
  background:#10b981;
}
.album-link{
  background:#f97316;
}

.tool-btn{
  background:#ffffff;
  border:0;
  border-radius:8px;
  padding:10px 6px;
  font-size:14px;
  box-shadow:0 1px 4px rgba(99,102,241,0.06);
  transition:0.2s;
}
.tool-btn:active{
  background:#edefff;
}

.save-btn{
  background:#6366F1;
  color:white;
  border:0;
  border-radius:8px;
  padding:11px 0;
  width:100%;
  font-size:15px;
  box-shadow:0 2px 6px rgba(99,102,241,0.15);
}
.save-btn-time{
  background:#4f46e5;
}
#exportFullBackup{
  background:#22c55e;
}
#importBackup{
  background:#f59e0b;
}
.save-btn:active{
  opacity:0.9;
}

.title-input,.type-input{
  width:100%;
  border:1px solid #e0e3f0;
  border-radius:8px;
  padding:10px;
  font-size:15px;
  margin-bottom:10px;
  outline:none;
  background:#fff;
}
.title-input:focus,.type-input:focus{
  border-color:#6366F1;
}

.edit-toolbar-wrap{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  border-top:1px solid #e0e3f0;
  z-index:999;
  padding-bottom: env(safe-area-inset-bottom);
}
.toolbar-main{
  display:flex;
  flex-wrap:wrap;
  gap:1px;
  padding:4px 6px;
  align-items:center;
}
.toolbar-more{
  display:none;
  padding:4px 6px;
  border-top:1px solid #eee;
  grid-template-columns:repeat(8, 1fr);
  gap:0px;
}
.toolbar-more.show{
  display:grid;
}

/* 底部小图标按钮 统一大小 */
.icon-btn{
  border:1px solid #ddd;
  background:#fff;
  border-radius:2px;
  width:24px;
  height:24px;
  font-size:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
  touch-action:none;
}
.icon-btn:active{
  background:#eef2ff;
}
.icon-btn.active-format{
  background:#6366F1 !important;
  color:#fff !important;
  border-color:#4f46e5 !important;
}
.icon-btn:hover::after{
  content:attr(data-tip);
  position:absolute;
  bottom:110%;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  color:#fff;
  font-size:10px;
  padding:2px 4px;
  border-radius:3px;
  white-space:nowrap;
  z-index:9999;
}

.edit-toolbar select{
  border:1px solid #ddd;
  border-radius:3px;
  padding:2px;
  font-size:11px;
  height:24px;
  width:38px;
}
.color-input{
  width:24px;
  height:24px;
  border:none;
  cursor:pointer;
  border-radius:3px;
}

.editor-wrap{
  margin-bottom:10px;
}
.rich-editor{
  width:100%;
  min-height:280px;
  border:1px solid #e0e3f0;
  border-radius:8px;
  padding:10px;
  font-size:15px;
  outline:none;
  background:#fff;
  line-height:1.7;
  position:relative;
}
.rich-editor img{
  max-width:100%;
  height:auto;
  border-radius:6px;
  margin:8px 0;
  display:block;
  content-visibility:auto;
  loading:lazy;
}
.md-editor{
  width:100%;
  min-height:280px;
  border:1px solid #e0e3f0;
  border-radius:8px;
  padding:10px;
  font-size:15px;
  outline:none;
  background:#fff;
  line-height:1.7;
  font-family:monospace;
  resize:vertical;
}
.md-preview{
  width:100%;
  min-height:180px;
  border:1px solid #e0e3f0;
  border-radius:8px;
  padding:10px;
  background:#fff;
  margin-top:6px;
  line-height:1.7;
}

/* 模式切换按钮 左右完全一样大 */
.mode-switch{
  margin-bottom:8px;
  display:flex;
  gap:8px;
}
.mode-switch button{
  flex:1;
  padding:8px 0;
  border-radius:8px;
  border:1px solid #6366F1;
  background:#fff;
  color:#6366F1;
  font-size:14px;
}
.mode-switch button.active{
  background:#6366F1;
  color:#fff;
}

#imgFileInput,#backupFileInput,#hiddenImgFile1,#hiddenImgFile2{
  opacity:0;
  position:absolute;
  width:0;
  height:0;
  pointer-events:auto;
}
.warn{
  color:#e53e3e;
  font-size:12px;
  margin-bottom:8px;
  background:#fff2f4;
  padding:5px 8px;
  border-radius:6px;
}
.tip-green{
  color:#16a34a;
  font-size:12px;
  margin-bottom:8px;
  background:#f0fdf4;
  padding:5px 8px;
  border-radius:6px;
}
.tip-red{
  color:#dc2626;
  font-weight:bold;
  font-size:13px;
  margin-bottom:8px;
  background:#fee2e2;
  padding:6px 8px;
  border-radius:6px;
}

.login-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.login-box{
  background:#fff;
  padding:18px;
  border-radius:10px;
  width:90%;
  max-width:300px;
}
.login-box input[type="password"]{
  width:100%;
  padding:9px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:6px;
}
.login-box button{
  width:100%;
  padding:9px;
  background:#6366F1;
  color:#fff;
  border:none;
  border-radius:6px;
}

.img-collapse{
  border:1px solid #dbeafe;
  border-radius:8px;
  margin:8px 0;
  overflow:hidden;
}
.img-collapse-head{
  padding:10px 12px;
  background:#eff6ff;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:500;
  font-size:14px;
}
.img-collapse-body{
  padding:10px;
  display:none;
}
.img-collapse-body.show{
  display:block;
}
.arrow{
  transition:transform 0.2s;
}
.arrow.rotate{
  transform:rotate(180deg);
}

.img-quick-btn{
  background:#eef2ff;
  color:#4338ca;
  border:0;
  border-radius:4px;
  padding:3px 6px;
  font-size:12px;
  margin-bottom:6px;
}

body.keyboard-opened{
  padding-bottom:30px;
}

.modal-mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}
.modal-box{
  width:100%;
  max-width:400px;
  background:#fff;
  border-radius:12px;
  padding:18px;
}
.modal-input{
  width:100%;
  border:none;
  border-bottom:1px solid #999;
  padding:7px 0;
  font-size:15px;
  outline:none;
  background:transparent;
}
.modal-btn{
  background:transparent;
  border:none;
  color:#009688;
  font-size:16px;
}

.rich-editor table {
  width:100%;
  border-collapse: collapse;
  margin:6px 0;
}
.rich-editor th,
.rich-editor td {
  border:1px solid #999;
  padding:5px 6px;
  min-width:50px;
}
.md-preview table {
  width:100%;
  border-collapse: collapse;
  margin:6px 0;
}
.md-preview th,
.md-preview td {
  border:1px solid #999;
  padding:5px 6px;
  min-width:50px;
}
/* 查找替换弹窗样式 */
.find-replace-mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25); /* 原来0.45，降低遮罩透明度 */
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.find-replace-mask.show{
  display:flex;
}
.find-replace-box{
  background:rgba(255,255,255,0.85); /* 白色半透明面板 */
  width:min(92%,420px);
  border-radius:14px;
  padding:16px;
  backdrop-filter: blur(6px); /* 毛玻璃虚化背景，更通透 */
}

.find-replace-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}
.find-replace-title{
  font-size:16px;
  font-weight:600;
}
.find-replace-close{
  border:none;
  background:transparent;
  font-size:20px;
  color:#666;
  cursor:pointer;
}
.find-replace-item{
  margin-bottom:12px;
}
.find-replace-item label{
  display:block;
  font-size:13px;
  color:#444;
  margin-bottom:4px;
}
.find-replace-item input{
  width:100%;
  padding:9px 12px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}
.find-replace-btns{
  display:flex;
  gap:6px;
  margin-top:16px;
}
.find-replace-btns button{
  flex:1;
  padding:8px 2px;
  border:none;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}

.btn-find{
  background:#e0e7ff;
  color:#2d3748;
}
.btn-replace-all{
  background:#6366F1;
  color:#fff;
}

</style>
</head>
<body>
<div id="loginWrap" class="login-modal">
  <div class="login-box">
    <h3>管理员验证</h3>
    <input type="password" id="pwdInput" placeholder="输入管理员密码">
    <button onclick="checkPwd()">确认进入</button>
  </div>
</div>
<div id="mainWrap" style="display:none">
<div class="tool-bar">
  <button class="link-btn blog-link" onclick="window.open('https://sxgpyjg.github.io','_blank')">博客主页</button>
  <button class="link-btn album-link" onclick="window.open('https://sxgpyjg.github.io/blog','_blank')">图文相册</button>
</div>
<div class="tool-box">
<button class="tool-btn" onclick="location.href='admin-list.html'">返回管理列表</button>

<div class="img-collapse">
  <div class="img-collapse-head" onclick="toggleImgPanel()">
    <span>图片素材面板</span>

  </div>

    <div class="tool-row">

</div>

<script>
let globalImgSerial = 0;
const CACHE_KEY = "note_temp_data";
const PWD_STORE_KEY = "admin_save_pwd";
let list = [];
let targetNote = null;
const editId = new URLSearchParams(location.search).get("id");
let imgUploadList = [];
let currentEditMode = "rich";
let mdRecordStack = [];
let mdRecordIndex = -1;
let moreToolsOpen = false;
let initViewHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
const ADMIN_PASSWORD = "admin123";

// 自动登录+延迟加载笔记，解决DOM未渲染回填空白
function autoLoginCheck(){
  const savedPwd = localStorage.getItem(PWD_STORE_KEY);
  if(savedPwd && savedPwd === ADMIN_PASSWORD){
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("mainWrap").style.display = "block";
    loadLocalCache();
    window.addEventListener("DOMContentLoaded", ()=>{
      setTimeout(initLoadNote, 100);
    })
  }
}
autoLoginCheck();

function loadLocalCache(){
  const cacheStr = localStorage.getItem(CACHE_KEY);
  if(cacheStr){
    try{
      window.NOTE_DATA = JSON.parse(cacheStr);
      list = window.NOTE_DATA;
    }catch(e){}
  }
}
function saveLocalCache(){
  localStorage.setItem(CACHE_KEY, JSON.stringify(list));
}
function getFullJsText(){
  return `window.NOTE_DATA = ${JSON.stringify(list, null, 2)};`;
}
function getNowTimeStr(){
  const date = new Date();
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  const h = String(date.getHours()).padStart(2,"0");
  const mi = String(date.getMinutes()).padStart(2,"0");
  const s = String(date.getSeconds()).padStart(2,"0");
  return `${y}-${m}-${d} ${h}:${mi}:${s}`;
}

// DOM缓存
const titleInput = document.querySelector(".title-input");
const typeInput = document.querySelector(".type-input");
const saveNormalBtn = document.getElementById("saveNormalBtn");
const saveTimeBtn = document.getElementById("saveTimeBtn");
const imgFileInput = document.getElementById("imgFileInput");
const hiddenImgFile1 = document.getElementById("hiddenImgFile1");
const hiddenImgFile2 = document.getElementById("hiddenImgFile2");
const copyAllJsonBtn = document.getElementById("copyJsonBtn");
const genCpBtn = document.getElementById("showTemplateBtn");
const codeInsertBtn = document.getElementById("insertCodeBtn");
const batchImgBtn = document.getElementById("batchImgBtn");
const localImgBtn = document.getElementById("localImgBtn");
const richBox = document.getElementById("richEditor");
const mdBox = document.getElementById("mdEditor");
const mdPreviewBox = document.getElementById("mdPreview");
const fontSizeSelect = document.getElementById("fontSizeSel");
const fontColorInput = document.getElementById("fontColor");
const bgColorInput = document.getElementById("bgColor");
const richModeBtn = document.getElementById("modeRich");
const mdModeBtn = document.getElementById("modeMd");
const moreToolsPanel = document.getElementById("moreToolsPanel");
const exportBackupBtn = document.getElementById("exportFullBackup");
const importBackupBtn = document.getElementById("importBackup");
const backupFileInput = document.getElementById("backupFileInput");

function toggleMoreTools(){
  moreToolsOpen = !moreToolsOpen;
  moreToolsPanel.classList.toggle("show", moreToolsOpen);
}
function saveMdRecord(){
  mdRecordStack.splice(mdRecordIndex+1);
  mdRecordStack.push(mdBox.value);
  mdRecordIndex = mdRecordStack.length - 1;
}
function mdUndo(){
  if(mdRecordIndex <= 0) return;
  mdRecordIndex--;
  mdBox.value = mdRecordStack[mdRecordIndex];
  renderMdPreview();
}
function mdRedo(){
  if(mdRecordIndex >= mdRecordStack.length - 1) return;
  mdRecordIndex++;
  mdBox.value = mdRecordStack[mdRecordIndex];
  renderMdPreview();
}
function globalUndo(){
  if(currentEditMode === "rich") document.execCommand("undo");
  else mdUndo();
}
function globalRedo(){
  if(currentEditMode === "rich") document.execCommand("redo");
  else mdRedo();
}

  if(curH < initViewHeight - 100) document.body.classList.add("keyboard-opened");
  else document.body.classList.remove("keyboard-opened");
}

// 修复切换函数：表格双向转换、清理多余换行、不重复增行
function switchMode(mode){
  currentEditMode = mode;
  richModeBtn.classList.toggle("active", mode === "rich");
  mdModeBtn.classList.toggle("active", mode === "md");
  if(mode === "rich"){
    let mdText = mdBox.value;
    let parseHtml = mdText.replace(/(^|\n)(\|.+\|\n)(\|----.+\|\n)+(\|.+\|)(\n|$)/g, (_, pre, hRow, sepRow, cRow, suf)=>{
      const block = `${hRow}${sepRow}${cRow}`.trim();
      const rows = block.split("\n");
      let tableDom = `<table style="width:100%;border-collapse:collapse;margin:8px 0;">`;
      rows.forEach((row, idx)=>{
        const cells = row.split("|").filter(s=>s.trim() !== "");
        tableDom += "<tr>";
        cells.forEach(txt=>{
          const tag = idx === 0 ? "th" : "td";
          tableDom += `<${tag} style="border:1px solid #999;padding:6px 8px;">${txt.trim()}</${tag}>`;
        });
        tableDom += "</tr>";
      });
      tableDom += "</table>";
      return `${pre}${tableDom}${suf}`;
    });
    richBox.innerHTML = mdToHtml(parseHtml);
    richBox.style.display = "block";
    mdBox.style.display = "none";
    mdPreviewBox.style.display = "none";
    checkFormatActive();
  }else{
    let htmlText = richBox.innerHTML;
    let parseMd = htmlText.replace(/<table[\s\S]*?<\/table>/g, tab=>{
      const trList = tab.match(/<tr[\s\S]*?<\/tr>/g) || [];
      let mdTable = "";
      trList.forEach((tr, rowIdx)=>{
        const cellList = tr.match(/<t[hd][\s\S]*?<\/t[hd]>/g) || [];
        let line = "";
        cellList.forEach(cell=>{
          const text = cell.replace(/<\/?t[hd].*?>/g,"").trim();
          line += `|${text}`;
        });
        line += "|\n";
        mdTable += line;
        if(rowIdx === 0){
          let sepLine = "";
          cellList.forEach(()=> sepLine += "|----");
          sepLine += "|\n";
          mdTable += sepLine;
        }
      });
      return "\n" + mdTable.trim() + "\n";
    });
    parseMd = parseMd.replace(/\n{3,}/g,"\n\n");
    mdBox.value = htmlToMd(parseMd);
    saveMdRecord();
    renderMdPreview();
    richBox.style.display = "none";
    mdBox.style.display = "block";
    mdPreviewBox.style.display = "block";
  }
}

// 优化md转html
function mdToHtml(mdStr){
  return mdStr
    .replace(/```([\s\S]*?)```/g, '<pre style="background:#f5f5f5;padding:10px;border-radius:6px;white-space:pre-wrap;"><code>$1</code></pre>')
    .replace(/<u>(.*?)<\/u>/g, '<u>$1</u>')
    .replace(/<p style="text-align:center">(.*?)<\/p>/g, '<p style="text-align:center">$1</p>')
    .replace(/^### (.*)$/gm, '<h3>$1</h3>')
    .replace(/^## (.*)$/gm, '<h2>$1</h2>')
    .replace(/^# (.*)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/~~(.*?)~~/g, '<s>$1</s>')
    .replace(/^\- (.*)$/gm, '<li>$1</li>')
    .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)\{width=(\d+)\}/g, '<img src="$2" alt="$1" style="max-width:100%;margin:8px 0;width:$3px;">')
    .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;margin:8px 0;">')
    .replace(/\n/g, '<br>');
}
// 优化html转md：保留表格、u、居中标签，不粗暴删除
function htmlToMd(htmlStr){
  let text = htmlStr
    .replace(/<pre style="background:#f5f5f5;padding:10px;border-radius:6px;white-space:pre-wrap;"><code>([\s\S]*?)<\/code><\/pre>/g, '```\n$1\n```')
    .replace(/<h1>(.*?)<\/h1>/g, '# $1')
    .replace(/<h2>(.*?)<\/h2>/g, '## $1')
    .replace(/<h3>(.*?)<\/h3>/g, '### $1')
    .replace(/<strong>(.*?)<\/strong>/g, '**$1**')
    .replace(/<em>(.*?)<\/em>/g, '*$1*')
    .replace(/<s>(.*?)<\/s>/g, '~~$1~~')
    .replace(/<li>(.*?)<\/li>/g, '- $1')
    .replace(/<img.*?width="(\d+)px".*?src="(.*?)".*?alt="(.*?)".*?>/g, '![$3]($2){width=$1}')
    .replace(/<img.*?src="(.*?)".*?alt="(.*?)".*?>/g, '![$2]($1)')
    .replace(/<br>/g, '\n');
  // 仅过滤无关标签，保留table/tr/th/td/u/居中p
  text = text.replace(/<(?!p style="text-align:center"|u|table|tr|th|td)[^>]+>/g, '');
  return text;
}
function renderMdPreview(){
  mdPreviewBox.innerHTML = mdToHtml(mdBox.value);
}

// 格式按钮高亮检测（修复H2/H3错乱）
function checkFormatActive(){
  document.querySelectorAll(".icon-btn").forEach(btn=>btn.classList.remove("active-format"));
  if(currentEditMode !== "rich") return;
  const isBold = document.queryCommandState("bold");
  const isItalic = document.queryCommandState("italic");
  const isUnder = document.queryCommandState("underline");
  const isStrike = document.queryCommandState("strikeThrough");
  if(isBold) document.querySelector('[onclick="formatBold()"]').classList.add("active-format");
  if(isItalic) document.querySelector('[onclick="formatItalic()"]').classList.add("active-format");
  if(isUnder) document.querySelector('[onclick="insertUnderline()"]').classList.add("active-format");
  if(isStrike) document.querySelector('[onclick="formatStrikeThrough()"]').classList.add("active-format");

  const sel = window.getSelection();
  const rng = sel.getRangeAt(0);
  let tagEl = rng.commonAncestorContainer;
  let curTag = "";
  while(tagEl.nodeType === 1){
    const tag = tagEl.tagName.toLowerCase();
    if(["h1","h2","h3"].includes(tag)){
      curTag = tag;
      break;
    }
    tagEl = tagEl.parentNode;
    if(tagEl === richBox) break;
  }
  if(curTag === "h1") document.querySelector('[onclick="insertH1()"]').classList.add("active-format");
  if(curTag === "h2") document.querySelector('[onclick="insertH2()"]').classList.add("active-format");
  if(curTag === "h3") document.querySelector('[onclick="insertH3()"]').classList.add("active-format");

  let curBlock = rng.commonAncestorContainer;
  while(curBlock.nodeType !== 1 || !["P","H1","H2","H3","DIV"].includes(curBlock.tagName)){
    curBlock = curBlock.parentNode;
    if(!curBlock || curBlock === richBox) break;
  }
  if(curBlock && curBlock.style.textAlign === "center"){
    document.querySelector('[onclick="insertCenter()"]').classList.add("active-format");
  }
}
richBox.addEventListener("selectionchange", checkFormatActive);
richBox.addEventListener("input", checkFormatActive);

// 【核心修复】初始化加载笔记，回填不丢失、不破坏按钮逻辑
function initLoadNote(){
  list = window.NOTE_DATA || [];
  if(!editId) return;
  const target = list.find(item=>item.id === Number(editId));
  if(!target) return;
  targetNote = target;
  titleInput.value = target.title;
  typeInput.value = target.type;
  richBox.innerHTML = target.content || "";
  // 转换md并清理多余换行，不新增变量冲突
  mdBox.value = htmlToMd(target.content || "").replace(/\n{3,}/g,"\n\n");
  saveMdRecord();
  renderMdPreview();
  checkFormatActive();
}
function getLineStart(text, pos){
  let i = pos;
  while(i > 0 && text[i-1] !== "\n") i--;
  return i;
}

//加粗
function formatBold(){
  if(currentEditMode === "rich"){
    richBox.focus();
    document.execCommand("bold", false, null);
    checkFormatActive();
  }else{
    const tpl = "****";
    mdBox.value += tpl;
    saveMdRecord();
    renderMdPreview();
    const pos = mdBox.value.length - 2;
    mdBox.selectionStart = pos;
    mdBox.selectionEnd = pos;
    //回车自动续写加粗
    mdBox.onkeydown = function(e){
      if(e.key === "Enter"){
        const cur = mdBox.selectionStart;
        const txt = mdBox.value;
        const close = txt.indexOf("**", cur);
        if(close > cur){
          e.preventDefault();
          mdBox.selectionStart = close + 2;
          mdBox.selectionEnd = close + 2;
          mdBox.value = txt.slice(0, close+2) + "\n" + txt.slice(close+2);
          saveMdRecord();
          renderMdPreview();
        }
      }
    }
  }
}

function insertCenter(){
  if(currentEditMode === "rich"){
    richBox.focus();
    const sel = window.getSelection();
    const range = sel.getRangeAt(0);
    let block = range.commonAncestorContainer;
    while(block.nodeType !== 1 || !["P","H1","H2","H3","DIV"].includes(block.tagName)){
      block = block.parentNode;
      if(!block || block === richBox) break;
    }
    let isCenter = block && block.style.textAlign === "center";
    if(isCenter){
      document.execCommand("justifyLeft", false, null);
      block.style.textAlign = "";
    }else{
      document.execCommand("justifyCenter", false, null);

    checkFormatActive();

    saveMdRecord();
    renderMdPreview();
    const pos = mdBox.value.length - 4;
    mdBox.selectionStart = pos;

    mdBox.onkeydown = function(e){
      if(e.key === "Enter"){
        const curPos = mdBox.selectionStart;
        const fullText = mdBox.value;
        const closeTagPos = fullText.indexOf("</p>", curPos);
        if(closeTagPos > curPos){
          e.preventDefault();
          const finalPos = closeTagPos + 4;
          mdBox.value = fullText.slice(0, finalPos) + "\n" + fullText.slice(finalPos);
          mdBox.selectionStart = finalPos;
          mdBox.selectionEnd = finalPos;
          saveMdRecord();
          renderMdPreview();
        }
      }
    }
  }

//下载data.js文件
function downloadDataJs(isTimeStamp){
  const title = titleInput.value.trim();
  const type = typeInput.value.trim();
  let content = "";
  if(currentEditMode === "rich") content = richBox.innerHTML.trim();
  else content = mdToHtml(mdBox.value);

    return;
  }
  if(!type){
    alert("分类不能为空");
    return;
  }
  const nowTime = getNowTimeStr();
  const newId = Date.now();
  list.push({
    id: newId,
    title,
    type,
    content,
    date: nowTime
  });
  saveLocalCache();
  const jsText = getFullJsText();
  const blob = new Blob([jsText], {type:"application/javascript"});
  const a = document.createElement("a");
  let fileName = "data.js";
  if(isTimeStamp){
    const safeTime = nowTime.replace(/[: ]/g,"-");
    fileName = `data_${safeTime}.js`;
  }
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  alert(`${fileName} 下载完成，可同步仓库`);
}

let matchList = [];

// 打开弹窗
findReplaceBtn.addEventListener('click', ()=>{
  findReplaceMask.classList.add('show');
  // 获取当前选中文字，自动填入查找框
  const selText = window.getSelection().toString().trim();
  if(selText) findInput.value = selText;
  findInput.focus();
  searchIndex = 0;
  matchList = [];
});

// 关闭弹窗按钮
findReplaceClose.addEventListener('click', ()=>{
  findReplaceMask.classList.remove('show');
});
// 点击遮罩空白关闭弹窗
findReplaceMask.addEventListener('click', (e)=>{
  if(e.target === findReplaceMask){
    findReplaceMask.classList.remove('show');
  }
});

// 自动识别当前激活编辑器读取内容
function getEditorText(){
  const txtEditor = document.getElementById('mdEditor');
  const richEditor = document.getElementById('richEditor');
  // 纯文本框显示就读value，富文本显示就读innerHTML
  if(txtEditor.style.display !== 'none'){
    return txtEditor.value;
  }else{
    return richEditor.innerHTML;
  }
}
// 写入内容到当前编辑器
function setEditorText(val){
  const txtEditor = document.getElementById('mdEditor');
  const richEditor = document.getElementById('richEditor');
  if(txtEditor.style.display !== 'none'){
    txtEditor.value = val;
    saveMdRecord();
    renderMdPreview();
  }else{
    richEditor.innerHTML = val;
  }
}


// 查找下一处
findNextBtn.addEventListener('click', ()=>{
  const findText = findInput.value.trim();
  if(!findText){
    alert("请输入查找内容");
    return;
  }
  const text = getEditorText();
  const reg = new RegExp(findText, 'g');
  matchList = [];
  let match;
  while((match = reg.exec(text)) !== null){
    matchList.push(match.index);
  }
  if(matchList.length === 0){
    alert("未找到匹配内容");
    return;
  }
  if(searchIndex >= matchList.length) searchIndex = 0;
  alert(`匹配到第${searchIndex+1}/${matchList.length}处`);
  searchIndex++;
});

// 全部替换
replaceAllBtn.addEventListener('click', ()=>{
  const findText = findInput.value.trim();
  const repText = replaceInput.value;
  if(!findText){
    alert("请输入查找内容");
    return;
  }
  const oldText = getEditorText();
  const reg = new RegExp(findText, 'g');
  const newText = oldText.replace(reg, repText);
  if(oldText === newText){
    alert("未找到可替换内容");
    return;
  }
  setEditorText(newText);
  const count = (oldText.match(new RegExp(findText,'g')) || []).length;
  alert(`替换完成，共替换${count}处`);
});

// 单次替换当前匹配
const replaceSingleBtn = document.getElementById('replaceSingleBtn');
replaceSingleBtn.addEventListener('click', () => {
  const findText = findInput.value.trim();
  const repText = replaceInput.value;
  if (!findText) {
    alert("请输入查找内容");
    return;
  }
  if (matchList.length === 0) {
    alert("请先点击查找下一个定位匹配内容");
    return;
  }
  // 获取当前选中匹配位置
  const curPos = matchList[searchIndex - 1 >= 0 ? searchIndex - 1 : 0];
  let oldText = getEditorText();
  // 只截取替换当前一处
  const leftPart = oldText.slice(0, curPos);
  const rightPart = oldText.slice(curPos + findText.length);
  const newText = leftPart + repText + rightPart;
  setEditorText(newText);
  alert("已替换当前这一处");
  // 替换后重新更新全部匹配位置列表
  const freshText = getEditorText();
  const reg = new RegExp(findText, 'g');
  matchList = [];
  let match;
  while ((match = reg.exec(freshText)) !== null) {
    matchList.push(match.index);
  }
  searchIndex = 0;
});


</script>
