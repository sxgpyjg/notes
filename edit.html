<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>笔记编辑器（最终修复版）</title>
<script src="./data.js?v=1"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
body{background:linear-gradient(135deg,#f5f7fe,#eef2ff);padding:10px 10px 60px;overflow-x:hidden;}
body.keyboard-opened{padding-bottom:60px!important;}
.lock-scroll{overflow:hidden!important;touch-action:none!important;}
.tool-box{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 10px;}
.tool-bar{display:flex;gap:8px;margin-bottom:10px;}
.tool-btn{background:#fff;border:1px solid #e8ecf4;border-radius:8px;padding:8px 10px;font-size:13px;color:#333;box-shadow:0 1px 3px rgba(99,102,241,.06);cursor:pointer;transition:all .15s;}
.tool-btn:hover{background:#f0f3ff;border-color:#6366F1;}
.tool-btn:active{background:#e0e7ff;}
.title-input{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:15px;background:#fff;outline:none;margin-bottom:8px;transition:border-color .2s;}
.title-input:focus{border-color:#6366F1;}
.tags-input-wrap{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:6px 8px;margin-bottom:8px;background:#fff;display:flex;flex-wrap:wrap;align-items:center;gap:4px;min-height:38px;cursor:text;transition:border-color .2s;}
.tags-input-wrap:focus-within{border-color:#6366F1;}
.tag-chip{display:inline-flex;align-items:center;gap:3px;border-radius:99px;padding:2px 4px 2px 8px;font-size:12px;line-height:1.4;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag-chip-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag-chip-remove{display:inline-flex;width:14px;height:14px;border-radius:50%;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex-shrink:0;}
.tag-chip-remove::before{content:"×";font-weight:bold;}
.tag-chip-input{flex:1;min-width:65px;border:none;outline:none;background:transparent;font-size:13px;padding:3px 2px;}
.tags-hint{font-size:10px;color:#9ca3af;margin:-6px 0 6px 4px;}
.edit-toolbar-wrap{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #e0e3f0;z-index:100000;border-radius:12px 12px 0 0;box-shadow:0 -4px 15px rgba(0,0,0,.05);transition:bottom 0.2s;padding-bottom:0;}
body.keyboard-opened .edit-toolbar-wrap{position:fixed;bottom:var(--keyboard-height,0);}
.toolbar-main{display:flex;flex-wrap:wrap;gap:2px;padding:4px 4px;align-items:center;}
.icon-btn{border:1px solid #ddd;background:#fff;border-radius:4px;width:26px;height:26px;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.icon-btn:hover{background:#eef2ff;border-color:#6366F1;}
.icon-btn:active{background:#e0e7ff;}
.icon-btn.active-format{background:#6366F1!important;color:#fff!important;border-color:#4f46e5!important;}
.color-input{width:24px;height:24px;border:none;cursor:pointer;border-radius:3px;padding:0;}
.editor-wrap{margin-bottom:10px;}
.rich-editor{width:100%;min-height:200px;border:2px solid #e2e8f0;border-radius:10px;padding:12px;font-size:15px;outline:none;background:#fff;line-height:1.7;position:relative;}
.rich-editor:focus{border-color:#6366F1;}
.rich-editor img{max-width:100%;height:auto;border-radius:6px;margin:6px 0;display:block;cursor:pointer;}
.rich-editor a{color:#6366F1;text-decoration:underline;}
.rich-editor table{width:100%;border-collapse:collapse;margin:6px 0;}
.rich-editor th,.rich-editor td{border:1px solid #999;padding:4px 6px;min-width:40px;position:relative;vertical-align:top;}
.rich-editor td[contenteditable="true"],.rich-editor th[contenteditable="true"]{outline:none;}
.rich-editor td .table-controls{display:none;position:absolute;top:2px;right:2px;gap:2px;z-index:10;}
.rich-editor td:hover .table-controls{display:flex;}
.table-controls button{background:#6366F1;color:#fff;border:none;border-radius:2px;padding:0 4px;font-size:10px;cursor:pointer;line-height:1.5;}
.md-editor{width:100%;min-height:180px;border:2px solid #e2e8f0;border-radius:10px;padding:12px;font-size:14px;outline:none;background:#f8fafc;line-height:1.6;font-family:monospace;resize:vertical;}
.md-editor:focus{border-color:#6366F1;}
.md-preview{width:100%;min-height:180px;border:2px solid #e2e8f0;border-radius:10px;padding:12px;background:#fff;margin-top:6px;line-height:1.6;}
.md-preview img{max-width:100%;border-radius:6px;margin:6px 0;}
.mode-switch{display:flex;gap:8px;margin-bottom:6px;}
.mode-switch button{flex:1;padding:6px 0;border-radius:8px;border:2px solid #6366F1;background:#fff;color:#6366F1;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.mode-switch button.active{background:#6366F1;color:#fff;}
#imgFileInput{opacity:0;position:absolute;width:0;height:0;}
.warn{color:#e53e3e;font-size:11px;margin-bottom:6px;background:#fff2f4;padding:4px 8px;border-radius:6px;}
.tip-green{color:#16a34a;font-size:11px;margin-bottom:6px;background:#f0fdf4;padding:4px 8px;border-radius:6px;}
.login-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;padding:18px;border-radius:10px;width:85%;max-width:280px;}
.login-box input{width:100%;padding:8px;margin:8px 0;border:1px solid #ddd;border-radius:6px;}
.login-box button{width:100%;padding:8px;background:#6366F1;color:#fff;border:none;border-radius:6px;cursor:pointer;}
.find-replace-mask{position:fixed;inset:0;background:rgba(0,0,0,.25);display:none;align-items:center;justify-content:center;z-index:9999;}
.find-replace-mask.show{display:flex;}
.find-replace-box{background:rgba(255,255,255,.95);width:min(80%,300px);border-radius:12px;padding:14px;backdrop-filter:blur(8px);box-shadow:0 8px 25px rgba(0,0,0,.12);position:fixed;cursor:move;user-select:none;will-change:left,top;}
.find-replace-box input{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;margin-bottom:8px;}
.switch-wrap{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.switch{position:relative;width:36px;height:20px;flex-shrink:0;cursor:pointer;}
.switch input{opacity:0;width:0;height:0;position:absolute;}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:20px;transition:.3s;}
.slider:before{content:"";position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.switch input:checked+.slider{background:#6366F1;}
.switch input:checked+.slider:before{transform:translateX(16px);}
.private-switch-group{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:4px 8px;background:#f1f5f9;border-radius:8px;}
.private-switch-group .switch-label{font-size:13px;color:#475569;font-weight:500;}
.private-switch-group .switch-label.private{color:#dc2626;font-weight:600;}
.img-preview-mask{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999999;display:none;align-items:center;justify-content:center;}
.img-preview-mask.show{display:flex;}
.img-preview-img{max-width:95vw;max-height:95vh;object-fit:contain;}
.cursor-dragger{position:fixed;bottom:80px;left:10px;right:10px;height:30px;background:rgba(99,102,241,0.15);border-radius:15px;display:none;z-index:10000;touch-action:none;}
.cursor-dragger.show{display:flex;align-items:center;justify-content:center;}
.cursor-dragger .thumb{width:20px;height:20px;background:#6366F1;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.drag-overlay{position:fixed;inset:0;z-index:50000;background:rgba(99,102,241,0.05);touch-action:none;display:none;pointer-events:none;}
.drag-overlay.show{display:block;}
.drag-overlay .hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#6366F1;color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.net-img-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99999;display:flex;align-items:center;justify-content:center;padding:10px;animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.net-img-box{width:100%;max-width:350px;background:#fff;border-radius:12px;padding:18px;box-shadow:0 8px 30px rgba(0,0,0,.2);}
.net-img-box h2{margin:0 0 14px;font-weight:500;font-size:16px;}
.net-img-box input{width:100%;border:none;border-bottom:1px solid #999;padding:7px 0;font-size:15px;outline:none;background:transparent;margin-bottom:14px;}
.net-img-box input:focus{border-bottom-color:#6366F1;}
.net-img-actions{display:flex;gap:40px;justify-content:flex-end;}
.net-img-actions button{background:transparent;border:none;color:#009688;font-size:15px;cursor:pointer;padding:4px;}
</style>
</head>
<body>

<div id="loginWrap" class="login-modal">
  <div class="login-box">
    <h3>管理员验证</h3>
    <input type="password" id="pwdInput" placeholder="输入管理员密码">
    <button onclick="checkPwd()">确认进入</button>
  </div>
</div>

<div id="mainWrap" style="display:none">
<div class="tool-bar">
  <button class="tool-btn" onclick="location.href='index.html'">主页</button>
  <button class="tool-btn" onclick="location.href='admin-list.html'">管理页</button>
  <button class="tool-btn" onclick="logoutAdmin()">退出登录</button>
</div>
<div class="tip-green" id="wordCountTip">纯文字数：0 | 总字符：0</div>
<div class="tool-box">
  <button class="tool-btn" id="copyJsonBtn">一键复制data.js</button>
  <button class="tool-btn" id="showTemplateBtn">生成推送命令</button>
  <button class="tool-btn" id="downloadDataBtn">下载data.js</button>
  <button class="tool-btn" id="batchImgBtn">批量图床链接</button>
</div>
<input type="file" id="imgFileInput" multiple style="display:none;">
<input class="title-input" placeholder="填写笔记标题">

<div class="tags-input-wrap" id="tagsInputWrap">
  <input type="text" class="tag-chip-input" id="tagChipInput" placeholder="添加标签（回车确认）">
</div>
<div class="tags-hint">回车添加，点击色块换颜色，× 删除</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px;">
  <div class="private-switch-group" style="margin-bottom:0;padding:4px 8px;">
    <label class="switch"><input type="checkbox" id="privateCheck"><span class="slider"></span></label>
    <span class="switch-label private">设为私密</span>
  </div>
  <div class="switch-wrap" style="margin-bottom:0;">
    <label class="switch">
      <input type="checkbox" id="useDownloadCheck">
      <span class="slider"></span>
    </label>
    <span class="switch-label" style="font-size:13px;">下载方式</span>
  </div>
  <span style="font-size:11px;color:#94a3b8;">（仅管理员可见 | 关闭则内联data.js）</span>
</div>

<div class="mode-switch">
  <button id="modeRich" class="active" onclick="switchMode('rich')">富文本</button>
  <button id="modeMd" onclick="switchMode('md')">Markdown</button>
</div>

<div class="edit-toolbar-wrap" id="editToolbar">
  <div class="toolbar-main">
    <button class="icon-btn" data-tip="撤销" onclick="globalUndo()">↩</button>
    <button class="icon-btn" data-tip="重做" onclick="globalRedo()">↪</button>
    <input type="color" class="color-input" id="fontColor" value="#000000" title="文字颜色">
    <input type="color" class="color-input" id="bgColor" value="#fff2cc" title="底色">
    <button class="icon-btn" data-tip="加粗" onclick="formatBold()"><strong>B</strong></button>
    <button class="icon-btn" data-tip="斜体" onclick="formatItalic()"><em>I</em></button>
    <button class="icon-btn" data-tip="下划线" onclick="insertUnderline()"><u>U</u></button>
    <button class="icon-btn" data-tip="删除线" onclick="formatStrikeThrough()" style="text-decoration:line-through;">S</button>
    <button class="icon-btn" data-tip="清除格式" onclick="clearTextFormat()">T</button>
    <button class="icon-btn" data-tip="居中" onclick="insertCenter()">≡</button>
    <button class="icon-btn" data-tip="H1" onclick="insertH1()">H1</button>
    <button class="icon-btn" data-tip="H2" onclick="insertH2()">H2</button>
    <button class="icon-btn" data-tip="H3" onclick="insertH3()">H3</button>
    <button class="icon-btn" data-tip="代码块" onclick="insertMdCode()">&lt;/&gt;</button>
    <select id="fontSizeSel" style="height:24px;width:36px;border:1px solid #ddd;border-radius:3px;font-size:11px;">
      <option value="12px">12</option><option value="14px">14</option><option value="16px" selected>16</option>
      <option value="18px">18</option><option value="20px">20</option>
    </select>
    <button class="icon-btn" data-tip="行内代码" onclick="insertInlineCode()">`</button>
    <button class="icon-btn" data-tip="引用" onclick="insertQuote()">></button>
    <button class="icon-btn" data-tip="无序列表" onclick="insertUl()">•</button>
    <button class="icon-btn" data-tip="有序列表" onclick="insertOrderedList()">1.</button>
    <button class="icon-btn" data-tip="任务列表" onclick="insertTaskList()">☐</button>
    <button class="icon-btn" data-tip="表格" onclick="insertTable()">▦</button>
    <button class="icon-btn" data-tip="链接" onclick="insertLink()">[]()</button>
    <button class="icon-btn" data-tip="本地图片" id="localImgBtn">🖼</button>
    <button class="icon-btn" data-tip="网络图床" id="netImgBtn">🌐</button>
    <button class="icon-btn" data-tip="清空" onclick="clearAllNotesContent()">🗑️</button>
    <button class="icon-btn" data-tip="查找" id="findReplaceBtn">🔍</button>
    <button class="icon-btn" data-tip="分割线" onclick="splitLine1()">—</button>
    <button class="icon-btn" data-tip="拖曳光标" id="dragModeToggle">✋</button>
    <input type="file" id="hiddenImgFile" multiple style="display:none;">
  </div>
</div>

<div class="editor-wrap">
  <div class="rich-editor" id="richEditor" contenteditable="true"></div>
  <textarea class="md-editor" id="mdEditor" style="display:none" placeholder="Markdown..."></textarea>
  <div class="md-preview" id="mdPreview" style="display:none"></div>
</div>
</div>

<div class="find-replace-mask" id="findReplaceMask">
  <div class="find-replace-box" id="findReplaceBox">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
      <span style="font-weight:600;font-size:14px;">查找替换</span>
      <button id="findReplaceClose" style="border:none;background:transparent;font-size:16px;cursor:pointer;">×</button>
    </div>
    <input type="text" id="findInput" placeholder="查找">
    <input type="text" id="replaceInput" placeholder="替换为">
    <div class="switch-wrap">
      <label class="switch"><input type="checkbox" id="matchCase"><span class="slider"></span></label>
      <span style="font-size:12px;">区分大小写</span>
    </div>
    <div style="display:flex;gap:4px;">
      <button class="tool-btn" id="findNextBtn" style="flex:1;padding:4px 0;font-size:12px;">下一处</button>
      <button class="tool-btn" id="replaceSingleBtn" style="flex:1;padding:4px 0;font-size:12px;">替换</button>
      <button class="tool-btn" id="replaceAllBtn" style="flex:1;padding:4px 0;font-size:12px;background:#6366F1;color:#fff;">全部</button>
    </div>
  </div>
</div>

<div class="img-preview-mask" id="imgPreviewMask">
  <img class="img-preview-img" id="previewImg">
</div>

<div class="drag-overlay" id="dragOverlay">
  <div class="hint">拖曳移动光标 · 点 ✋ 按钮或按返回键退出</div>
</div>

<script>
/* ================= 全局 ================= */
const ADMIN_PASSWORD = "admin123";
const CACHE_KEY = "note_temp_data";
const RICH_RECORD_MAX = 30;
const TAG_COLOR_PRESETS = ['#6366F1','#EC4899','#10B981','#F59E0B','#3B82F6','#EF4444','#8B5CF6','#14B8A6','#F97316','#84CC16'];

let list = [], targetNote = null;
const editId = new URLSearchParams(location.search).get("id");
let imgUploadList = [], currentEditMode = "rich";
let mdRecordStack = [], mdRecordIndex = -1;
let richRecordStack = [], richRecordIndex = -1;
let currentTags = [], tagColorMap = {};
let globalImgSerial = Number(localStorage.getItem("img_serial")||0);
let searchIndex = 0, matchList = [], matchCase = false;
let dragActive = false;

const titleInput = document.querySelector(".title-input");
const tagChipInput = document.getElementById("tagChipInput");
const tagsInputWrap = document.getElementById("tagsInputWrap");
const richBox = document.getElementById("richEditor");
const mdBox = document.getElementById("mdEditor");
const mdPreviewBox = document.getElementById("mdPreview");
const wordCountTip = document.getElementById("wordCountTip");
const richModeBtn = document.getElementById("modeRich");
const mdModeBtn = document.getElementById("modeMd");
const fontSizeSelect = document.getElementById("fontSizeSel");
const fontColorInput = document.getElementById("fontColor");
const bgColorInput = document.getElementById("bgColor");
const imgFileInput = document.getElementById("imgFileInput");
const hiddenImgFile = document.getElementById("hiddenImgFile");
const findReplaceMask = document.getElementById("findReplaceMask");
const findInput = document.getElementById("findInput");
const replaceInput = document.getElementById("replaceInput");
const matchCaseCheck = document.getElementById("matchCase");
const cursorDragger = document.getElementById("cursorDragger");
const netImgBtn = document.getElementById("netImgBtn");
const editToolbar = document.getElementById("editToolbar");
const dragOverlay = document.getElementById("dragOverlay");
const dragModeToggle = document.getElementById("dragModeToggle");

/* ================= 安全 execCommand（核心修复） ================= */
function safeExecCommand(cmd, showUI, value) {
  richBox.focus();
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  document.execCommand(cmd, showUI, value);
  // 强制恢复光标到末尾
  richBox.focus();
  if (sel.rangeCount) {
    const r = sel.getRangeAt(0);
    r.collapse(false);
    sel.removeAllRanges();
    sel.addRange(r);
  }
  calcWordCount();
}

/* ================= 工具 ================= */
function getNowTimeStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function addImgSerial(){ globalImgSerial++; localStorage.setItem("img_serial",globalImgSerial); }

/* ================= 标签 ================= */
function getTagColor(t){
  const k = t.toLowerCase().trim();
  if (tagColorMap[k]) return tagColorMap[k];
  const idx = currentTags.findIndex(x => x.toLowerCase() === k);
  return tagColorMap[k] = TAG_COLOR_PRESETS[idx % TAG_COLOR_PRESETS.length];
}
function setTagColor(t,c){
  const k = t.toLowerCase().trim();
  if (!c) return;
  tagColorMap[k] = c;
  renderTagsChips();
}
function renderTagsChips(){
  tagsInputWrap.querySelectorAll('.tag-chip').forEach(n => n.remove());
  currentTags.forEach((t,i) => {
    const c = getTagColor(t);
    let textColor = c, bgColor = c + '22';
    if (c === '#000000' || c === '#000') { textColor = '#fff'; bgColor = '#333'; }
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.style.cssText = `background:${bgColor};border-left:3px solid ${c};color:${textColor};`;
    const dot = document.createElement('span');
    dot.style.cssText = `display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};margin-right:3px;cursor:pointer;`;
    dot.onclick = e => { e.stopPropagation(); pickTagColorAtIndex(i); };
    const txt = document.createElement('span'); txt.className = 'tag-chip-text'; txt.textContent = t;
    const rm = document.createElement('span'); rm.className = 'tag-chip-remove';
    rm.onclick = e => { e.stopPropagation(); removeTagAt(i); };
    chip.append(dot, txt, rm);
    tagsInputWrap.insertBefore(chip, tagChipInput);
  });
}
function addTag(r){
  const s = String(r||'').trim(); if (!s || s.length > 20) return;
  if (currentTags.some(t => t.toLowerCase() === s.toLowerCase())) { tagChipInput.value = ''; return; }
  if (currentTags.length >= 10) { alert('最多10个标签'); tagChipInput.value = ''; return; }
  currentTags.push(s);
  tagColorMap[s.toLowerCase()] = TAG_COLOR_PRESETS[currentTags.length % TAG_COLOR_PRESETS.length];
  renderTagsChips(); tagChipInput.value = '';
}
function removeTagAt(i){ if (i >= 0 && i < currentTags.length) { currentTags.splice(i,1); renderTagsChips(); } }
function setCurrentTags(arr, m = {}){
  currentTags = []; tagColorMap = {};
  (arr || []).forEach((t,i) => {
    const s = String(t||'').trim().toLowerCase();
    if (!s || currentTags.includes(s)) return;
    currentTags.push(t);
    tagColorMap[s] = (m && m[s]) ? m[s] : TAG_COLOR_PRESETS[i % TAG_COLOR_PRESETS.length];
  });
  renderTagsChips();
}
tagChipInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(tagChipInput.value); }
  if (e.key === 'Backspace' && !tagChipInput.value && currentTags.length) removeTagAt(currentTags.length - 1);
});

/* ================= 数据 ================= */
function saveLocalCache(){
  localStorage.setItem(CACHE_KEY, JSON.stringify({
    list, targetId: targetNote?.id, imgUploadList, serial: globalImgSerial
  }));
}
function loadLocalCache(){
  list = (window.NOTE_DATA && Array.isArray(window.NOTE_DATA))
    ? JSON.parse(JSON.stringify(window.NOTE_DATA))
    : [];
  const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
  if (cache.list) cache.list.forEach(d => { if (!list.find(i => i.id === d.id)) list.push(d); });
}
function syncFormToNoteList(){
  const tags = currentTags.slice();
  const note = {
    id: targetNote?.id || Date.now(),
    title: titleInput.value.trim(),
    type: tags[0] || '',
    tags,
    tagColors: Object.fromEntries(Object.entries(tagColorMap)),
    content: currentEditMode === 'rich' ? richBox.innerHTML : mdToHtml(mdBox.value),
    date: getNowTimeStr(),
    private: document.getElementById('privateCheck').checked
  };
  delete note._isTempNew;
  const idx = list.findIndex(i => i.id === note.id);
  if (idx > -1) list[idx] = note; else list.push(note);
  targetNote = note;
  saveLocalCache();
  localStorage.setItem("notes", JSON.stringify(list));
  window.NOTE_DATA = list;
}

/* ================= 登录 ================= */
function checkPwd(){
  if (document.getElementById("pwdInput").value !== ADMIN_PASSWORD) return alert("密码错误");
  localStorage.setItem("admin_login_expire", Date.now() + 8*3600000);
  document.getElementById("loginWrap").style.display = "none";
  document.getElementById("mainWrap").style.display = "block";
  loadLocalCache(); setTimeout(initLoadNote, 100);
}
(function(){
  if (Number(localStorage.getItem("admin_login_expire") || 0) > Date.now()) {
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("mainWrap").style.display = "block";
    loadLocalCache(); setTimeout(initLoadNote, 300);
  }
})();
function logoutAdmin(){ localStorage.clear(); location.reload(); }

/* ================= 初始化 ================= */
function initLoadNote(){
  imgUploadList = [];
  if (editId === 'new' || !editId) {
    targetNote = {
      id: Date.now(),
      title: "", type: "", tags: [], tagColors: {}, content: "",
      date: getNowTimeStr(), private: false, _isTempNew: true
    };
    list.unshift(targetNote);
  } else {
    targetNote = list.find(i => i.id === Number(editId));
    if (!targetNote) { alert("笔记不存在"); location.href = "index.html"; return; }
  }
  titleInput.value = targetNote.title || '';
  setCurrentTags(targetNote.tags || [], targetNote.tagColors || {});
  document.getElementById("privateCheck").checked = !!targetNote.private;
  richBox.innerHTML = targetNote.content || '';
  richRecordStack = [richBox.innerHTML]; richRecordIndex = 0;
  mdBox.value = htmlToMd(targetNote.content || "").replace(/\n{3,}/g, "\n\n");
  saveMdRecord(); renderMdPreview(); checkFormatActive(); calcWordCount();
}

/* ================= 模式切换 ================= */
function switchMode(m){
  currentEditMode = m;
  richModeBtn.classList.toggle("active", m === "rich");
  mdModeBtn.classList.toggle("active", m === "md");
  if (m === "rich") {
    richBox.innerHTML = mdToHtml(mdBox.value);
    richBox.style.display = "block"; mdBox.style.display = "none"; mdPreviewBox.style.display = "none";
    richRecordStack = [richBox.innerHTML]; richRecordIndex = 0;
    checkFormatActive();
  } else {
    mdBox.value = htmlToMd(richBox.innerHTML).replace(/\n{3,}/g, "\n\n");
    richBox.style.display = "none"; mdBox.style.display = "block"; mdPreviewBox.style.display = "block";
    saveMdRecord(); renderMdPreview();
  }
  calcWordCount();
}

/* ================= MD / HTML ================= */
function mdToHtml(s){
  let h = s.replace(/```([\s\S]*?)```/g, '<pre style="background:#f5f5f5;padding:8px;border-radius:6px;white-space:pre-wrap;"><code>$1</code></pre>');
  h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>')
    .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;margin:6px 0;display:block;">');
  return h.replace(/\n/g,'<br>');
}
function htmlToMd(s){
  return s.replace(/<pre[\s\S]*?<\/pre>/g,'```\n$1\n```')
    .replace(/<h1>(.*?)<\/h1>/g,'# $1')
    .replace(/<img[^>]*src="([^"]+)"[^>]*alt="([^"]*)"[^>]*>/g,'![$2]($1)')
    .replace(/<br\s*\/?>/g,'\n');
}
function renderMdPreview(){ mdPreviewBox.innerHTML = mdToHtml(mdBox.value); }

/* ================= 撤销重做 ================= */
function saveMdRecord(){
  mdRecordStack.splice(mdRecordIndex + 1);
  mdRecordStack.push(mdBox.value);
  mdRecordIndex = mdRecordStack.length - 1;
}
function mdUndo(){ if (mdRecordIndex <= 0) return; mdRecordIndex--; mdBox.value = mdRecordStack[mdRecordIndex]; renderMdPreview(); calcWordCount(); }
function mdRedo(){ if (mdRecordIndex >= mdRecordStack.length - 1) return; mdRecordIndex++; mdBox.value = mdRecordStack[mdRecordIndex]; renderMdPreview(); calcWordCount(); }
function globalUndo(){
  if (currentEditMode === 'rich' && richRecordIndex > 0) {
    richRecordIndex--; richBox.innerHTML = richRecordStack[richRecordIndex]; checkFormatActive(); calcWordCount();
  } else mdUndo();
}
function globalRedo(){
  if (currentEditMode === 'rich' && richRecordIndex < richRecordStack.length - 1) {
    richRecordIndex++; richBox.innerHTML = richRecordStack[richRecordIndex]; checkFormatActive(); calcWordCount();
  } else mdRedo();
}
richBox.addEventListener('input', () => {
  richRecordStack.splice(richRecordIndex + 1);
  richRecordStack.push(richBox.innerHTML);
  if (richRecordStack.length > RICH_RECORD_MAX) richRecordStack.shift();
  richRecordIndex = richRecordStack.length - 1;
  checkFormatActive(); calcWordCount();
});
mdBox.addEventListener('input', () => { saveMdRecord(); renderMdPreview(); calcWordCount(); });

/* ================= 格式检测 ================= */
function checkFormatActive(){
  document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active-format'));
  if (currentEditMode !== 'rich') return;
  if (document.queryCommandState('bold')) document.querySelector('[onclick="formatBold()"]')?.classList.add('active-format');
  if (document.queryCommandState('italic')) document.querySelector('[onclick="formatItalic()"]')?.classList.add('active-format');
  if (document.queryCommandState('underline')) document.querySelector('[onclick="insertUnderline()"]')?.classList.add('active-format');
  if (document.queryCommandState('strikeThrough')) document.querySelector('[onclick="formatStrikeThrough()"]')?.classList.add('active-format');
  const sel = window.getSelection(); if (!sel.rangeCount) return;
  let el = sel.getRangeAt(0).commonAncestorContainer;
  while (el.nodeType === 1) {
    if (el.tagName === 'H1') { document.querySelector('[onclick="insertH1()"]')?.classList.add('active-format'); break; }
    if (el.tagName === 'H2') { document.querySelector('[onclick="insertH2()"]')?.classList.add('active-format'); break; }
    if (el.tagName === 'H3') { document.querySelector('[onclick="insertH3()"]')?.classList.add('active-format'); break; }
    el = el.parentNode; if (el === richBox) break;
  }
}
document.addEventListener('selectionchange', checkFormatActive);

/* ================= 字数统计 ================= */
function calcWordCount(){
  const t = currentEditMode === 'rich' ? (richBox.innerText || '') : mdBox.value;
  wordCountTip.innerText = `纯文字数：${t.replace(/\s/g,'').length} | 总字符：${t.length}`;
}

/* ================= 格式化（全部走安全封装） ================= */
function formatBold(){ safeExecCommand('bold'); }
function formatItalic(){ safeExecCommand('italic'); }
function formatStrikeThrough(){ safeExecCommand('strikeThrough'); }
function insertUnderline(){ safeExecCommand('underline'); }
function clearTextFormat(){ safeExecCommand('removeFormat'); }
function insertCenter(){
  richBox.focus();
  let b = window.getSelection().getRangeAt(0).commonAncestorContainer;
  while (b && b !== richBox) {
    if (b.style && b.style.textAlign === 'center') { b.style.textAlign = ''; return; }
    b = b.parentNode;
  }
  safeExecCommand('justifyCenter');
}
function insertH1(){ safeExecCommand('formatBlock', false, '<h1>'); }
function insertH2(){ safeExecCommand('formatBlock', false, '<h2>'); }
function insertH3(){ safeExecCommand('formatBlock', false, '<h3>'); }
function insertMdCode(){
  if (currentEditMode === 'rich') {
    safeExecCommand('insertHTML', false, '<pre style="background:#f5f5f5;padding:8px;border-radius:6px;"><code>\n</code></pre><br>');
  } else {
    mdBox.value += '```\n\n```\n'; saveMdRecord(); renderMdPreview(); calcWordCount();
  }
}
function insertInlineCode(){
  if (currentEditMode === 'rich') {
    safeExecCommand('insertText', false, '``');
  } else {
    mdBox.value += '``'; saveMdRecord(); renderMdPreview(); calcWordCount();
  }
}
function insertLink(){
  if (currentEditMode === 'rich') {
    richBox.focus();
    const sel = window.getSelection();
    const text = sel.toString() || '链接';
    safeExecCommand('insertHTML', false, `<a href="https://example.com" target="_blank">${text}</a>&nbsp;`);
  } else {
    mdBox.value += '[文字](链接地址)'; saveMdRecord(); renderMdPreview(); calcWordCount();
  }
}
function insertTable(){
  const rows = parseInt(prompt("行数", "3")) || 3;
  const cols = parseInt(prompt("列数", "2")) || 2;
  let html = '<table style="border-collapse:collapse;width:100%;margin:6px 0;">';
  for (let r = 0; r < rows; r++) {
    html += '<tr>';
    for (let c = 0; c < cols; c++) {
      const tag = r === 0 ? 'th' : 'td';
      html += `<${tag} contenteditable="true" style="border:1px solid #999;padding:4px 6px;">${r===0?'标题':'内容'}</${tag}>`;
    }
    html += '</tr>';
  }
  html += '</table><br>';
  if (currentEditMode === 'rich') {
    safeExecCommand('insertHTML', false, html);
  } else {
    mdBox.value += html; saveMdRecord(); renderMdPreview(); calcWordCount();
  }
}
function insertQuote(){ currentEditMode==='rich'?safeExecCommand('insertText','> '):mdBox.value+='> '; }
function insertUl(){ currentEditMode==='rich'?safeExecCommand('insertText','- '):mdBox.value+='- '; }
function insertOrderedList(){ currentEditMode==='rich'?safeExecCommand('insertText','1. '):mdBox.value+='1. '; }
function insertTaskList(){ currentEditMode==='rich'?safeExecCommand('insertText','- [ ] '):mdBox.value+='- [ ] '; }
function splitLine1(){ currentEditMode==='rich'?safeExecCommand('insertText','---\n'):mdBox.value+='\n---\n'; }
function clearAllNotesContent(){ richBox.innerHTML=''; mdBox.value=''; renderMdPreview(); }

/* ================= 图片 ================= */
function insertLocalImgTagTerminal(safeName) {
  const url = `https://cdn.jsdelivr.net/gh/sxgpyjg/notes@main/images/${safeName}`;
  if (currentEditMode === 'rich') {
    safeExecCommand('insertHTML', false, `<img loading="lazy" src="${url}" alt="本地图片" style="max-width:100%;margin:6px 0;display:block;" onerror="this.alt='图片加载失败'"><br>`);
  } else {
    mdBox.value += `![本地图](${url})\n\n`; saveMdRecord(); renderMdPreview(); calcWordCount();
  }
}
function handleFileSelect(files){
  Array.from(files).forEach(file => {
    const safeName = file.name.replace(/[^\w\u4e00-\u9fa5\-\.]/g, '_');
    insertLocalImgTagTerminal(safeName);
  });
}
document.getElementById('localImgBtn').onclick = () => imgFileInput.click();
imgFileInput.onchange = e => { handleFileSelect(e.target.files); e.target.value = ''; };

/* 网络图片 */
netImgBtn.onclick = () => {
  const mask = document.createElement('div');
  mask.className = 'net-img-mask';
  mask.innerHTML = `
    <div class="net-img-box">
      <h2>插入网络图片</h2>
      <input id="imgUrl" placeholder="https://">
      <input id="imgAlt" placeholder="描述">
      <div class="net-img-actions">
        <button id="cancelImg">取消</button>
        <button id="okImg">插入</button>
      </div>
    </div>`;
  document.body.appendChild(mask);
  mask.querySelector('#okImg').onclick = () => {
    const url = mask.querySelector('#imgUrl').value.trim();
    const alt = mask.querySelector('#imgAlt').value.trim() || '配图';
    if (!url.startsWith('http')) return alert('非法链接');
    if (currentEditMode === 'rich') {
      safeExecCommand('insertHTML', false, `<img src="${url}" alt="${alt}" style="max-width:100%;margin:6px 0;display:block;"><br>`);
    } else {
      mdBox.value += `![${alt}](${url})\n\n`; saveMdRecord(); renderMdPreview(); calcWordCount();
    }
    mask.remove();
  };
  mask.onclick = e => { if (e.target === mask) mask.remove(); };
};

/* 图片预览（事件委托） */
richBox.addEventListener('click', e => {
  if (e.target.tagName === 'IMG') {
    document.getElementById('previewImg').src = e.target.src;
    document.getElementById('imgPreviewMask').classList.add('show');
  }
});
document.getElementById('imgPreviewMask').onclick = () => {
  document.getElementById('imgPreviewMask').classList.remove('show');
};

/* ================= 查找替换 ================= */
document.getElementById('findReplaceBtn').onclick = () => {
  findReplaceMask.classList.add('show');
  findInput.focus();
};
document.getElementById('findReplaceClose').onclick = () => {
  findReplaceMask.classList.remove('show');
};
document.getElementById('findNextBtn').onclick = () => {
  const q = findInput.value;
  if (!q) return;
  const text = currentEditMode === 'rich' ? richBox.innerText : mdBox.value;
  const idx = text.indexOf(q, searchIndex);
  if (idx === -1) { alert('未找到'); searchIndex = 0; return; }
  searchIndex = idx + q.length;
  if (currentEditMode === 'md') {
    mdBox.focus();
    mdBox.selectionStart = idx;
    mdBox.selectionEnd = idx + q.length;
  }
};
document.getElementById('replaceAllBtn').onclick = () => {
  if (currentEditMode !== 'md') return alert('仅支持MD');
  const reg = new RegExp(findInput.value, matchCase ? 'g' : 'gi');
  mdBox.value = mdBox.value.replace(reg, replaceInput.value);
  saveMdRecord(); renderMdPreview(); calcWordCount();
};

/* ================= 拖拽光标 ================= */
function setDragMode(on){
  dragActive = !!on;
  dragModeToggle.style.background = dragActive ? '#6366F1' : '';
  dragModeToggle.style.color = dragActive ? '#fff' : '';
  dragOverlay.classList.toggle('show', dragActive);
}
dragModeToggle.onclick = () => setDragMode(!dragActive);

/* ================= 快捷键 ================= */
window.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); document.getElementById('copyJsonBtn').click(); }
  if (e.key === 'Escape' && dragActive) setDragMode(false);
});

/* ================= 初始化 ================= */
window.addEventListener("DOMContentLoaded", () => {
  renderMdPreview();
  calcWordCount();
});
</script>
