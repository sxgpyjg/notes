<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>笔记编辑器（完整移植纯写作原生交互）</title>
<script src="./data.js?v=1"></script>

<!-- 公式渲染KaTeX -->
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,-apple-system,sans-serif;
}
html,body{
  height:100%;
  overflow-x:hidden;
}
body{
  background:#f7f8fc;
  padding:10px 10px 110px;
}
/* 滚动穿透锁定 */
.lock-scroll{
  overflow:hidden !important;
  touch-action:none !important;
}

/* 双列按钮 绝对均分对称 */
.tool-box,.tool-row,.save-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin:8px 0 10px;
}

.tool-bar{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.link-btn{
  border:0;
  border-radius:10px;
  padding:9px 0;
  font-size:14px;
  color:#fff;
  flex:1;
  min-width:0;
}
.blog-link{
  background:#10b981;
}
.album-link{
  background:#f97316;
}

.tool-btn{
  background:#ffffff;
  border:0;
  border-radius:8px;
  padding:10px 6px;
  font-size:14px;
  box-shadow:0 1px 4px rgba(99,102,241,0.06);
  transition:0.2s;
}
.tool-btn:active{
  background:#edefff;
}

.save-btn{
  background:#6366F1;
  color:white;
  border:0;
  border-radius:8px;
  padding:11px 0;
  width:100%;
  font-size:15px;
  box-shadow:0 2px 6px rgba(99,102,241,0.15);
}
.save-btn-time{
  background:#4f46e5;
}
#exportFullBackup{
  background:#22c55e;
}
#importBackup{
  background:#f59e0b;
}
.save-btn:active{
  opacity:0.9;
}

.title-input,.type-input,.tag-text-input{
  width:100%;
  border:1px solid #e0e3f0;
  border-radius:8px;
  padding:10px;
  font-size:15px;
  margin-bottom:10px;
  outline:none;
  background:#fff;
}
.title-input:focus,.type-input:focus,.tag-text-input:focus{
  border-color:#6366F1;
}
/* 新增标签徽章容器+样式 */
.tag-badge-wrap {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.tag-badge {
  background:#e8eaff;
  color:#3950cc;
  font-size:12px;
  padding:3px 8px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:4px;
}
.tag-badge button {
  border:none;
  background:transparent;
  cursor:pointer;
  font-weight:bold;
  padding:0 4px;
}
.tag-badge button:active {
  color:#f43f5e;
}

.edit-toolbar-wrap{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  border-top:1px solid #e0e3f0;
  z-index:999;
  padding-bottom: env(safe-area-inset-bottom);
}
body.keyboard-opened .edit-toolbar-wrap{
  position:absolute;
}
.toolbar-main{
  display:flex;
  flex-wrap:wrap;
  gap:1px;
  padding:4px 6px;
  align-items:center;
}
.toolbar-more{
  display:none;
  padding:4px 6px;
  border-top:1px solid #eee;
  grid-template-columns:repeat(8, 1fr);
  gap:0px;
}
.toolbar-more.show{
  display:grid;
}

/* 底部小图标按钮 统一大小 */
.icon-btn{
  border:1px solid #ddd;
  background:#fff;
  border-radius:2px;
  width:24px;
  height:24px;
  font-size:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
  touch-action:none;
}
.icon-btn:active{
  background:#eef2ff;
}
.icon-btn.active-format{
  background:#6366F1 !important;
  color:#fff !important;
  border-color:#4f46e5 !important;
}
@media (min-width:769px){
  .icon-btn:hover::after{
    content:attr(data-tip);
    position:absolute;
    bottom:110%;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    color:#fff;
    font-size:10px;
    padding:2px 4px;
    border-radius:3px;
    white-space:nowrap;
    z-index:9999;
  }
}

.edit-toolbar select{
  border:1px solid #ddd;
  border-radius:3px;
  padding:2px;
  font-size:11px;
  height:24px;
  width:38px;
}
.color-input{
  width:24px;
  height:24px;
  border:none;
  cursor:pointer;
  border-radius:3px;
}

.editor-wrap{
  margin-bottom:10px;
}
.rich-editor{
  width:100%;
  min-height:560px;
  border:1px solid #e0e3f0;
  border-radius:8px;
  padding:10px;
  font-size:15px;
  outline:none;
  background:#fff;
  line-height:1.7;
  position:relative;
}
.rich-editor img{
  max-width:100%;
  height:auto;
  border-radius:6px;
  margin:8px 0;
  display:block;
  content-visibility:auto;
  loading:lazy;
}
.md-editor{
  width:100%;
  min-height:280px;
  border:1px solid #e0e3f0;
  border-radius:8px;
  padding:10px;
  font-size:15px;
  outline:none;
  background:#fff;
  line-height:1.7;
  font-family:monospace;
  resize:vertical;
}
.md-preview{
  width:100%;
  min-height:280px;
  border:1px solid #e0e3f0;
  border-radius:8px;
  padding:10px;
  background:#fff;
  margin-top:6px;
  line-height:1.7;
}

/* 代码块强制换行兼容vivo浏览器 */
.rich-editor pre code,
.md-editor pre code {
  white-space:pre-wrap !important;
  word-break:break-all !important;
}

/* 模式切换按钮 左右完全一样大 */
.mode-switch{
  margin-bottom:8px;
  display:flex;
  gap:8px;
}
.mode-switch button{
  flex:1;
  padding:8px 0;
  border-radius:8px;
  border:1px solid #6366F1;
  background:#fff;
  color:#6366F1;
  font-size:14px;
}
.mode-switch button.active{
  background:#6366F1;
  color:#fff;
}

#imgFileInput,#backupFileInput,#hiddenImgFile1,#hiddenImgFile2{
  opacity:0;
  position:absolute;
  width:0;
  height:0;
  pointer-events:auto;
}
.warn{
  color:#e53e3e;
  font-size:12px;
  margin-bottom:8px;
  background:#fff2f4;
  padding:5px 8px;
  border-radius:6px;
}
.tip-green{
  color:#16a34a;
  font-size:12px;
  margin-bottom:8px;
  background:#f0fdf4;
  padding:5px 8px;
  border-radius:6px;
}
.tip-red{
  color:#dc2626;
  font-weight:bold;
  font-size:13px;
  margin-bottom:8px;
  background:#fee2e2;
  padding:6px 8px;
  border-radius:6px;
}
body.bg-dark .tip-green, body.bg-midnight .tip-green{
  background:#163428;
  color:#86efac;
}
body.bg-dark .warn, body.bg-midnight .warn{
  background:#421a22;
  color:#fca5a5;
}

.login-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.login-box{
  background:#fff;
  padding:18px;
  border-radius:10px;
  width:90%;
  max-width:300px;
}
.login-box input[type="password"]{
  width:100%;
  padding:9px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:6px;
}
.login-box button{
  width:100%;
  padding:9px;
  background:#6366F1;
  color:#fff;
  border:none;
  border-radius:6px;
}

.img-collapse{
  border:1px solid #dbeafe;
  border-radius:8px;
  margin:8px 0;
  overflow:hidden;
}
.img-collapse-head{
  padding:10px 12px;
  background:#eff6ff;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:500;
  font-size:14px;
}
.img-collapse-body{
  padding:10px;
  display:none;
}
.img-collapse-body.show{
  display:block;
}
.arrow{
  transition:transform 0.2s;
}
.arrow.rotate{
  transform:rotate(180deg);
}

.img-quick-btn{
  background:#eef2ff;
  color:#4338ca;
  border:0;
  border-radius:4px;
  padding:3px 6px;
  font-size:12px;
  margin-bottom:6px;
}

body.keyboard-opened{
  padding-bottom:30px;
}

.modal-mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}
.modal-box{
  width:100%;
  max-width:400px;
  background:#fff;
  border-radius:12px;
  padding:18px;
}
.modal-input{
  width:100%;
  border:none;
  border-bottom:1px solid #999;
  padding:7px 0;
  font-size:15px;
  outline:none;
  background:transparent;
}
.modal-btn{
  background:transparent;
  border:none;
  color:#009688;
  font-size:16px;
}

.rich-editor table {
  width:100%;
  border-collapse: collapse;
  margin:6px 0;
}
.rich-editor th,
.rich-editor td {
  border:1px solid #999;
  padding:5px 6px;
  min-width:50px;
}
.md-preview table {
  width:100%;
  border-collapse: collapse;
  margin:6px 0;
}
.md-preview th,
.md-preview td {
  border:1px solid #999;
  padding:5px 6px;
  min-width:50px;
}
/* 查找替换弹窗样式 */
.find-replace-mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  overflow: hidden;
  touch-action: none;
}
.find-replace-mask.show{
  display:flex;
}
.find-replace-box{
  background:rgba(255,255,255,0.85);
  width:min(80%, 320px);
  border-radius:12px;
  padding:12px;
  backdrop-filter: blur(6px);
  position: absolute;
  cursor: move;
  will-change: left, top;
}
/* 深色主题查找替换弹窗适配 */
body.bg-dark .find-replace-box,
body.bg-midnight .find-replace-box{
  background:rgba(30,30,40,0.9);
  color:#eee;
}
body.bg-dark .find-replace-item input,
body.bg-midnight .find-replace-item input{
  background:#222;
  color:#fff;
  border-color:#555;
}

.find-replace-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
.find-replace-title{
  font-size:15px;
  font-weight:600;
}
.find-replace-close{
  border:none;
  background:transparent;
  font-size:18px;
  color:#666;
  cursor:pointer;
}
body.bg-dark .find-replace-close,
body.bg-midnight .find-replace-close{
  color:#ddd;
}
.find-replace-item{
  margin-bottom:10px;
}
.find-replace-item label{
  display:block;
  font-size:12px;
  color:#444;
  margin-bottom:3px;
}
body.bg-dark .find-replace-item label,
body.bg-midnight .find-replace-item label{
  color:#ddd;
}
.find-replace-item input{
  width:100%;
  padding:7px 10px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:13px;
}
.find-replace-btns{
  display:flex;
  gap:5px;
  margin-top:12px;
}
.find-replace-btns button{
  flex:1;
  padding:7px 2px;
  border:none;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
}
.btn-find{
  background:#e0e7ff;
  color:#2d3748;
}
.btn-replace-all{
  background:#6366F1;
  color:#fff;
}

/* 下拉框样式，和字号选择器统一 */
.editor-bg-select{
  border:1px solid #ddd;
  border-radius:3px;
  padding:2px;
  font-size:11px;
  height:24px;
  width:38px;
}

/* 过渡动画 */
.rich-editor, .md-editor, .md-preview {
  transition: background 0.25s, color 0.25s, border-color 0.25s;
}
/* 默认白色 */
/* 米黄 */
body.bg-cream .rich-editor{
  background:#fffbeb;
  color:#222;
  border-color:#e0e3f0;
}
body.bg-cream .md-editor{
  background:#fffbeb;
  color:#222;
  border-color:#e0e3f0;
}
body.bg-cream .md-preview{
  background:#fffbeb;
  color:#222;
  border-color:#e0e3f0;
}
/* 浅灰 */
body.bg-gray .rich-editor{
  background:#f3f4f6;
  color:#222;
  border-color:#d1d5db;
}
body.bg-gray .md-editor{
  background:#f3f4f6;
  color:#222;
  border-color:#d1d5db;
}
body.bg-gray .md-preview{
  background:#f3f4f6;
  color:#222;
  border-color:#d1d5db;
}
/* 深色黑底 */
body.bg-dark .rich-editor{
  background:#121212;
  color:#eeeeee;
  border-color:#444;
}
body.bg-dark .md-editor{
  background:#121212;
  color:#eeeeee;
  border-color:#444;
}
body.bg-dark .md-preview{
  background:#121212;
  color:#eeeeee;
  border-color:#444;
}
/* 羊皮纸 */
body.bg-paper .rich-editor{
  background:#f8f3e6;
  color:#222;
  border-color:#e0d9c8;
}
body.bg-paper .md-editor{
  background:#f8f3e6;
  color:#222;
  border-color:#e0d9c8;
}
body.bg-paper .md-preview{
  background:#f8f3e6;
  color:#222;
  border-color:#e0d9c8;
}
/* 浅蓝柔和 */
body.bg-softblue .rich-editor{
  background:#eef6ff;
  color:#222;
  border-color:#c7e0ff;
}
body.bg-softblue .md-editor{
  background:#eef6ff;
  color:#222;
  border-color:#c7e0ff;
}
body.bg-softblue .md-preview{
  background:#eef6ff;
  color:#222;
  border-color:#c7e0ff;
}
/* 棕褐护眼 */
body.bg-sepia .rich-editor{
  background:#f4e9d8;
  color:#2d2010;
  border-color:#ddccb0;
}
body.bg-sepia .md-editor{
  background:#f4e9d8;
  color:#2d2010;
  border-color:#ddccb0;
}
body.bg-sepia .md-preview{
  background:#f4e9d8;
  color:#2d2010;
  border-color:#ddccb0;
}
/* 午夜深蓝深色 */
body.bg-midnight .rich-editor{
  background:#1a2436;
  color:#e6edf7;
  border-color:#344460;
}
body.bg-midnight .md-editor{
  background:#1a2436;
  color:#e6edf7;
  border-color:#344460;
}
body.bg-midnight .md-preview{
  background:#1a2436;
  color:#e6edf7;
  border-color:#344460;
}

/* 自定义底色全局变量 */
body{
  --custom-bg:#fff;
  --custom-text:#222;
  --custom-border:#ddd;
}
body.bg-custom .rich-editor{
  background:var(--custom-bg);
  color:var(--custom-text);
  border-color:var(--custom-border);
}
body.bg-custom .md-editor{
  background:var(--custom-bg);
  color:var(--custom-text);
  border-color:var(--custom-border);
}
body.bg-custom .md-preview{
  background:var(--custom-bg);
  color:var(--custom-text);
  border-color:var(--custom-border);
}

/* 大图预览 */
.img-preview-mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  z-index:999999;
  display:none;
  align-items:center;
  justify-content:center;
}
.img-preview-mask.show{display:flex;}
.img-preview-img{
  max-width:95vw;
  max-height:95vh;
  object-fit:contain;
}
.rich-editor {
  background: #fff;
}

</style>
</head>
<body>
<div id="loginWrap" class="login-modal">
  <div class="login-box">
    <h3>管理员验证</h3>
    <input type="password" id="pwdInput" placeholder="输入管理员密码">
    <button onclick="checkPwd()">确认进入</button>
  </div>
</div>
<div id="mainWrap" style="display:none">
<div class="tool-bar">
  <button class="link-btn blog-link" onclick="window.open('https://sxgpyjg.github.io','_blank')">博客主页</button>
  <button class="link-btn album-link" onclick="window.open('https://sxgpyjg.github.io/blog','_blank')">图文相册</button>
</div>
<div class="tool-box">
<button class="tool-btn" onclick="location.href='admin-list.html'">返回管理列表</button>
<button class="tool-btn" onclick="logoutAdmin()">退出登录</button>
</div>
<div class="tip-green" id="wordCountTip">纯文字数：0 | 总字符(含空格换行)：0</div>
<div class="img-collapse">
  <div class="img-collapse-head" onclick="toggleImgPanel()">
    <span>图片素材面板</span>
    <span class="arrow" id="imgArrow">▼</span>
  </div>
  <div class="img-collapse-body" id="imgPanelBody">
    <div class="tip-red">【高危禁止】cd/cp/git终端命令不要粘贴到data.js，会损坏笔记文件！</div>
    <div class="tip-green">图片复制规则：选中图片仅生成对应cp指令，不会读取手机全部图片</div>
    <div class="warn">不生成base64图片，仅保存images文件夹相对路径，图片需手动上传仓库
    <br>vivo手机多选提示：相册长按批量勾选，单次单选可多次叠加</div>
    <div class="tool-row">
    <button class="tool-btn" id="copyJsonBtn">一键复制完整data.js代码（仅本段可粘贴nano）</button>
    <button class="tool-btn" id="showTemplateBtn">生成选中图片复制命令</button>
    </div>
    <div class="tool-row">
      <button class="tool-btn" id="clearImgListBtn">清空已选图片记录</button>
      <button class="tool-btn" onclick="exportSingleNoteMd()">导出本篇MD</button>
    </div>
    <div class="tool-row">
      <button class="tool-btn" onclick="exportSingleNoteHtml()">导出本篇HTML</button>
      <button class="tool-btn" id="insertCodeBtn" onclick="insertMdCode()">插入代码块模板</button>
      <button class="tool-btn" onclick="forceReloadRemote()">刷新远程data.js</button>
      <button class="tool-btn" id="loadCleanSnapshot">加载纯净管理快照</button>
    </div>
    <input type="file" id="imgFileInput" multiple>
  </div>
</div>
<div class="save-row">
  <button class="save-btn" id="saveNormalBtn">下载 data.js（无时间戳）</button>
  <button class="save-btn save-btn-time" id="saveTimeBtn">下载 data_时间戳.js（留存旧文件）</button>
</div>
<div class="save-row">
  <button class="save-btn" id="exportFullBackup">导出完整备份notes.json</button>
  <button class="save-btn" id="importBackup">导入本地备份文件</button>
  <input type="file" id="backupFileInput" accept=".json,.js">
</div>
<input class="title-input" placeholder="填写笔记标题">
<!-- 新增标签输入区域 -->
<input class="tag-text-input" id="tagTextInput" placeholder="输入标签，逗号/空格/回车添加，点×删除">
<div class="tag-badge-wrap" id="tagBadgeWrap"></div>
<input class="type-input" placeholder="自定义分类（开发笔记/随笔/教程）">
<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
  <input type="checkbox" id="privateCheck">
  <label for="privateCheck">设为私密（仅管理员登录可见，博客/相册游客完全不显示）</label>
</div>

<div class="mode-switch">
  <button id="modeRich" class="active" onclick="switchMode('rich')">富文本可视化编辑</button>
  <button id="modeMd" onclick="switchMode('md')">Markdown纯文本</button>
</div>
<div class="edit-toolbar-wrap">
  <div class="toolbar-main">
    <button class="icon-btn" data-tip="撤销" onclick="globalUndo()">↩</button>
    <button class="icon-btn" data-tip="重做" onclick="globalRedo()">↪</button>

// 转义
function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

// 渲染徽章
function renderTagBadges() {
  tagBadgeWrap.innerHTML = currentTags.map((tag, idx) => `
    <span class="tag-badge">
      ${escapeHtml(tag)}
      <button onclick="removeTag(${idx})">×</button>
    </span>
  `).join('');
}

window.removeTag = function(idx) {
  currentTags.splice(idx,1);
  renderTagBadges();
};
// 解析输入添加标签
function parseTagsFromInput() {
  const raw = tagTextInput.value.trim();
  if(!raw) return;
  const parts = raw.split(/[,，\s]+/).map(s=>s.trim()).filter(s=>s);
  parts.forEach(t=>{
    if(!currentTags.includes(t)) currentTags.push(t);
  });
  tagTextInput.value = '';
  renderTagBadges();
}

tagTextInput.addEventListener('keydown', e=>{

    parseTagsFromInput();
    e.preventDefault();
  }
});

// 修复切换函数：表格双向转换、清理多余换行、不重复增行
function switchMode(mode){
  currentEditMode = mode;
  richModeBtn.classList.toggle("active", mode === "rich");
  mdModeBtn.classList.toggle("active", mode === "md");
  if(mode === "rich"){
    let mdText = mdBox.value;
    let parseHtml = mdText.replace(/(^|\n)(\|.+\|\n)(\|----.+\|\n)+(\|.+\|)(\n|$)/g, (_, pre, hRow, sepRow, cRow, suf)=>{
      const block = `${hRow}${sepRow}${cRow}`.trim();
      const rows = block.split("\n");
      let tableDom = `<table style="width:100%;border-collapse:collapse;margin:8px 0;">`;
      rows.forEach((row, idx)=>{
        const cells = row.split("|").filter(s=>s.trim() !== "");
        tableDom += "<tr>";
        cells.forEach(txt=>{
          const tag = idx === 0 ? "th" : "td";
          tableDom += `<${tag} style="border:1px solid #999;padding:6px 8px;">${txt.trim()}</${tag}>`;
        });
        tableDom += "</tr>";
      });
      tableDom += "</table>";
      return `${pre}${tableDom}${suf}`;
    });
    richBox.innerHTML = mdToHtml(parseHtml);
    richBox.style.display = "block";
    mdBox.style.display = "none";
    mdPreviewBox.style.display = "none";
    checkFormatActive();
  }else{
    let htmlText = richBox.innerHTML;
    let parseMd = htmlText.replace(/<table[\s\S]*?<\/table>/g, tab=>{
      const trList = tab.match(/<tr[\s\S]*?<\/tr>/g) || [];
      let mdTable = "";
      trList.forEach((tr, rowIdx)=>{
        const cellList = tr.match(/<t[hd][\s\S]*?<\/t[hd]>/g) || [];
        let line = "";
        cellList.forEach(cell=>{
          const text = cell.replace(/<\/?t[hd].*?>/g,"").trim();
          line += `|${text}`;
        });
        line += "|\n";
        mdTable += line;
        if(rowIdx === 0){
          let sepLine = "";
          cellList.forEach(()=> sepLine += "|----");
          sepLine += "|\n";
          mdTable += sepLine;
        }
      });
      return "\n" + mdTable.trim() + "\n";
    });
    parseMd = parseMd.replace(/\n{3,}/g,"\n\n");
    mdBox.value = htmlToMd(parseMd);
    saveMdRecord();
    renderMdPreview();
    richBox.style.display = "none";
    mdBox.style.display = "block";
    mdPreviewBox.style.display = "block";
  }
  calcWordCount();
}

// 优化md转html
function mdToHtml(mdStr){
  return mdStr
    .replace(/\$\$([\s\S]*?)\$\$/g, (m,formula)=>{
      try{ return katex.renderToString(formula,{displayMode:true}) }catch{ return m; }
    })
    .replace(/\$([^\$]+?)\$/g, (m,formula)=>{
      try{ return katex.renderToString(formula,{displayMode:false}) }catch{ return m; }
    })
    .replace(/```([\s\S]*?)```/g, '<pre style="background:#f5f5f5;padding:10px;border-radius:6px;white-space:pre-wrap;"><code>$1</code></pre>')
    .replace(/<u>(.*?)<\/u>/g, '<u>$1</u>')
    .replace(/<p style="text-align:center">(.*?)<\/p>/g, '<p style="text-align:center">$1</p>')
    .replace(/^### (.*)$/gm, '<h3>$1</h3>')
    .replace(/^## (.*)$/gm, '<h2>$1</h2>')
    .replace(/^# (.*)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/~~(.*?)~~/g, '<s>$1</s>')
    .replace(/^\- (.*)$/gm, '<li>$1</li>')
    .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)\{width=(\d+)\}/g, '<img src="$2" alt="$1" style="max-width:100%;margin:8px 0;width:$3px;">')
    .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;margin:8px 0;">')
    .replace(/\n/g, '<br>');
}
// 优化html转md：保留表格、u、居中标签
function htmlToMd(htmlStr){
  let text = htmlStr
    .replace(/<pre style="background:#f5f5f5;padding:10px;border-radius:6px;white-space:pre-wrap;"><code>([\s\S]*?)<\/code><\/pre>/g, '```\n$1\n```')
    .replace(/<h1>(.*?)<\/h1>/g, '# $1')
    .replace(/<h2>(.*?)<\/h2>/g, '## $1')
    .replace(/<h3>(.*?)<\/h3>/g, '### $1')
    .replace(/<strong>(.*?)<\/strong>/g, '**$1**')
    .replace(/<em>(.*?)<\/em>/g, '*$1*')
    .replace(/<s>(.*?)<\/s>/g, '~~$1~~')
    .replace(/<li>(.*?)<\/li>/g, '- $1')
    .replace(/<img.*?width="(\d+)px".*?src="(.*?)".*?alt="(.*?)".*?>/g, '![$3]($2){width=$1}')
    .replace(/<img.*?src="(.*?)".*?alt="(.*?)".*?>/g, '![$2]($1)')
    .replace(/<br>/g, '\n');
  text = text.replace(/<(?!p style="text-align:center"|u|table|tr|th|td)[^>]+>/g, '');
  return text;
}

// 格式按钮高亮检测（修复H2/H3错乱、语法缺失classList）
function checkFormatActive(){
  document.querySelectorAll(".icon-btn").forEach(btn=>btn.classList.remove("active-format"));
  if(currentEditMode !== "rich") return;
  const isBold = document.queryCommandState("bold");
  const isItalic = document.queryCommandState("italic");
  const isUnder = document.queryCommandState("underline");
  const isStrike = document.queryCommandState("strikeThrough");
  if(isBold) document.querySelector('[onclick="formatBold()"]').classList.add("active-format");
  if(isUnder) document.querySelector('[onclick="insertUnderline()"]').classList.add("active-format");
  if(isStrike) document.querySelector('[onclick="formatStrikeThrough()"]').classList.add("active-format");
 
  const sel = window.getSelection();
  const rng = sel.getRangeAt(0);
  let tagEl = rng.commonAncestorContainer;
  let curTag = "";
  while(tagEl.nodeType === 1){
    const tag = tagEl.tagName.toLowerCase();
    if(["h1","h2","h3"].includes(tag)){
      curTag = tag;
      break;
    }
    tagEl = tagEl.parentNode;
    if(tagEl === richBox) break;
  }
  if(curTag === "h1") document.querySelector('[onclick="insertH1()"]').classList.add("active-format");
  if(curTag === "h2") document.querySelector('[onclick="insertH2()"]').classList.add("active-format");
  if(curTag === "h3") document.querySelector('[onclick="insertH3()"]').classList.add("active-format");
 
  let curBlock = rng.commonAncestorContainer;
  while(curBlock.nodeType !== 1 || !["P","H1","H2","H3","DIV"].includes(curBlock.tagName)){
    curBlock = curBlock.parentNode;
    if(!curBlock || curBlock === richBox) break;
  }
  if(curBlock && curBlock.style.textAlign === "center"){
    document.querySelector('[onclick="insertCenter()"]').classList.add("active-format");
  }
}

// 修复：完整递归遍历富文本，嵌套标签文字正常选中
function selectRichText(start, len){
  const sel = window.getSelection();
  const range = document.createRange();
  let offset = 0;
  let targetTextNode = null;
  let nodeOffset = 0;

  function walk(el) {
    for (const node of el.childNodes) {
      if (targetTextNode) return true;
      if (node.nodeType === Node.TEXT_NODE) {
        const textLen = node.textContent.length;
        if (offset + textLen > start) {
          targetTextNode = node;
          nodeOffset = start - offset;
          return true;
        }
        offset += textLen;
      } else if (node.nodeType === Node.ELEMENT_NODE) {
        if (walk(node)) return true;
      }
    }
    return false;
  }
  walk(richBox);

  if(targetTextNode){
    range.setStart(targetTextNode, nodeOffset);
    range.setEnd(targetTextNode, nodeOffset + len);
    sel.removeAllRanges();
    sel.addRange(range);
    richBox.focus();
  }
}

if(currentEditMode === "rich"){
alert("富文本模式不支持一键全部替换，可使用单次替换逐处修改");
return;
}
const oldText = getEditorText();
const regFlag = matchCase ? "g" : "gi";
const reg = new RegExp(findText, regFlag);
const newText = oldText.replace(reg, repText);
if(oldText === newText){
alert("未找到可替换内容");
return;
}
mdBox.value = newText;
saveMdRecord();
renderMdPreview();
calcWordCount();
const count = (oldText.match(new RegExp(findText,regFlag)) || []).length;
alert(`替换完成，共替换${count}处`);
});
// 单次替换当前匹配
replaceSingleBtn.addEventListener('click', () => {
const findText = findInput.value.trim();
const repText = replaceInput.value;
if (!findText) {
alert("请输入查找内容");
return;
}
if (matchList.length === 0) {
alert("请先点击查找下一个定位匹配内容");
return;
}
if(currentEditMode === "rich"){
document.execCommand("insertText",false,repText);
calcWordCount();
}else{
const curPos = matchList[searchIndex - 1 >= 0 ? searchIndex - 1 : 0];
let oldText = getEditorText();
const leftPart = oldText.slice(0, curPos);
const rightPart = oldText.slice(curPos + findText.length);
const newText = leftPart + repText + rightPart;
mdBox.value = newText;
saveMdRecord();
renderMdPreview();
calcWordCount();
}
alert("已替换当前这一处");
findNextBtn.click();
const freshText = getEditorText();
const regFlag = matchCase ? "g" : "gi";
const reg = new RegExp(findText, regFlag);
matchList = [];
let match;
while ((match = reg.exec(freshText)) !== null) {
matchList.push(match.index);
}
searchIndex = 0;
});
// 弹窗拖拽 修复偏移、卡顿、触屏穿透 + 边界限制
const mask = findReplaceMask;
const box = document.querySelector('.find-replace-box');
let drag = false;
let startX, startY;
let boxStartX, boxStartY;
// 重置居中
function resetBoxPos() {
box.style.left = '50%';
box.style.top = '50%';
box.style.transform = 'translate(-50%, -50%)';
}
resetBoxPos();
// 鼠标按下
box.addEventListener('mousedown', (e) => {
const tag = e.target.tagName;
if (tag === 'INPUT' || tag === 'BUTTON') return;
e.preventDefault();
drag = true;
startX = e.clientX;
startY = e.clientY;
const rect = box.getBoundingClientRect();
boxStartX = rect.left;
boxStartY = rect.top;
box.style.transform = "none";
});
document.addEventListener("mousemove", (e) => {
if (!drag) return;
const dx = e.clientX - startX;
const dy = e.clientY - startY;
let left = boxStartX + dx;
let top = boxStartY + dy;
// 边界约束，防止拖出屏幕
left = Math.max(0, Math.min(left, window.innerWidth - box.offsetWidth));
top = Math.max(0, Math.min(top, window.innerHeight - box.offsetHeight));
box.style.left = `${left}px`;
box.style.top = `${top}px`;
});
document.addEventListener("mouseup", () => drag = false);
//触屏拖拽兼容
box.addEventListener("touchstart", (e) => {
const target = e.target.tagName;
if (target === "INPUT" || target === "BUTTON") return;
e.preventDefault();
drag = true;
const touch = e.touches[0];
startX = touch.clientX;
startY = touch.clientY;
const rect = box.getBoundingClientRect();
boxStartX = rect.left;
boxStartY = rect.top;
box.style.transform = "none";
});
document.addEventListener("touchmove", (e) => {
if (!drag) return;
const touch = e.touches[0];
const dx = touch.clientX - startX;
const dy = touch.clientY - startY;
let left = boxStartX + dx;
let top = boxStartY + dy;
left = Math.max(0, Math.min(left, window.innerWidth - box.offsetWidth));
top = Math.max(0, Math.min(top, window.innerHeight - box.offsetHeight));
box.style.left = `${left}px`;
box.style.top = `${top}px`;
});
document.addEventListener("touchend", () => drag = false);

// 大图预览点击关闭
const previewMask = document.getElementById("imgPreviewMask");
const previewImg = document.getElementById("previewImg");
previewMask.addEventListener("click", () => {
  previewMask.classList.remove("show");

// 工具函数：获取当前时间字符串
function getNowTimeStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  const h = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  const s = String(d.getSeconds()).padStart(2, "0");
  return `${y}-${m}-${day} ${h}:${mi}:${s}`;
}
// 切换预设编辑底色，清除自定义行内背景
function changeEditorBg(type){
  // 清空全部主题class
  document.body.classList.remove(
    "bg-cream","bg-gray","bg-paper","bg-softblue",
    "bg-sepia","bg-dark","bg-midnight","bg-custom"
  );
  // 清空行内自定义背景，让预设主题CSS正常生效
  richBox.style.backgroundColor = "";
  mdBox.style.backgroundColor = "";
  mdPreviewBox.style.backgroundColor = "";

  if(type === "custom"){
    document.body.classList.add("bg-custom");
    // 显示自定义取色器
    customBgColorInput.style.display = "block";
  }else{
    document.body.classList.add("bg-" + type);
    // 隐藏取色器
    customBgColorInput.style.display = "none";
  }
  calcWordCount();
}

// 重置编辑区为默认纯白
function resetDefaultBg(){
  document.body.classList.remove(
    "bg-cream","bg-gray","bg-paper","bg-softblue",
    "bg-sepia","bg-dark","bg-midnight","bg-custom"
  );
  // 清空所有编辑容器自定义行内底色
  richBox.style.backgroundColor = "";
  mdBox.style.backgroundColor = "";
  mdPreviewBox.style.backgroundColor = "";
  // 隐藏取色器
  customBgColorInput.style.display = "none";
  calcWordCount();
}
