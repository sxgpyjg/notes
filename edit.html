<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>笔记编辑器（最终修复版）</title>
<script src="./data.js?v=1"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
body{background:linear-gradient(135deg,#f5f7fe,#eef2ff);padding:10px 10px 60px;overflow-x:hidden;}
body.keyboard-opened{padding-bottom:60px!important;}
.lock-scroll{overflow:hidden!important;touch-action:none!important;}
.tool-box,.save-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 10px;}
.tool-bar{display:flex;gap:8px;margin-bottom:10px;}
.tool-btn{background:#fff;border:1px solid #e8ecf4;border-radius:8px;padding:8px 10px;font-size:13px;color:#333;box-shadow:0 1px 3px rgba(99,102,241,.06);cursor:pointer;transition:all .15s;}
.tool-btn:hover{background:#f0f3ff;border-color:#6366F1;}
.tool-btn:active{background:#e0e7ff;}
.save-btn{border:0;border-radius:8px;padding:10px 0;width:100%;font-size:14px;font-weight:600;color:#fff;background:linear-gradient(135deg,#6366F1,#4f46e5);box-shadow:0 3px 12px rgba(99,102,241,.2);cursor:pointer;transition:transform .15s;}
.save-btn:active{transform:scale(.97);}
.title-input{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:15px;background:#fff;outline:none;margin-bottom:8px;transition:border-color .2s;}
.title-input:focus{border-color:#6366F1;}
.tags-input-wrap{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:6px 8px;margin-bottom:8px;background:#fff;display:flex;flex-wrap:wrap;align-items:center;gap:4px;min-height:38px;cursor:text;transition:border-color .2s;}
.tags-input-wrap:focus-within{border-color:#6366F1;}
.tag-chip{display:inline-flex;align-items:center;gap:3px;border-radius:99px;padding:2px 4px 2px 8px;font-size:12px;line-height:1.4;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag-chip-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag-chip-remove{display:inline-flex;width:14px;height:14px;border-radius:50%;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex-shrink:0;}
.tag-chip-remove::before{content:"×";font-weight:bold;}
.tag-chip-input{flex:1;min-width:65px;border:none;outline:none;background:transparent;font-size:13px;padding:3px 2px;}
.tags-hint{font-size:10px;color:#9ca3af;margin:-6px 0 6px 4px;}
.edit-toolbar-wrap{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #e0e3f0;z-index:999;padding-bottom:env(safe-area-inset-bottom);border-radius:12px 12px 0 0;box-shadow:0 -4px 15px rgba(0,0,0,.05);}
body.keyboard-opened .edit-toolbar-wrap{position:absolute;bottom:0;}
.toolbar-main{display:flex;flex-wrap:wrap;gap:2px;padding:4px 4px;align-items:center;}
.icon-btn{border:1px solid #ddd;background:#fff;border-radius:4px;width:26px;height:26px;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.icon-btn:hover{background:#eef2ff;border-color:#6366F1;}
.icon-btn:active{background:#e0e7ff;}
.icon-btn.active-format{background:#6366F1!important;color:#fff!important;border-color:#4f46e5!important;}
.color-input{width:24px;height:24px;border:none;cursor:pointer;border-radius:3px;padding:0;}
.editor-wrap{margin-bottom:10px;}
.rich-editor{width:100%;min-height:200px;border:2px solid #e2e8f0;border-radius:10px;padding:12px;font-size:15px;outline:none;background:#fff;line-height:1.7;position:relative;}
.rich-editor:focus{border-color:#6366F1;}
.rich-editor img{max-width:100%;height:auto;border-radius:6px;margin:6px 0;display:block;cursor:pointer;}
.rich-editor table{width:100%;border-collapse:collapse;margin:6px 0;}
.rich-editor th,.rich-editor td{border:1px solid #999;padding:4px 6px;min-width:40px;}
.md-editor{width:100%;min-height:180px;border:2px solid #e2e8f0;border-radius:10px;padding:12px;font-size:14px;outline:none;background:#f8fafc;line-height:1.6;font-family:monospace;resize:vertical;}
.md-editor:focus{border-color:#6366F1;}
.md-preview{width:100%;min-height:180px;border:2px solid #e2e8f0;border-radius:10px;padding:12px;background:#fff;margin-top:6px;line-height:1.6;}
.mode-switch{display:flex;gap:8px;margin-bottom:6px;}
.mode-switch button{flex:1;padding:6px 0;border-radius:8px;border:2px solid #6366F1;background:#fff;color:#6366F1;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.mode-switch button.active{background:#6366F1;color:#fff;}
#imgFileInput{opacity:0;position:absolute;width:0;height:0;}
.warn{color:#e53e3e;font-size:11px;margin-bottom:6px;background:#fff2f4;padding:4px 8px;border-radius:6px;}
.tip-green{color:#16a34a;font-size:11px;margin-bottom:6px;background:#f0fdf4;padding:4px 8px;border-radius:6px;}
.login-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;padding:18px;border-radius:10px;width:85%;max-width:280px;}
.login-box input{width:100%;padding:8px;margin:8px 0;border:1px solid #ddd;border-radius:6px;}
.login-box button{width:100%;padding:8px;background:#6366F1;color:#fff;border:none;border-radius:6px;cursor:pointer;}
.find-replace-mask{position:fixed;inset:0;background:rgba(0,0,0,.25);display:none;align-items:center;justify-content:center;z-index:9999;}
.find-replace-mask.show{display:flex;}
.find-replace-box{background:rgba(255,255,255,.95);width:min(80%,300px);border-radius:12px;padding:14px;backdrop-filter:blur(8px);box-shadow:0 8px 25px rgba(0,0,0,.12);}
.find-replace-box input{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;margin-bottom:8px;}
.switch-wrap{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.switch{position:relative;width:36px;height:20px;flex-shrink:0;cursor:pointer;}
.switch input{opacity:0;width:0;height:0;position:absolute;}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:20px;transition:.3s;}
.slider:before{content:"";position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.switch input:checked+.slider{background:#6366F1;}
.switch input:checked+.slider:before{transform:translateX(16px);}
.private-switch-group{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:4px 8px;background:#f1f5f9;border-radius:8px;}
.private-switch-group .switch-label{font-size:13px;color:#475569;font-weight:500;}
.private-switch-group .switch-label.private{color:#dc2626;font-weight:600;}
.img-preview-mask{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999999;display:none;align-items:center;justify-content:center;}
.img-preview-mask.show{display:flex;}
.img-preview-img{max-width:95vw;max-height:95vh;object-fit:contain;}
.cursor-dragger{position:fixed;bottom:80px;left:10px;right:10px;height:20px;background:rgba(99,102,241,0.15);border-radius:10px;display:none;z-index:10000;touch-action:none;}
.cursor-dragger.show{display:flex;align-items:center;justify-content:center;}
.cursor-dragger .thumb{width:24px;height:24px;background:#6366F1;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);}
#imgPanelBody{display:block!important;}
#imgArrow{transform:rotate(180deg);}
</style>
</head>
<body>
<div id="loginWrap" class="login-modal">
  <div class="login-box">
    <h3>管理员验证</h3>
    <input type="password" id="pwdInput" placeholder="输入管理员密码">
    <button onclick="checkPwd()">确认进入</button>
  </div>
</div>
<div id="mainWrap" style="display:none">
<div class="tool-bar">
  <button class="tool-btn" onclick="location.href='admin-list.html'">管理列表</button>
  <button class="tool-btn" onclick="logoutAdmin()">退出登录</button>
</div>
<div class="tip-green" id="wordCountTip">纯文字数：0 | 总字符：0</div>

<!-- 图片素材面板（默认展开） -->
<div class="img-collapse" style="border:1px solid #dbeafe;border-radius:8px;margin:8px 0;overflow:hidden;">
  <div style="padding:10px 12px;background:linear-gradient(135deg,#eff6ff,#eef2ff);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14px;" onclick="toggleImgPanel()">
    <span>图片素材面板</span>
    <span id="imgArrow" style="transition:transform .2s;">▼</span>
  </div>
  <div id="imgPanelBody" style="padding:10px;">
    <div class="warn">不生成base64图片，仅保存images文件夹相对路径，图片需手动上传仓库</div>
    <div class="tool-row" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;">
      <button class="tool-btn" id="copyJsonBtn">一键复制完整data.js代码</button>
      <button class="tool-btn" id="showTemplateBtn">生成完整推送命令（含图片复制）</button>
    </div>
    <div class="tool-row" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <button class="tool-btn" id="clearImgListBtn">清空已选图片记录</button>
      <button class="tool-btn" id="batchImgBtn">批量图床链接</button>
    </div>
    <input type="file" id="imgFileInput" multiple>
  </div>
</div>

<div class="save-row">
  <button class="save-btn" id="saveNormalBtn">下载 data.js（无时间戳）</button>
  <button class="save-btn save-btn-time" id="saveTimeBtn">下载 data_时间戳.js</button>
</div>
<div class="save-row">
  <button class="save-btn" id="exportFullBackup">导出完整备份notes.json</button>
  <button class="save-btn" id="importBackup">导入本地备份文件</button>
  <input type="file" id="backupFileInput" accept=".json,.js">
</div>
<input class="title-input" placeholder="填写笔记标题">
<div class="tags-input-wrap" id="tagsInputWrap">
  <input type="text" class="tag-chip-input" id="tagChipInput" placeholder="添加标签（回车确认）">
</div>
<div class="tags-hint">回车添加，点击色块换颜色，× 删除</div>
<div class="private-switch-group">
  <label class="switch">
    <input type="checkbox" id="privateCheck">
    <span class="slider"></span>
  </label>
  <span class="switch-label private">设为私密</span>
  <span style="font-size:11px;color:#94a3b8;">（仅管理员可见）</span>
</div>
<div class="mode-switch">
  <button id="modeRich" class="active" onclick="switchMode('rich')">富文本</button>
  <button id="modeMd" onclick="switchMode('md')">Markdown</button>
</div>
<div class="edit-toolbar-wrap">
  <div class="toolbar-main">
    <button class="icon-btn" data-tip="撤销" onclick="globalUndo()">↩</button>
    <button class="icon-btn" data-tip="重做" onclick="globalRedo()">↪</button>
    <input type="color" class="color-input" id="fontColor" value="#000000" title="文字颜色">
    <input type="color" class="color-input" id="bgColor" value="#fff2cc" title="底色">
    <button class="icon-btn" data-tip="加粗" onclick="formatBold()"><strong>B</strong></button>
    <button class="icon-btn" data-tip="斜体" onclick="formatItalic()"><em>I</em></button>
    <button class="icon-btn" data-tip="下划线" onclick="insertUnderline()"><u>U</u></button>
    <button class="icon-btn" data-tip="删除线" onclick="formatStrikeThrough()" style="text-decoration:line-through;">S</button>
    <button class="icon-btn" data-tip="清除格式" onclick="clearTextFormat()">T</button>
    <button class="icon-btn" data-tip="居中" onclick="insertCenter()">≡</button>
    <button class="icon-btn" data-tip="H1" onclick="insertH1()">H1</button>
    <button class="icon-btn" data-tip="H2" onclick="insertH2()">H2</button>
    <button class="icon-btn" data-tip="H3" onclick="insertH3()">H3</button>
    <button class="icon-btn" data-tip="代码块" onclick="insertMdCode()">&lt;/&gt;</button>
    <select id="fontSizeSel" style="height:24px;width:36px;border:1px solid #ddd;border-radius:3px;font-size:11px;">
      <option value="12px">12</option>
      <option value="14px">14</option>
      <option value="16px" selected>16</option>
      <option value="18px">18</option>
      <option value="20px">20</option>
    </select>
    <button class="icon-btn" data-tip="行内代码" onclick="insertInlineCode()">`</button>
    <button class="icon-btn" data-tip="引用" onclick="insertQuote()">></button>
    <button class="icon-btn" data-tip="无序列表" onclick="insertUl()">•</button>
    <button class="icon-btn" data-tip="有序列表" onclick="insertOrderedList()">1.</button>
    <button class="icon-btn" data-tip="任务列表" onclick="insertTaskList()">☐</button>
    <button class="icon-btn" data-tip="表格" onclick="insertTable()">▦</button>
    <button class="icon-btn" data-tip="链接" onclick="insertLink()">[]()</button>
    <button class="icon-btn" data-tip="本地图片" id="localImgBtn">🖼</button>
    <button class="icon-btn" data-tip="网络图床" id="netImgBtn">🌐</button>
    <button class="icon-btn" data-tip="清空" onclick="clearAllNotesContent()">🗑️</button>
    <button class="icon-btn" data-tip="查找" id="findReplaceBtn">🔍</button>
    <button class="icon-btn" data-tip="分割线" onclick="splitLine1()">—</button>
    <input type="file" id="hiddenImgFile" multiple style="display:none;">
  </div>
</div>
<div class="editor-wrap">
  <div class="rich-editor" id="richEditor" contenteditable="true"></div>
  <textarea class="md-editor" id="mdEditor" style="display:none" placeholder="Markdown..."></textarea>
  <div class="md-preview" id="mdPreview" style="display:none"></div>
</div>
</div>

<!-- 查找替换弹窗 -->
<div class="find-replace-mask" id="findReplaceMask">
  <div class="find-replace-box">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
      <span style="font-weight:600;font-size:14px;">查找替换</span>
      <button id="findReplaceClose" style="border:none;background:transparent;font-size:16px;cursor:pointer;">×</button>
    </div>
    <input type="text" id="findInput" placeholder="查找">
    <input type="text" id="replaceInput" placeholder="替换为">
    <div class="switch-wrap">
      <label class="switch">
        <input type="checkbox" id="matchCase">
        <span class="slider"></span>
      </label>
      <span style="font-size:12px;">区分大小写</span>
    </div>
    <div style="display:flex;gap:4px;">
      <button class="tool-btn" id="findNextBtn" style="flex:1;padding:4px 0;font-size:12px;">下一处</button>
      <button class="tool-btn" id="replaceSingleBtn" style="flex:1;padding:4px 0;font-size:12px;">替换</button>
      <button class="tool-btn" id="replaceAllBtn" style="flex:1;padding:4px 0;font-size:12px;background:#6366F1;color:#fff;">全部</button>
    </div>
  </div>
</div>
<!-- 大图预览 -->
<div class="img-preview-mask" id="imgPreviewMask">
  <img class="img-preview-img" id="previewImg">
</div>
<!-- 光标拖拽条 -->
<div class="cursor-dragger" id="cursorDragger">
  <div class="thumb"></div>
</div>

<script>
// ========== 全局变量 ==========
const ADMIN_PASSWORD = "admin123";
const CACHE_KEY = "note_temp_data";
const RICH_RECORD_MAX = 30;
const TAG_COLOR_PRESETS = ['#6366F1','#EC4899','#10B981','#F59E0B','#3B82F6','#EF4444','#8B5CF6','#14B8A6','#F97316','#84CC16'];

let list = [], targetNote = null;
const editId = new URLSearchParams(location.search).get("id");
let imgUploadList = [], currentEditMode = "rich";
let mdRecordStack = [], mdRecordIndex = -1;
let richRecordStack = [], richRecordIndex = -1;
let currentTags = [], tagColorMap = {};
let globalImgSerial = Number(localStorage.getItem("img_serial")||0);
let searchIndex = 0, matchList = [], matchCase = false;
let moreToolsOpen = false;

// DOM
const titleInput = document.querySelector(".title-input");
const tagChipInput = document.getElementById("tagChipInput");
const tagsInputWrap = document.getElementById("tagsInputWrap");
const richBox = document.getElementById("richEditor");
const mdBox = document.getElementById("mdEditor");
const mdPreviewBox = document.getElementById("mdPreview");
const wordCountTip = document.getElementById("wordCountTip");
const richModeBtn = document.getElementById("modeRich");
const mdModeBtn = document.getElementById("modeMd");
const fontSizeSelect = document.getElementById("fontSizeSel");
const fontColorInput = document.getElementById("fontColor");
const bgColorInput = document.getElementById("bgColor");
const imgFileInput = document.getElementById("imgFileInput");
const hiddenImgFile = document.getElementById("hiddenImgFile");
const findReplaceMask = document.getElementById("findReplaceMask");
const findInput = document.getElementById("findInput");
const replaceInput = document.getElementById("replaceInput");
const matchCaseCheck = document.getElementById("matchCase");
const cursorDragger = document.getElementById("cursorDragger");
const netImgBtn = document.getElementById("netImgBtn");

// ========== 工具函数 ==========
function getNowTimeStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function addImgSerial(){ globalImgSerial++; localStorage.setItem("img_serial",globalImgSerial); }

// ========== 标签颜色 ==========
function getTagColor(t){
  const k=t.toLowerCase().trim();
  if(tagColorMap[k]) return tagColorMap[k];
  const idx=currentTags.findIndex(x=>x.toLowerCase()===k);
  return tagColorMap[k]=TAG_COLOR_PRESETS[idx%TAG_COLOR_PRESETS.length];
}
function setTagColor(t,c){ const k=t.toLowerCase().trim(); if(!c||c==='#000000')return; tagColorMap[k]=c; renderTagsChips(); }
function pickTagColorAtIndex(idx){
  const t=currentTags[idx]; if(!t)return;
  const ci=document.createElement('input'); ci.type='color'; ci.value=getTagColor(t); ci.style.cssText='position:fixed;opacity:0;pointer-events:none;';
  document.body.appendChild(ci);
  ci.addEventListener('input',e=>setTagColor(t,e.target.value));
  ci.addEventListener('change',()=>{ document.body.removeChild(ci); });
  setTimeout(()=>ci.click(),50);
}
function renderTagsChips(){
  Array.from(tagsInputWrap.querySelectorAll('.tag-chip')).forEach(n=>n.remove());
  currentTags.forEach((t,i)=>{
    const c=getTagColor(t);
    const chip=document.createElement('span');
    chip.className='tag-chip';
    chip.style.cssText=`background:${c}22;border-left:3px solid ${c};color:${c};`;
    const dot=document.createElement('span');
    dot.style.cssText=`display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};margin-right:3px;cursor:pointer;flex-shrink:0;`;
    dot.title='点击换色';
    dot.addEventListener('click',e=>{ e.stopPropagation(); e.preventDefault(); pickTagColorAtIndex(i); });
    const txt=document.createElement('span'); txt.className='tag-chip-text'; txt.textContent=t;
    const rm=document.createElement('span'); rm.className='tag-chip-remove'; rm.style.cssText=`color:${c};background:${c}18;`;
    rm.addEventListener('click',e=>{ e.stopPropagation(); removeTagAt(i); });
    chip.append(dot,txt,rm);
    tagsInputWrap.insertBefore(chip, tagChipInput);
  });
}
function addTag(r){
  let s=String(r||'').trim(); if(!s||s.length>20)return;
  if(currentTags.some(t=>t.toLowerCase()===s.toLowerCase())){ tagChipInput.value=''; return; }
  if(currentTags.length>=10){ alert('最多10个标签'); tagChipInput.value=''; return; }
  currentTags.push(s);
  tagColorMap[s.toLowerCase().trim()]=TAG_COLOR_PRESETS[(currentTags.length-1)%TAG_COLOR_PRESETS.length];
  renderTagsChips(); tagChipInput.value='';
}
function getCurrentTags(){ return currentTags.slice(); }
function removeTagAt(i){ if(i>=0&&i<currentTags.length){ currentTags.splice(i,1); renderTagsChips(); } }
function setCurrentTags(arr,m){
  if(!Array.isArray(arr))arr=[];
  tagColorMap={}; const seen=new Set(); currentTags=[];
  arr.forEach((t,i)=>{
    const s=String(t||'').trim(); if(!s)return;
    const k=s.toLowerCase(); if(seen.has(k))return; seen.add(k);
    currentTags.push(s); tagColorMap[k]=(m&&m[k])?m[k]:TAG_COLOR_PRESETS[i%TAG_COLOR_PRESETS.length];
  });
  renderTagsChips();
}
if(tagChipInput){
  tagsInputWrap.addEventListener('click',e=>{ if(e.target===tagsInputWrap) tagChipInput.focus(); });
  tagChipInput.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key===','){ e.preventDefault(); addTag(tagChipInput.value); }
    else if(e.key==='Backspace'&&!tagChipInput.value&&currentTags.length) removeTagAt(currentTags.length-1);
  });
  tagChipInput.addEventListener('paste',e=>{
    const txt=(e.clipboardData||window.clipboardData).getData('text');
    if(/[,\n，]/.test(txt)){ e.preventDefault(); txt.split(/[,\n，]/).forEach(p=>addTag(p)); }
  });
}

// ========== 数据持久化 ==========
function loadLocalCache() {
  // 优先从 localStorage 获取完整的笔记列表（管理列表删除后已更新）
  const storageNotes = localStorage.getItem("notes");
  if (storageNotes) {
    try {
      list = JSON.parse(storageNotes);
      // 确保每个笔记都有 tags 数组（兼容旧数据）
      list.forEach(item => {
        if (!Array.isArray(item.tags) && item.type) {
          item.tags = [item.type];
        }
      });
    } catch(e) {
      list = [];
    }
  } else if (window.NOTE_DATA && Array.isArray(window.NOTE_DATA)) {
    // 如果 localStorage 为空，则使用 data.js 的数据
    list = JSON.parse(JSON.stringify(window.NOTE_DATA));
  } else {
    list = [];
  }

  // 合并临时草稿（如果有的话）
  const cacheStr = localStorage.getItem(CACHE_KEY);
  if (cacheStr) {
    try {
      const tempCache = JSON.parse(cacheStr);
      const tempDraft = tempCache.list?.find(item => item._isTempNew === true);
      if (tempDraft && !list.some(n => n.id === tempDraft.id)) {
        list.push(tempDraft);
      }
    } catch(e) {}
  }
}

// ========== 转换 ==========
function mdToHtml(s){
  let html=s.replace(/```([\s\S]*?)```/g,'<pre style="background:#f5f5f5;padding:8px;border-radius:6px;white-space:pre-wrap;"><code>$1</code></pre>');
  html=html.replace(/(^|\n)(\|.+\|\n)((?:\|[-:| ]+\|)(?:\n|$))+(\|.+\|)/g,(_,pre,hRow,sep,cRow)=>{
    const rows=(hRow+sep+cRow).split('\n').filter(r=>r.trim());
    let table='<table style="width:100%;border-collapse:collapse;margin:6px 0;"><tr>';
    rows[0].split('|').filter(s=>s.trim()).forEach(t=>table+=`<th style="border:1px solid #999;padding:4px 6px;">${t.trim()}</th>`);
    table+='</tr>';
    for(let i=1;i<rows.length;i++){
      table+='<tr>';
      rows[i].split('|').filter(s=>s.trim()).forEach(t=>table+=`<td style="border:1px solid #999;padding:4px 6px;">${t.trim()}</td>`);
      table+='</tr>';
    }
    return pre+table+'</table>';
  });
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>').replace(/^\- (.+)$/gm,'<li>$1</li>')
    .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;margin:6px 0;">');
  return html.replace(/\n/g,'<br>');
}
function htmlToMd(s){
  let md=s.replace(/<pre[^>]*><code>([\s\S]*?)<\/code><\/pre>/g,'```\n$1\n```')
    .replace(/<h1>(.*?)<\/h1>/g,'# $1').replace(/<h2>(.*?)<\/h2>/g,'## $1').replace(/<h3>(.*?)<\/h3>/g,'### $1')
    .replace(/<strong>(.*?)<\/strong>/g,'**$1**').replace(/<em>(.*?)<\/em>/g,'*$1*').replace(/<s>(.*?)<\/s>/g,'~~$1~~')
    .replace(/<li>(.*?)<\/li>/g,'- $1').replace(/<br>/g,'\n');
  md=md.replace(/<(?!p style="text-align:center"|u|table|tr|th|td)[^>]+>/g,'');
  return md.replace(/<img[^>]*src="([^"]+)"[^>]*alt="([^"]*)"[^>]*>/g,'![$2]($1)');
}

function checkFormatActive(){
  document.querySelectorAll('.icon-btn').forEach(b=>b.classList.remove('active-format'));
  if(currentEditMode!=='rich')return;
  if(document.queryCommandState('bold')) document.querySelector('[onclick="formatBold()"]')?.classList.add('active-format');
  if(document.queryCommandState('italic')) document.querySelector('[onclick="formatItalic()"]')?.classList.add('active-format');
  if(document.queryCommandState('underline')) document.querySelector('[onclick="insertUnderline()"]')?.classList.add('active-format');
  if(document.queryCommandState('strikeThrough')) document.querySelector('[onclick="formatStrikeThrough()"]')?.classList.add('active-format');
  const sel=window.getSelection(); if(!sel.rangeCount)return;
  let el=sel.getRangeAt(0).commonAncestorContainer;
  while(el.nodeType===1){
    if(el.tagName==='H1'){ document.querySelector('[onclick="insertH1()"]')?.classList.add('active-format'); break; }
    if(el.tagName==='H2'){ document.querySelector('[onclick="insertH2()"]')?.classList.add('active-format'); break; }
    if(el.tagName==='H3'){ document.querySelector('[onclick="insertH3()"]')?.classList.add('active-format'); break; }
    el=el.parentNode; if(el===richBox)break;
  }
}

function insertLocalImgTagTerminal(safeName) {

function handleFileSelect(files){
  if(!files||!files.length)return;
  Array.from(files).forEach(file=>{
    // 直接使用原始文件名，不加序号
    const originalName = file.name;
    // 过滤特殊字符（仅保留字母数字下划线横线中文点和括号，避免路径问题）
    const safeName = originalName.replace(/[^\w\-\.\u4e00-\u9fa5\(\)]/g, '_');
    
    let realPath = file.path||'';
    if(!realPath){
      const fn = originalName.toLowerCase();
      // 改进的路径猜测（优先 Pictures/Screenshots）
      if (/screenshot|screen_shot/i.test(fn)) {
        realPath = `/storage/emulated/0/Pictures/Screenshots/${originalName}`;
      } else if (/wx_|wechat|mmexport/i.test(fn)) {
        realPath = `/storage/emulated/0/tencent/MicroMsg/WeiXin/${originalName}`;
      } else if (/qq/i.test(fn)) {
        realPath = `/storage/emulated/0/tencent/QQ_images/${originalName}`;
      } else if (/download/i.test(fn)) {
        realPath = `/storage/emulated/0/Download/${originalName}`;
      } else if (/pictures|images/i.test(fn) && !/screenshot/i.test(fn)) {
        realPath = `/storage/emulated/0/Pictures/${originalName}`;
      } else if (/whatsapp|wa_/i.test(fn)) {
        realPath = `/storage/emulated/0/WhatsApp/Media/WhatsApp Images/${originalName}`;
      } else {
        realPath = `/storage/emulated/0/DCIM/Camera/${originalName}`;
      }
    } else {
      realPath = realPath.replace(/^\/storage\/emulated\/0\//i,'/storage/emulated/0/');
    }
    const userPath = prompt(`请确认图片源路径（可修改）：\n${safeName}`, realPath);
    const finalPath = (userPath&&userPath.trim()) ? userPath.trim() : realPath;
    // cp 源路径使用 finalPath，目标文件名使用 safeName（与原始文件名一致）
    const cpCmd = `cp "${finalPath}" ~/storage/shared/notes/images/"${safeName}"`;
    imgUploadList.push({
      name: safeName,         // 目标文件名（等于原始文件名）
      originalName: originalName, // 原始文件名（供find搜索）
      src: finalPath,
      copyCmd: cpCmd
    });
    insertLocalImgTagTerminal(safeName);
  });
}

// 生成完整推送命令（含旧笔记内容，修复路径引号）
document.getElementById('showTemplateBtn').onclick = async function(){
  syncFormToNoteList();

  const allNotes = list.filter(i => i && i.id && i.content);
  const jsContent = "window.NOTE_DATA = " + JSON.stringify(allNotes, null, 2);
  const now = getNowTimeStr();

  let cmd = `# === 图片自动定位 + 复制 + 推送命令 ===\n`;
  cmd += `cd ~/storage/shared/notes || exit 1\n`;
  cmd += `mkdir -p images\n\n`;

  imgUploadList.forEach((item, idx) => {
    const fileName = item.name.replace(/"/g, '\\"');
    cmd += `# 图片 ${idx+1}: ${fileName}\n`;
    // find 在 ~/storage/shared 下搜索
    cmd += `SRC=$(find ~/storage/shared/DCIM ~/storage/shared/Download ~/storage/shared/Pictures ~/storage/shared/tencent -name "${fileName}" 2>/dev/null | head -1)\n`;
    cmd += `if [ -n "$SRC" ]; then\n`;
    cmd += `  cp "$SRC" images/"${fileName}" && echo "✅ 已复制: ${fileName}"\n`;
    cmd += `else\n`;
    cmd += `  SRC=$(find ~/storage/shared -name "${fileName}" 2>/dev/null | head -1)\n`;
    cmd += `  if [ -n "$SRC" ]; then\n`;
    cmd += `    cp "$SRC" images/"${fileName}" && echo "✅ 已复制(全盘): ${fileName}"\n`;
    cmd += `  else\n`;
    cmd += `    echo "❌ 未找到文件: ${fileName}，请手动复制"\n`;
    cmd += `    echo "   cp /真实路径/${fileName} images/"\n`;
    cmd += `  fi\n`;
    cmd += `fi\n\n`;
  });

  cmd += `rm -f data.js\n`;
  cmd += `cat > data.js << 'EOF'\n${jsContent}\nEOF\n`;
  cmd += `git add images/ data.js\n`;
  cmd += `if ! git diff --cached --quiet; then\n`;
  cmd += `  git commit -m "update notes ${now}"\n`;
  cmd += `  git push origin main && echo "✅ 推送成功"\n`;
  cmd += `else\n`;
  cmd += `  echo "⚠️ 无变化，跳过提交"\n`;
  cmd += `fi\n`;

  await navigator.clipboard.writeText(cmd).catch(() => {
    const t = document.createElement('textarea');
    t.value = cmd;
    document.body.appendChild(t);
    t.select();
    document.execCommand('copy');
    document.body.removeChild(t);

};

function syncFormToNoteList(){
  const t=titleInput.value.trim();
  const tags=getCurrentTags();
  const finalType=tags.length?tags[0]:'';
  const isPrivate=document.getElementById('privateCheck').checked;
  const content=currentEditMode==='rich'?richBox.innerHTML.trim():mdToHtml(mdBox.value);
  const now=getNowTimeStr();
  const tagColors={}; tags.forEach(t=>{ const k=t.toLowerCase().trim(); if(tagColorMap[k]) tagColors[k]=tagColorMap[k]; });
  if(targetNote){
    const idx=list.findIndex(i=>i.id===targetNote.id);
    if(idx>-1){ list[idx]={...list[idx],title:t,type:finalType,tags,tagColors,content,date:now,private:isPrivate}; delete list[idx]._isTempNew; }
  }else{
    const ex=list.find(i=>i._isTempNew);
    if(ex){ Object.assign(ex,{title:t,type:finalType,tags,tagColors,content,date:now,private:isPrivate}); }
    else list.push({id:Date.now(),title:t,type:finalType,tags,tagColors,content,date:now,private:isPrivate,_isTempNew:true});
  }
  saveLocalCache(); localStorage.setItem("notes",JSON.stringify(list)); window.NOTE_DATA=list;
}

function downloadDataJs(ts){
  syncFormToNoteList();
  const t=titleInput.value.trim(); if(!t)return alert('标题不能为空');
  list=list.filter(i=>i&&i.id&&(i.title||'').trim()&&i.content);
  const blob=new Blob([getFullJsText()],{type:'application/javascript'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=ts?`data_${getNowTimeStr().replace(/[: ]/g,'-')}.js`:'data.js'; a.click(); URL.revokeObjectURL(a.href);
}
document.getElementById('saveNormalBtn').onclick=()=>downloadDataJs(false);
document.getElementById('saveTimeBtn').onclick=()=>downloadDataJs(true);

// 导出备份
document.getElementById('exportFullBackup').onclick = function(){
  const json = JSON.stringify(list, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='notes完整备份.json'; a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById('importBackup').onclick = () => document.getElementById('backupFileInput').click();
document.getElementById('backupFileInput').onchange = function(e){
  const file = e.target.files[0];
  if(!file || file.size>20*1024*1024) return alert('文件过大或无效');
  if(!confirm('导入将覆盖当前所有笔记')) return;
  const reader = new FileReader();
  reader.onload = function(res){
    try{
      let raw = res.target.result;
      if(raw.startsWith('window.NOTE_DATA = ')) raw = raw.replace('window.NOTE_DATA = ','');
      const arr = JSON.parse(raw);
      if(!Array.isArray(arr)) throw '格式错误';
      list = arr;
      saveLocalCache(); localStorage.setItem("notes",JSON.stringify(list)); window.NOTE_DATA=list;
      alert(`导入 ${arr.length} 条`);
      if(editId) initLoadNote();
    } catch(e){ alert('解析失败'); }
  };
  reader.readAsText(file);
};

// ========== 查找替换 ==========
const findReplaceBtn=document.getElementById('findReplaceBtn');
document.getElementById('findReplaceClose').onclick=()=>{ findReplaceMask.classList.remove('show'); document.body.classList.remove('lock-scroll'); };
findReplaceBtn.onclick=()=>{
  document.body.classList.add('lock-scroll'); findReplaceMask.classList.add('show');
  const s=window.getSelection().toString().trim(); if(s) findInput.value=s;
  searchIndex=0; matchList=[]; setTimeout(()=>findInput.focus(),100);
};
findReplaceMask.onclick=e=>{ if(e.target===findReplaceMask){ findReplaceMask.classList.remove('show'); document.body.classList.remove('lock-scroll'); } };
matchCaseCheck.addEventListener('change',()=>{ matchCase=matchCaseCheck.checked; });
function getEditorText(){ return currentEditMode==='rich'?richBox.innerText:mdBox.value; }
function selectRichText(start,len){
  const sel=window.getSelection(); const range=document.createRange();
  let offset=0,node=null,nodeOff=0;
  function walk(el){ for(const c of el.childNodes){ if(node)return; if(c.nodeType===Node.TEXT_NODE){ const l=c.textContent.length; if(offset+l>start){ node=c; nodeOff=start-offset; return; } offset+=l; }else walk(c); } }
  walk(richBox);
  if(node){ range.setStart(node,nodeOff); range.setEnd(node,nodeOff+len); sel.removeAllRanges(); sel.addRange(range); richBox.focus(); }
}
document.getElementById('findNextBtn').onclick=()=>{
  const text=getEditorText(); const f=findInput.value.trim(); if(!f)return alert('输入查找内容');
  const reg=new RegExp(f,matchCase?'g':'gi'); matchList=[]; let m; while((m=reg.exec(text))!==null) matchList.push(m.index);
  if(!matchList.length)return alert('未找到');
  if(searchIndex>=matchList.length) searchIndex=0;
  alert(`第 ${searchIndex+1}/${matchList.length} 处`);
  if(currentEditMode==='rich') selectRichText(matchList[searchIndex],f.length);
  searchIndex++;
};
document.getElementById('replaceSingleBtn').onclick=()=>{
  const f=findInput.value.trim(); if(!f)return alert('输入查找内容');
  if(!matchList.length)return alert('请先查找');
  const idx=searchIndex-1>=0?searchIndex-1:0;
  if(currentEditMode==='rich'){ document.execCommand('insertText',false,replaceInput.value); calcWordCount(); }
  else{ const old=getEditorText(); const l=old.slice(0,matchList[idx]); const r=old.slice(matchList[idx]+f.length); mdBox.value=l+replaceInput.value+r; saveMdRecord(); renderMdPreview(); calcWordCount(); }
  alert('已替换当前一处'); document.getElementById('findNextBtn').click();
};
document.getElementById('replaceAllBtn').onclick=()=>{
  const f=findInput.value.trim(); if(!f)return alert('输入查找内容');
  if(currentEditMode==='rich')return alert('富文本请用单次替换');
  const rep=replaceInput.value; const reg=new RegExp(f,matchCase?'g':'gi');
  const old=getEditorText(); const nw=old.replace(reg,rep);
  if(old===nw)return alert('无替换');
  mdBox.value=nw; saveMdRecord(); renderMdPreview(); calcWordCount();
  alert('替换完成');
};

// ========== 大图预览 ==========
richBox.addEventListener('click',function(e){ const img=e.target.closest('img'); if(img&&img.src){ document.getElementById('previewImg').src=img.src; document.getElementById('imgPreviewMask').classList.add('show'); } });
document.getElementById('imgPreviewMask').onclick=function(e){ if(e.target===this)this.classList.remove('show'); };

// ========== 字号颜色 ==========
fontSizeSelect.onchange=function(){ document.execCommand('fontSize',false,this.value); richBox.focus(); calcWordCount(); };
fontColorInput.oninput=function(){ document.execCommand('foreColor',false,this.value); richBox.focus(); calcWordCount(); };
bgColorInput.oninput=function(){
  richBox.focus();
  const sel=window.getSelection();
  if(!sel.rangeCount||sel.getRangeAt(0).collapsed) return;
  try { document.execCommand('hiliteColor', false, this.value); } catch(e) {
    const range=sel.getRangeAt(0); const span=document.createElement('span'); span.style.backgroundColor=this.value; range.surroundContents(span);
  }
  calcWordCount();
};

// ========== 纯纯写作风格回车退出格式标记（增强版） ==========
mdBox.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    const val=this.value, pos=this.selectionStart;
    const pairs=[
      {s:'**',e:'**'}, {s:'*',e:'*'}, {s:'~~',e:'~~'},
      {s:'`',e:'`'}, {s:'$$',e:'$$'}, {s:'[',e:']'},
      {s:'<u>',e:'</u>'}, {s:'![',e:']'}
    ];
    for(const p of pairs){
      const sl=p.s.length, el=p.e.length;
      const lineStart = val.lastIndexOf('\n', pos-1)+1;
      const before = val.slice(lineStart, pos);
      const after = val.slice(pos, val.indexOf('\n', pos)>0 ? val.indexOf('\n', pos) : val.length);
      const lastStart = before.lastIndexOf(p.s);
      const firstEnd = after.indexOf(p.e);
      if(lastStart !== -1 && firstEnd !== -1 && before.slice(lastStart+sl).indexOf(p.e) === -1 && after.slice(0, firstEnd).indexOf(p.s) === -1){
        e.preventDefault();
        this.value = val.slice(0, pos) + '\n' + val.slice(pos + firstEnd + el);
        this.selectionStart = this.selectionEnd = pos + 1;
        saveMdRecord(); renderMdPreview(); calcWordCount();
        return;
      }
    }
  }
});

// ========== 光标拖拽（类似纯纯写作） ==========
let isDragging = false;
let dragStartX = 0;
let longPressTimer = null;
const LONG_PRESS_DELAY = 600;

function showDragger() {
  if (currentEditMode !== 'md') return;
  const ta = mdBox;
  if (ta.style.display === 'none') return;
  dragger.classList.add('show');
  const rect = ta.getBoundingClientRect();
  const lineHeight = parseInt(getComputedStyle(ta).lineHeight) || 20;
  const lines = ta.value.substr(0, ta.selectionStart).split('\n').length;
  const top = rect.top + (lines * lineHeight) - 10;
  dragger.style.top = Math.min(Math.max(top, rect.top + 10), rect.bottom - 30) + 'px';
}
function hideDragger() { dragger.classList.remove('show'); isDragging = false; }

mdBox.addEventListener('touchstart', function(e) {
  if (e.touches.length !== 1) return;
  longPressTimer = setTimeout(() => {
    showDragger();
    const touch = e.touches[0];
    dragStartX = touch.clientX;
    isDragging = true;
  }, LONG_PRESS_DELAY);
});
mdBox.addEventListener('touchmove', function(e) {
  if (longPressTimer) clearTimeout(longPressTimer);
  if (!isDragging) return;
  e.preventDefault();
  const touch = e.touches[0];
  const dx = touch.clientX - dragStartX;
  dragStartX = touch.clientX;
  const len = mdBox.value.length;
  const step = Math.round(dx * 0.5);
  let newPos = mdBox.selectionStart + step;
  newPos = Math.max(0, Math.min(len, newPos));
  mdBox.selectionStart = mdBox.selectionEnd = newPos;
  mdBox.focus();
  const rect = mdBox.getBoundingClientRect();
  const lineHeight = parseInt(getComputedStyle(mdBox).lineHeight) || 20;
  const lines = mdBox.value.substr(0, newPos).split('\n').length;
  const top = rect.top + (lines * lineHeight) - 10;
  dragger.style.top = Math.min(Math.max(top, rect.top + 10), rect.bottom - 30) + 'px';
});
mdBox.addEventListener('touchend', function() {
  if (longPressTimer) clearTimeout(longPressTimer);
  if (isDragging) { setTimeout(hideDragger, 200); isDragging = false; }
});
document.addEventListener('touchstart', function(e) {
  if (!dragger.contains(e.target) && e.target !== mdBox) hideDragger();
});

// ========== 快捷键 ==========
window.addEventListener('keydown',function(e){
  if(e.ctrlKey&&e.key==='s'){ e.preventDefault(); document.getElementById('copyJsonBtn').click(); }
  if(e.ctrlKey&&(e.key==='z'||e.key==='Z')){ e.preventDefault(); globalUndo(); }
  if(e.ctrlKey&&(e.key==='y'||e.key==='Y')){ e.preventDefault(); globalRedo(); }
  if(e.ctrlKey&&e.key==='f'){ e.preventDefault(); findReplaceBtn.click(); }
  if(e.ctrlKey&&e.key==='b'){ e.preventDefault(); formatBold(); }
  if(e.ctrlKey&&e.key==='i'){ e.preventDefault(); formatItalic(); }
  if(e.ctrlKey&&e.key==='u'){ e.preventDefault(); insertUnderline(); }
});

// 移动端键盘适配
(function(){
  const ivh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  function handleResize() {
    const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    const opened = h < ivh - 100;
    document.body.classList.toggle('keyboard-opened', opened);
    if (opened) {
      setTimeout(() => {
        const active = document.activeElement;
        if (active && (active.id === 'richEditor' || active.id === 'mdEditor')) {
          active.scrollIntoView({ behavior: 'smooth', block: 'end' });
        } else {
          window.scrollTo(0, document.body.scrollHeight);
        }
        const toolbar = document.querySelector('.edit-toolbar-wrap');
        if (toolbar) {
          const toolbarRect = toolbar.getBoundingClientRect();
          const viewportBottom = window.visualViewport ? window.visualViewport.height : window.innerHeight;
          if (toolbarRect.bottom > viewportBottom - 10) {
            window.scrollBy(0, toolbarRect.bottom - viewportBottom + 10);
          }
        }
      }, 200);
    }
  }
  if(window.visualViewport) window.visualViewport.addEventListener('resize', handleResize);
  else window.addEventListener('resize', handleResize);
})();

// 初始化
window.addEventListener("DOMContentLoaded",()=>{ renderMdPreview(); calcWordCount(); });
