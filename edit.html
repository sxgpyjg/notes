<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>笔记编辑器（完整改进版）</title>
<script src="./data.js?v=1"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
html,body{height:100%;overflow-x:hidden;}
body{background:linear-gradient(135deg, #f5f7fe 0%, #eef2ff 100%);padding:10px 10px 110px;}
.lock-scroll{overflow:hidden !important;touch-action:none !important;}
.tool-box,.tool-row,.save-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 10px;}
.tool-bar{display:flex;gap:8px;margin-bottom:10px;}
.link-btn{border:0;border-radius:10px;padding:9px 0;font-size:14px;color:#fff;flex:1;min-width:0;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:transform 0.15s;}
.link-btn:active{transform:scale(0.97);}
.blog-link{background:linear-gradient(135deg, #10b981, #059669);}
.album-link{background:linear-gradient(135deg, #f97316, #ea580c);}
.tool-btn{background:#ffffff;border:1px solid #e8ecf4;border-radius:8px;padding:10px 6px;font-size:14px;color:#374151;box-shadow:0 1px 3px rgba(99,102,241,0.04);transition:all 0.2s;}
.tool-btn:hover{background:#f0f3ff;border-color:#6366F1;color:#4338ca;}
.tool-btn:active{background:#e0e7ff;}
.save-btn{border:0;border-radius:8px;padding:11px 0;width:100%;font-size:15px;font-weight:600;box-shadow:0 3px 12px rgba(99,102,241,0.2);transition:transform 0.15s,box-shadow 0.15s;background:linear-gradient(135deg, #6366F1, #4f46e5);color:white;}
.save-btn:active{transform:scale(0.97);box-shadow:0 1px 4px rgba(99,102,241,0.3);}
.save-btn-time{background:linear-gradient(135deg, #7c3aed, #6d28d9);}
#exportFullBackup{background:linear-gradient(135deg, #22c55e, #16a34a);}
#importBackup{background:linear-gradient(135deg, #f59e0b, #d97706);}
.title-input,.type-input{width:100%;border:2px solid #e2e8f0;border-radius:12px;padding:12px 16px;font-size:16px;background:#fff;outline:none;margin-bottom:10px;transition:border-color 0.2s, box-shadow 0.2s;}
.title-input:focus,.type-input:focus{border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
.type-input{display:none;}
.tags-input-wrap{width:100%;border:2px solid #e2e8f0;border-radius:12px;padding:8px 10px;margin-bottom:10px;background:#fff;display:flex;flex-wrap:wrap;align-items:center;gap:5px;min-height:48px;cursor:text;transition:border-color 0.2s, box-shadow 0.2s;}
.tags-input-wrap:focus-within{border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
.tag-chip{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:3px 4px 3px 9px;font-size:12px;line-height:1.3;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag-chip-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag-chip-remove{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;font-size:13px;line-height:1;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;user-select:none;transition:background 0.2s;}
.tag-chip-remove:hover{background:rgba(57,80,204,0.3);}
.tag-chip-remove::before{content:"×";font-weight:bold;}
.tag-chip-input{flex:1;min-width:80px;border:none;outline:none;background:transparent;font-size:14px;padding:4px 2px;font-family:inherit;color:#222;}
.tag-chip-input::placeholder{color:#9ca3af;}
.tags-hint{font-size:11px;color:#9ca3af;margin:-6px 0 10px 4px;}
.edit-toolbar-wrap{position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #e0e3f0;z-index:999;padding-bottom:env(safe-area-inset-bottom);border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,0.06);}
body.keyboard-opened .edit-toolbar-wrap{position:absolute;}
.toolbar-main{display:flex;flex-wrap:wrap;gap:1px;padding:4px 6px;align-items:center;}
.toolbar-more{display:none;padding:4px 6px;border-top:1px solid #eee;grid-template-columns:repeat(8, 1fr);gap:0px;}
.toolbar-more.show{display:grid;}
.icon-btn{border:1px solid #ddd;background:#fff;border-radius:6px;width:28px;height:28px;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;touch-action:none;transition:all 0.15s;}
.icon-btn:hover{background:#eef2ff;border-color:#6366F1;}
.icon-btn:active{background:#e0e7ff;}
.icon-btn.active-format{background:#6366F1 !important;color:#fff !important;border-color:#4f46e5 !important;}
.edit-toolbar select{border:1px solid #ddd;border-radius:3px;padding:2px;font-size:11px;height:24px;width:38px;}
.color-input{width:24px;height:24px;border:none;cursor:pointer;border-radius:3px;}
.editor-wrap{margin-bottom:10px;}
.rich-editor{width:100%;min-height:560px;border:2px solid #e2e8f0;border-radius:12px;padding:16px;font-size:15px;outline:none;background:#fff;line-height:1.7;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:border-color 0.2s, box-shadow 0.2s;}
.rich-editor:focus{border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,0.12);}
.rich-editor img{max-width:100%;height:auto;border-radius:6px;margin:8px 0;display:block;cursor:pointer;transition:transform 0.15s;}
.rich-editor img:active{transform:scale(0.98);}
.rich-editor table{width:100%;border-collapse:collapse;margin:6px 0;}
.rich-editor th,.rich-editor td{border:1px solid #999;padding:5px 6px;min-width:50px;}
.md-editor{width:100%;min-height:280px;border:2px solid #e2e8f0;border-radius:12px;padding:16px;font-size:15px;outline:none;background:#f8fafc;line-height:1.7;font-family:monospace;resize:vertical;transition:border-color 0.2s, box-shadow 0.2s;}
.md-editor:focus{border-color:#6366F1;box-shadow:0 0 0 3px rgba(99,102,241,0.12);}
.md-preview{width:100%;min-height:280px;border:2px solid #e2e8f0;border-radius:12px;padding:16px;background:#fff;margin-top:6px;line-height:1.7;transition:border-color 0.2s;}
.mode-switch{margin-bottom:8px;display:flex;gap:8px;}
.mode-switch button{flex:1;padding:8px 0;border-radius:8px;border:2px solid #6366F1;background:#fff;color:#6366F1;font-size:14px;font-weight:600;transition:all 0.2s;}
.mode-switch button.active{background:linear-gradient(135deg, #6366F1, #4f46e5);border-color:transparent;color:white;}
#imgFileInput,#backupFileInput,#hiddenImgFile1,#hiddenImgFile2{opacity:0;position:absolute;width:0;height:0;pointer-events:auto;}
.warn{color:#e53e3e;font-size:12px;margin-bottom:8px;background:#fff2f4;padding:5px 8px;border-radius:6px;}
.tip-green{color:#16a34a;font-size:12px;margin-bottom:8px;background:#f0fdf4;padding:5px 8px;border-radius:6px;}
.tip-red{color:#dc2626;font-weight:bold;font-size:13px;margin-bottom:8px;background:#fee2e2;padding:6px 8px;border-radius:6px;}
body.bg-dark .tip-green,body.bg-midnight .tip-green{background:#163428;color:#86efac;}
body.bg-dark .warn,body.bg-midnight .warn{background:#421a22;color:#fca5a5;}
.login-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;padding:18px;border-radius:10px;width:90%;max-width:300px;}
.login-box input[type="password"]{width:100%;padding:9px;margin:8px 0;border:1px solid #ddd;border-radius:6px;}
.login-box button{width:100%;padding:9px;background:#6366F1;color:#fff;border:none;border-radius:6px;}
.img-collapse{border:1px solid #dbeafe;border-radius:8px;margin:8px 0;overflow:hidden;}
.img-collapse-head{padding:10px 12px;background:linear-gradient(135deg, #eff6ff, #eef2ff);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14px;}
.img-collapse-body{padding:10px;display:none;}
.img-collapse-body.show{display:block;}
.arrow{transition:transform 0.2s;}
.arrow.rotate{transform:rotate(180deg);}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99999;display:flex;align-items:center;justify-content:center;padding:10px;}
.modal-box{width:100%;max-width:400px;background:#fff;border-radius:12px;padding:18px;}
.modal-input{width:100%;border:none;border-bottom:1px solid #999;padding:7px 0;font-size:15px;outline:none;background:transparent;}
.modal-btn{background:transparent;border:none;color:#009688;font-size:16px;}

/* 查找替换弹窗 */
.find-replace-mask{position:fixed;inset:0;background:rgba(0,0,0,0.25);display:none;align-items:center;justify-content:center;z-index:9999;overflow:hidden;touch-action:none;}
.find-replace-mask.show{display:flex;}
.find-replace-box{background:rgba(255,255,255,0.95);width:min(80%, 320px);border-radius:16px;padding:12px;backdrop-filter:blur(12px);box-shadow:0 8px 30px rgba(0,0,0,0.12);position:absolute;cursor:move;will-change:left,top;}
body.bg-dark .find-replace-box,body.bg-midnight .find-replace-box{background:rgba(30,30,40,0.9);color:#eee;}
body.bg-dark .find-replace-item input,body.bg-midnight .find-replace-item input{background:#222;color:#fff;border-color:#555;}
.find-replace-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.find-replace-title{font-size:15px;font-weight:600;}
.find-replace-close{border:none;background:transparent;font-size:18px;color:#666;cursor:pointer;}
.find-replace-item{margin-bottom:10px;}
.find-replace-item label{display:block;font-size:12px;color:#444;margin-bottom:3px;}
.find-replace-item input{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;}
.find-replace-btns{display:flex;gap:5px;margin-top:12px;}
.find-replace-btns button{flex:1;padding:7px 2px;border:none;border-radius:6px;font-size:12px;cursor:pointer;}
.btn-find{background:#e0e7ff;color:#2d3748;}
.btn-replace-all{background:#6366F1;color:#fff;}

/* 美化开关（查找替换和私密） */
.switch-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.switch{position:relative;width:40px;height:22px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:22px;transition:0.3s;}
.slider:before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s;}
.switch input:checked + .slider{background:#6366F1;}
.switch input:checked + .slider:before{transform:translateX(18px);}
.switch-label{font-size:13px;color:#374151;user-select:none;}

/* 私密开关专用 */
.private-switch-group{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:6px 8px;background:#f1f5f9;border-radius:8px;}
.private-switch-group .switch-label{font-size:14px;color:#475569;font-weight:500;}
.private-switch-group .switch-label.private{color:#dc2626;font-weight:600;}

/* 主题背景 */
body.bg-dark .rich-editor,body.bg-midnight .rich-editor,
body.bg-dark .md-editor,body.bg-midnight .md-editor,
body.bg-dark .md-preview,body.bg-midnight .md-preview{background:#121212;color:#eee;border-color:#444;}
body.bg-cream .rich-editor,body.bg-cream .md-editor,body.bg-cream .md-preview{background:#fffbeb;}
body.bg-paper .rich-editor,body.bg-paper .md-editor,body.bg-paper .md-preview{background:#f8f3e6;}
body.bg-softblue .rich-editor,body.bg-softblue .md-editor,body.bg-softblue .md-preview{background:#eef6ff;}
body.bg-sepia .rich-editor,body.bg-sepia .md-editor,body.bg-sepia .md-preview{background:#f4e9d8;color:#2d2010;}
body.bg-custom .rich-editor,body.bg-custom .md-editor,body.bg-custom .md-preview{background:var(--custom-bg,#fff);}
.editor-bg-select{border:1px solid #ddd;border-radius:3px;padding:2px;font-size:11px;height:24px;}
#customBgColor{width:24px;height:24px;display:none;flex-shrink:0;}

/* 大图预览 */
.img-preview-mask{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999999;display:none;align-items:center;justify-content:center;}
.img-preview-mask.show{display:flex;}
.img-preview-img{max-width:95vw;max-height:95vh;object-fit:contain;}
</style>
</head>
<body>
<div id="loginWrap" class="login-modal">
  <div class="login-box">
    <h3>管理员验证</h3>
    <input type="password" id="pwdInput" placeholder="输入管理员密码">
    <button onclick="checkPwd()">确认进入</button>
  </div>
</div>
<div id="mainWrap" style="display:none">
<div class="tool-bar">
  <button class="link-btn blog-link" onclick="window.open('https://sxgpyjg.github.io','_blank')">博客主页</button>
  <button class="link-btn album-link" onclick="window.open('https://sxgpyjg.github.io/blog','_blank')">图文相册</button>
</div>
<div class="tool-box">
<button class="tool-btn" onclick="location.href='admin-list.html'">返回管理列表</button>
<button class="tool-btn" onclick="logoutAdmin()">退出登录</button>
</div>
<div class="tip-green" id="wordCountTip">纯文字数：0 | 总字符(含空格换行)：0</div>
<div class="img-collapse">
  <div class="img-collapse-head" onclick="toggleImgPanel()">
    <span>图片素材面板</span>
    <span class="arrow" id="imgArrow">▼</span>
  </div>
  <div class="img-collapse-body" id="imgPanelBody">
    <div class="tip-red">【高危禁止】cd/cp/git终端命令不要粘贴到data.js，会损坏笔记文件！</div>
    <div class="tip-green">图片复制规则：选中图片仅生成对应cp指令，不会读取手机全部图片</div>
    <div class="warn">不生成base64图片，仅保存images文件夹相对路径，图片需手动上传仓库</div>
    <div class="tool-row">
    <button class="tool-btn" id="copyJsonBtn">一键复制完整data.js代码（仅本段可粘贴nano）</button>
    <button class="tool-btn" id="showTemplateBtn">生成选中图片复制命令</button>
    </div>
    <div class="tool-row">
      <button class="tool-btn" id="clearImgListBtn">清空已选图片记录</button>
      <button class="tool-btn" onclick="exportSingleNoteMd()">导出本篇MD</button>
    </div>
    <div class="tool-row">
      <button class="tool-btn" onclick="exportSingleNoteHtml()">导出本篇HTML</button>
      <button class="tool-btn" id="insertCodeBtn" onclick="insertMdCode()">插入代码块模板</button>
      <button class="tool-btn" onclick="forceReloadRemote()">刷新远程data.js</button>
      <button class="tool-btn" id="loadCleanSnapshot">加载纯净管理快照</button>
    </div>
    <input type="file" id="imgFileInput" multiple>
  </div>
</div>
<div class="save-row">
  <button class="save-btn" id="saveNormalBtn">下载 data.js（无时间戳）</button>
  <button class="save-btn save-btn-time" id="saveTimeBtn">下载 data_时间戳.js（留存旧文件）</button>
</div>
<div class="save-row">
  <button class="save-btn" id="exportFullBackup">导出完整备份notes.json</button>
  <button class="save-btn" id="importBackup">导入本地备份文件</button>
  <input type="file" id="backupFileInput" accept=".json,.js">
</div>
<input class="title-input" placeholder="填写笔记标题">
<div class="tags-input-wrap" id="tagsInputWrap">
  <input type="text" class="tag-chip-input" id="tagChipInput" placeholder="添加标签后回车确认（如：开发笔记）">
</div>
<div class="tags-hint">输入文字后按回车添加标签，点 × 删除 | 点击标签左侧色块可更换颜色</div>
<input class="type-input" placeholder="">

<!-- 私密开关美化 -->
<div class="private-switch-group">
  <div class="switch">
    <input type="checkbox" id="privateCheck">
    <span class="slider"></span>
  </div>
  <label for="privateCheck" class="switch-label private">设为私密</label>
  <span style="font-size:12px;color:#94a3b8;">（仅管理员可见）</span>
</div>

<div class="mode-switch">
  <button id="modeRich" class="active" onclick="switchMode('rich')">富文本可视化编辑</button>
  <button id="modeMd" onclick="switchMode('md')">Markdown纯文本</button>
</div>
<div class="edit-toolbar-wrap">
  <div class="toolbar-main">
    <button class="icon-btn" data-tip="撤销 (Ctrl+Z)" onclick="globalUndo()">↩</button>
    <button class="icon-btn" data-tip="重做 (Ctrl+Y)" onclick="globalRedo()">↪</button>
    <div style="position:relative;width:24px;height:24px;flex-shrink:0;">
<input type="color" class="color-input" id="fontColor" value="#000000" style="width:100%;height:100%;border-radius:3px;border:1px solid #ddd;margin:0;padding:0;">
<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:bold;pointer-events:none;">字</span>
</div>
<div style="position:relative;width:24px;height:24px;flex-shrink:0;">
<input type="color" class="color-input" id="bgColor" value="#fff2cc" style="width:100%;height:100%;border-radius:3px;border:1px solid #ddd;margin:0;padding:0;">
<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#333;font-weight:bold;pointer-events:none;">底</span>
</div>
    <button class="icon-btn" data-tip="加粗 (Ctrl+B)" onclick="formatBold()"><strong>B</strong></button>
    <button class="icon-btn" data-tip="斜体 (Ctrl+I)" onclick="formatItalic()"><em>I</em></button>
    <button class="icon-btn" data-tip="下划线 (Ctrl+U)" onclick="insertUnderline()"><u>U</u></button>
    <button class="icon-btn" data-tip="删除线" onclick="formatStrikeThrough()" style="text-decoration:line-through;">S</button>
    <button class="icon-btn" data-tip="清除文字格式" onclick="clearTextFormat()">T</button>
    <button class="icon-btn" data-tip="居中排版" onclick="insertCenter()">≡</button>
    <button class="icon-btn" data-tip="一级标题" onclick="insertH1()">H1</button>
    <button class="icon-btn" data-tip="二级标题" onclick="insertH2()">H2</button>
    <button class="icon-btn" data-tip="三级标题" onclick="insertH3()">H3</button>
    <button class="icon-btn" data-tip="代码块" onclick="insertMdCode()">&lt;/&gt;</button>
    <select id="fontSizeSel" style="height:24px;width:38px;border:1px solid #ddd;border-radius:3px;font-size:11px;">
      <option value="12px">12</option>
      <option value="14px">14</option>
      <option value="16px" selected>16</option>
      <option value="18px">18</option>
      <option value="20px">20</option>
      <option value="24px">24</option>
    </select>
    <button class="icon-btn" data-tip="行内代码" onclick="insertInlineCode()">`</button>
    <button class="icon-btn" data-tip="引用块" onclick="insertQuote()">></button>
    <button class="icon-btn" data-tip="无序列表" onclick="insertUl()">•</button>
    <button class="icon-btn" data-tip="清空全部内容" onclick="clearAllNotesContent()">🗑️</button>
    <button class="icon-btn" data-tip="表格" onclick="insertTable()">▦</button>
    <button class="icon-btn" data-tip="本地图片上传" id="localImgBtn">🖼</button>
    <button class="icon-btn" data-tip="批量图床链接" id="batchImgBtn">🔗</button>
    <button class="icon-btn" data-tip="插入链接" onclick="insertLink()">[]()</button>
    <button class="icon-btn" data-tip="固定宽度图片" onclick="insertImgWidth()">Img</button>
    <button class="icon-btn" data-tip="查找替换 (Ctrl+F)" id="findReplaceBtn">🔍</button>
    <button class="icon-btn" data-tip="分割线" onclick="splitLine1()">—</button>
    <button class="icon-btn" data-tip="更多工具" onclick="toggleMoreTools()">⋮</button>
    <input type="file" id="hiddenImgFile1" multiple>
    <input type="file" id="hiddenImgFile2" multiple>
  </div>
  <div class="toolbar-more" id="moreToolsPanel">
    <button class="icon-btn" data-tip="行内公式" onclick="insertInlineMath()">∑</button>
    <button class="icon-btn" data-tip="复制选中内容" onclick="copySelect()">📋</button>
    <button class="icon-btn" data-tip="段落上移" onclick="moveUp()">↑</button>
    <button class="icon-btn" data-tip="段落下移" onclick="moveDown()">↓</button>
    <button class="icon-btn" data-tip="嵌套引用" onclick="insertFoldQuote()">>></button>
    <button class="icon-btn" data-tip="有序列表" onclick="insertOrderedList()">1.</button>
    <button class="icon-btn" data-tip="任务列表" onclick="insertTaskList()">☐</button>
    <button class="icon-btn" data-tip="插入网络图床图片" onclick="insertImage()">🖼</button>
    <button class="icon-btn" data-tip="空白复选框" onclick="insertEmptyCheckbox()">[]</button>
    <button class="icon-btn" data-tip="已完成复选框" onclick="insertCheckedCheckbox()">[✓]</button>
    <button class="icon-btn" data-tip="块级公式" onclick="insertBlockLatex()">√∑</button>
    <button class="icon-btn" data-tip="折叠详情块" onclick="insertDetails()">▼</button>

// ========== 全局变量 ==========

const TAG_COLOR_PRESETS = ['#6366F1','#EC4899','#10B981','#F59E0B','#3B82F6','#EF4444','#8B5CF6','#14B8A6','#F97316','#84CC16'];

let list = [];

// DOM引用

// ========== 基础工具 ==========
function getNowTimeStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  const h = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  const s = String(d.getSeconds()).padStart(2,"0");
  return `${y}-${m}-${day} ${h}:${mi}:${s}`;
}
function addImgSerial(){ globalImgSerial++; localStorage.setItem("img_serial", globalImgSerial); }

// ========== 标签颜色系统 ==========
function getTagColor(tagText) {
  const key = tagText.toLowerCase().trim();
  if (tagColorMap[key]) return tagColorMap[key];
  const idx = currentTags.findIndex(t => t.toLowerCase() === key);
  const color = TAG_COLOR_PRESETS[idx % TAG_COLOR_PRESETS.length];
  tagColorMap[key] = color;
  return color;
}
function setTagColor(tagText, color) {
  const key = tagText.toLowerCase().trim();
  if (!color || color === '#000000') return;
  tagColorMap[key] = color;
  renderTagsChips();
  if (targetNote) {
    if (!targetNote.tagColors) targetNote.tagColors = {};
    targetNote.tagColors[key] = color;
    saveLocalCache();
  }
}
function pickTagColorAtIndex(idx) {
  const tag = currentTags[idx];
  if (!tag) return;
  const colorInput = document.createElement('input');
  colorInput.type = 'color';
  colorInput.value = getTagColor(tag);
  colorInput.style.position = 'fixed';
  colorInput.style.opacity = '0';
  colorInput.style.pointerEvents = 'none';
  document.body.appendChild(colorInput);
  colorInput.addEventListener('input', (e) => setTagColor(tag, e.target.value));
  colorInput.addEventListener('change', () => { document.body.removeChild(colorInput); saveLocalCache(); });
  setTimeout(() => colorInput.click(), 50);
}
function renderTagsChips() {
  Array.from(tagsInputWrap.querySelectorAll('.tag-chip')).forEach(n => n.remove());
  currentTags.forEach((tag, idx) => {
    const color = getTagColor(tag);
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.style.backgroundColor = color + '22';
    chip.style.borderLeft = `3px solid ${color}`;
    chip.style.color = color;
    const colorDot = document.createElement('span');
    colorDot.style.cssText = `display:inline-block;width:12px;height:12px;border-radius:50%;background:${color};margin-right:4px;cursor:pointer;flex-shrink:0;border:1px solid rgba(0,0,0,0.12);transition:transform 0.15s;`;
    colorDot.title = '点击更换标签颜色';
    colorDot.addEventListener('click', (e) => { e.stopPropagation(); e.preventDefault(); pickTagColorAtIndex(idx); });
    const text = document.createElement('span');
    text.className = 'tag-chip-text';
    text.textContent = tag;
    text.style.color = color;
    const rm = document.createElement('span');
    rm.className = 'tag-chip-remove';
    rm.style.color = color;
    rm.style.backgroundColor = color + '18';
    rm.addEventListener('click', (e) => { e.stopPropagation(); removeTagAt(idx); });
    chip.appendChild(colorDot);
    chip.appendChild(text);
    chip.appendChild(rm);
    tagsInputWrap.insertBefore(chip, tagChipInput);
  });
}
function addTag(rawText) {
  let text = String(rawText || '').trim();
  if (!text) return;
  if (text.length > 20) text = text.slice(0, 20);
  const exists = currentTags.some(t => t.toLowerCase() === text.toLowerCase());
  if (exists) { tagChipInput.value = ''; return; }
  if (currentTags.length >= 10) { alert('最多添加 10 个标签'); tagChipInput.value = ''; return; }
  currentTags.push(text);
  const key = text.toLowerCase().trim();
  tagColorMap[key] = TAG_COLOR_PRESETS[(currentTags.length-1) % TAG_COLOR_PRESETS.length];
  renderTagsChips();
  tagChipInput.value = '';
}
function getCurrentTags() { return currentTags.slice(); }
function removeTagAt(idx) {
  if (idx < 0 || idx >= currentTags.length) return;
  currentTags.splice(idx, 1);
  renderTagsChips();
}
function setCurrentTags(arr, colorMap) {
  if (!Array.isArray(arr)) arr = [];
  tagColorMap = {};
  const seen = new Set();
  currentTags = [];
  arr.forEach((t, idx) => {
    const s = String(t || '').trim();
    if (!s) return;
    const k = s.toLowerCase();
    if (seen.has(k)) return;
    seen.add(k);
    currentTags.push(s);
    tagColorMap[k] = (colorMap && colorMap[k]) ? colorMap[k] : TAG_COLOR_PRESETS[idx % TAG_COLOR_PRESETS.length];
  });
  renderTagsChips();
}
// 标签输入事件
if (tagChipInput) {
  tagsInputWrap.addEventListener('click', (e) => { if (e.target === tagsInputWrap) tagChipInput.focus(); });
  tagChipInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(tagChipInput.value); }
    else if (e.key === 'Backspace' && tagChipInput.value === '' && currentTags.length > 0) { e.preventDefault(); removeTagAt(currentTags.length - 1); }
  });
  tagChipInput.addEventListener('blur', () => { if (tagChipInput.value.trim()) addTag(tagChipInput.value); });
  tagChipInput.addEventListener('paste', (e) => {
    const txt = (e.clipboardData || window.clipboardData).getData('text');
    if (/[,\n，]/.test(txt)) { e.preventDefault(); txt.split(/[,\n，]/).forEach(part => addTag(part)); }
  });
}

// ========== 数据持久化 ==========
function saveNoteToStorage(newList) {
  localStorage.setItem("notes", JSON.stringify(newList));

}
function saveLocalCache() {
  const tempObj = { list, targetId: targetNote ? targetNote.id : null, imgUploadList, serial: globalImgSerial };

}

    list = JSON.parse(JSON.stringify(window.NOTE_DATA));
  } else {
    list = [];
  }
  if (cacheStr) {
    try {
      const tempCache = JSON.parse(cacheStr);
      const tempDraft = tempCache.list?.find(item => item._isTempNew === true);
      if (tempDraft && !list.some(n => n.id === tempDraft.id)) {
        list.push(tempDraft);
      }
    } catch(e) {}
  }
}
function getFullJsText() { return "window.NOTE_DATA = " + JSON.stringify(list, null, 2); }

// ========== 登录与初始化 ==========
function checkPwd() {
  const inputPwd = document.getElementById("pwdInput").value.trim();

  if (Date.now() > expireTs) { localStorage.removeItem(PWD_STORE_KEY); localStorage.removeItem(LOGIN_EXPIRE_KEY); return; }

})();

function initLoadNote() {
  imgUploadList = [];
  if (!editId) return;
  const target = list.find(item => item.id === Number(editId));

  targetNote = target;
  titleInput.value = target.title;

// ========== 编辑器模式切换 ==========
function switchMode(mode) {
  currentEditMode = mode;
  richModeBtn.classList.toggle("active", mode === "rich");
  mdModeBtn.classList.toggle("active", mode === "md");
  if (mode === "rich") {
    let html = mdToHtml(mdBox.value);
    richBox.innerHTML = html;
    richBox.style.display = "block";
    mdBox.style.display = "none";
    mdPreviewBox.style.display = "none";
    richRecordStack = [richBox.innerHTML];
    richRecordIndex = 0;
    checkFormatActive();
  } else {
    let md = htmlToMd(richBox.innerHTML);
    md = md.replace(/\n{3,}/g, "\n\n");
    mdBox.value = md;
    saveMdRecord();
    renderMdPreview();
    richBox.style.display = "none";
    mdBox.style.display = "block";
    mdPreviewBox.style.display = "block";
  }
  calcWordCount();
}

// ========== MD <-> HTML 转换（含公式、表格） ==========
function mdToHtml(str) {
  let html = str
    .replace(/\$\$([\s\S]*?)\$\$/g, (m, f) => { try { return katex.renderToString(f,{displayMode:true}); } catch(e){ return m; } })
    .replace(/\$([^\$]+?)\$/g, (m, f) => { try { return katex.renderToString(f,{displayMode:false}); } catch(e){ return m; } })
    .replace(/```([\s\S]*?)```/g, '<pre style="background:#f5f5f5;padding:10px;border-radius:6px;white-space:pre-wrap;"><code>$1</code></pre>');
  // 表格
  html = html.replace(/(^|\n)(\|.+\|\n)((?:\|[-:| ]+\|)(?:\n|$))+(\|.+\|)/g, (_, pre, hRow, sep, cRow) => {
    const rows = (hRow+sep+cRow).split('\n').filter(r => r.trim().length > 0);
    let table = '<table style="width:100%;border-collapse:collapse;margin:8px 0;">';
    rows.forEach((row, idx) => {
      const cells = row.split('|').filter(s => s.trim() !== '');
      table += '<tr>';
      cells.forEach(txt => { table += `<${idx===0?'th':'td'} style="border:1px solid #999;padding:6px 8px;">${txt.trim()}</${idx===0?'th':'td'}>`; });
      table += '</tr>';
    });
    return pre + table + '</table>';
  });
  // 行内
  html = html
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
    .replace(/~~(.+?)~~/g, '<s>$1</s>')
    .replace(/^\- (.+)$/gm, '<li>$1</li>')
    .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)\{width=(\d+)\}/g, '<img src="$2" alt="$1" style="max-width:100%;margin:8px 0;width:$3px;">')
    .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;margin:8px 0;">');
  return html.replace(/\n/g, '<br>');
}
function htmlToMd(htmlStr) {
  let md = htmlStr
    .replace(/<pre style="background:#f5f5f5;padding:10px;border-radius:6px;white-space:pre-wrap;"><code>([\s\S]*?)<\/code><\/pre>/g, '```\n$1\n```')
    .replace(/<h1>(.*?)<\/h1>/g, '# $1')
    .replace(/<h2>(.*?)<\/h2>/g, '## $1')
    .replace(/<h3>(.*?)<\/h3>/g, '### $1')
    .replace(/<strong>(.*?)<\/strong>/g, '**$1**')
    .replace(/<em>(.*?)<\/em>/g, '*$1*')
    .replace(/<s>(.*?)<\/s>/g, '~~$1~~')
    .replace(/<li>(.*?)<\/li>/g, '- $1')
    .replace(/<img[^>]*width="(\d+)"[^>]*src="([^"]+)"[^>]*alt="([^"]*)"[^>]*>/g, '![$3]($2){width=$1}')
    .replace(/<img[^>]*src="([^"]+)"[^>]*alt="([^"]*)"[^>]*>/g, '![$2]($1)')
    .replace(/<br>/g, '\n');
  md = md.replace(/<(?!p style="text-align:center"|u|table|tr|th|td)[^>]+>/g, '');
  return md;
}
function renderMdPreview() { mdPreviewBox.innerHTML = mdToHtml(mdBox.value); }

// ========== 历史栈 ==========
function saveMdRecord() { mdRecordStack.splice(mdRecordIndex + 1); mdRecordStack.push(mdBox.value); mdRecordIndex = mdRecordStack.length - 1; }
function mdUndo() { if (mdRecordIndex <= 0) return; mdRecordIndex--; mdBox.value = mdRecordStack[mdRecordIndex]; renderMdPreview(); calcWordCount(); }
function mdRedo() { if (mdRecordIndex >= mdRecordStack.length - 1) return; mdRecordIndex++; mdBox.value = mdRecordStack[mdRecordIndex]; renderMdPreview(); calcWordCount(); }
function globalUndo() { if (currentEditMode === 'rich') { if (richRecordIndex <= 0) return alert("已到最早操作记录"); richRecordIndex--; richBox.innerHTML = richRecordStack[richRecordIndex]; checkFormatActive(); calcWordCount(); } else mdUndo(); }
function globalRedo() { if (currentEditMode === 'rich') { if (richRecordIndex >= richRecordStack.length - 1) return alert("无后续操作"); richRecordIndex++; richBox.innerHTML = richRecordStack[richRecordIndex]; checkFormatActive(); calcWordCount(); } else mdRedo(); }
richBox.addEventListener('input', () => {
  richRecordStack.splice(richRecordIndex + 1);
  richRecordStack.push(richBox.innerHTML);
  if (richRecordStack.length > RICH_RECORD_MAX) richRecordStack.shift();
  richRecordIndex = richRecordStack.length - 1;
  checkFormatActive();
  calcWordCount();
});
mdBox.addEventListener('input', () => { saveMdRecord(); renderMdPreview(); calcWordCount(); });

// ========== 格式检测高亮 ==========
function checkFormatActive() {
  document.querySelectorAll(".icon-btn").forEach(btn => btn.classList.remove("active-format"));
  if (currentEditMode !== "rich") return;
  if (document.queryCommandState("bold")) document.querySelector('[onclick="formatBold()"]')?.classList.add("active-format");
  if (document.queryCommandState("italic")) document.querySelector('[onclick="formatItalic()"]')?.classList.add("active-format");
  if (document.queryCommandState("underline")) document.querySelector('[onclick="insertUnderline()"]')?.classList.add("active-format");
  if (document.queryCommandState("strikeThrough")) document.querySelector('[onclick="formatStrikeThrough()"]')?.classList.add("active-format");
  const sel = window.getSelection();
  if (sel.rangeCount) {
    let el = sel.getRangeAt(0).commonAncestorContainer;
    while (el.nodeType === 1) {
      if (el.tagName === 'H1') { document.querySelector('[onclick="insertH1()"]')?.classList.add("active-format"); break; }
      if (el.tagName === 'H2') { document.querySelector('[onclick="insertH2()"]')?.classList.add("active-format"); break; }
      if (el.tagName === 'H3') { document.querySelector('[onclick="insertH3()"]')?.classList.add("active-format"); break; }
      el = el.parentNode;
      if (el === richBox) break;
    }
    let block = sel.getRangeAt(0).commonAncestorContainer;
    while (block.nodeType !== 1 || !['P','H1','H2','H3','DIV'].includes(block.tagName)) { block = block.parentNode; if (!block || block === richBox) break; }
    if (block && block.style.textAlign === 'center') document.querySelector('[onclick="insertCenter()"]')?.classList.add("active-format");
  }
}
richBox.addEventListener('selectionchange', checkFormatActive);

// ========== 字数统计 ==========
function calcWordCount() {
  const text = currentEditMode === 'rich' ? (richBox.innerText || '') : mdBox.value;
  const charAll = text.length;
  const word = text.replace(/\s/g,"").length;
  wordCountTip.innerText = `纯文字数：${word} | 总字符(含空格换行)：${charAll}`;
}

// ========== 格式化按钮（修复光标定位） ==========
function setCaretInMd(tpl) {
  const start = mdBox.value.length;
  mdBox.value += tpl;
  saveMdRecord();
  renderMdPreview();
  calcWordCount();
  const pos = start + Math.floor(tpl.length / 2);
  mdBox.selectionStart = pos;
  mdBox.selectionEnd = pos;
  mdBox.focus();
}
function formatBold() {
  if (currentEditMode === 'rich') { richBox.focus(); document.execCommand('bold', false, null); checkFormatActive(); calcWordCount(); }
  else setCaretInMd('****');
}
function formatItalic() {
  if (currentEditMode === 'rich') { richBox.focus(); document.execCommand('italic', false, null); setTimeout(checkFormatActive,20); calcWordCount(); }
  else setCaretInMd('**');
}
function formatStrikeThrough() {
  if (currentEditMode === 'rich') { richBox.focus(); document.execCommand('strikeThrough', false, null); checkFormatActive(); calcWordCount(); }
  else setCaretInMd('~~~~');
}
function insertUnderline() {
  if (currentEditMode === 'rich') { richBox.focus(); document.execCommand('underline', false, null); checkFormatActive(); calcWordCount(); }
  else setCaretInMd('<u></u>');
}
function clearTextFormat() { if (currentEditMode === 'rich') { richBox.focus(); document.execCommand('removeFormat', false, null); checkFormatActive(); calcWordCount(); } else alert("Markdown模式请手动删除格式标记"); }
function insertMdCode() {
  if (currentEditMode === 'rich') { document.execCommand('insertHTML', false, '<pre style="background:#f5f5f5;padding:10px;border-radius:6px;white-space:pre-wrap;"><code>\n</code></pre><br><br>'); calcWordCount(); }
  else { const t = "```\n\n```\n"; const p = mdBox.value.length; mdBox.value += t; saveMdRecord(); renderMdPreview(); calcWordCount(); mdBox.selectionStart = p+4; mdBox.selectionEnd = p+4; mdBox.focus(); }
}
function insertInlineCode() {
  if (currentEditMode === 'rich') { document.execCommand('insertText', false, '``'); const r=window.getSelection().getRangeAt(0); r.setStart(r.startContainer, r.startOffset-1); r.collapse(true); r.removeAllRanges(); r.addRange(r); richBox.focus(); calcWordCount(); }
  else setCaretInMd('``');

function handleFileSelect(fileList, callback) {
  if (!fileList || fileList.length===0) return;
  const files = Array.from(fileList);
  files.forEach((file) => {

    if(!safeName || safeName.startsWith('blob') || safeName.length<3){ const ext = file.type.split('/')[1] || 'jpg'; addImgSerial(); safeName = `${Date.now()}_${globalImgSerial}.${ext}`; }
    else { addImgSerial(); safeName = `${globalImgSerial}_${safeName}`; }
    let realPath = file.path || '';
    if (!realPath) {
      const fnLower = file.name.toLowerCase();
      if (/screenshot/.test(fnLower)) realPath = `/storage/emulated/0/DCIM/Screenshots/${file.name}`;
      else if (/wx_|wechat|mmexport/.test(fnLower)) realPath = `/storage/emulated/0/tencent/MicroMsg/WeiXin/${file.name}`;
      else if (/qq/.test(fnLower)) realPath = `/storage/emulated/0/tencent/QQ_images/${file.name}`;
      else if (/download/.test(fnLower)) realPath = `/storage/emulated/0/Download/${file.name}`;
      else realPath = `/storage/emulated/0/DCIM/Camera/${file.name}`;
    } else { realPath = realPath.replace(/^\/storage\/emulated\/0\//i, '/storage/emulated/0/'); }
    const userPath = prompt(`请确认图片源路径（可修改）：\n文件：${safeName}`, realPath);
    const finalPath = userPath && userPath.trim() ? userPath.trim() : realPath;

    imgUploadList.push({ name: safeName, src: finalPath, copyCmd: cpCmd });
    insertLocalImgTagTerminal(safeName, finalPath);
  });
  if(callback) callback();
}

function selectRichText(start, len) {
  const sel = window.getSelection(); const range = document.createRange();
  let offset=0, node=null, nodeOff=0;
  function walk(el){ for(const c of el.childNodes){ if(node)return; if(c.nodeType===Node.TEXT_NODE){ const l=c.textContent.length; if(offset+l>start){ node=c; nodeOff=start-offset; return; } offset+=l; } else walk(c); } }
  walk(richBox);
  if(node){ range.setStart(node, nodeOff); range.setEnd(node, nodeOff+len); sel.removeAllRanges(); sel.addRange(range); richBox.focus(); }
}

// ========== 纯纯写作风格：回车退出格式标记 ==========
mdBox.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const val = this.value; const pos = this.selectionStart;
    const pairs = [{s:'**',e:'**'},{s:'*',e:'*'},{s:'~~',e:'~~'},{s:'`',e:'`'},{s:'$$',e:'$$'},{s:'[',e:']'},{s:'<u>',e:'</u>'}];
    for (const p of pairs) {
      const sl=p.s.length, el=p.e.length;
      if (pos<sl || pos>val.length-el) continue;
      if (val.slice(pos-sl,pos)===p.s && val.slice(pos,pos+el)===p.e) {
        e.preventDefault();
        this.value = val.slice(0,pos) + '\n' + val.slice(pos+el);
        this.selectionStart = this.selectionEnd = pos + 1;
        saveMdRecord(); renderMdPreview(); calcWordCount();
        return;
      }
    }
  }
});

});

function viewportResizeHandle(){
  const curH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  document.body.classList.toggle('keyboard-opened', curH < initViewHeight - 100);
}
if(window.visualViewport) window.visualViewport.addEventListener("resize", viewportResizeHandle);
else window.addEventListener("resize", viewportResizeHandle);

// 加载纯净快照
document.getElementById('loadCleanSnapshot').onclick = function(){
  const snap = sessionStorage.getItem('cleanNoteSnapshot');
  if(!snap) return alert('无快照，请在管理页生成');
  try {
    window.NOTE_DATA = JSON.parse(snap);
    list = JSON.parse(snap);
    localStorage.removeItem('notes');
    localStorage.removeItem(CACHE_KEY);
    initLoadNote();
    calcWordCount();
    alert('已加载快照');
  } catch(e){ alert('快照解析失败'); }
};

// 主题切换函数（保留所有背景选项）
function changeEditorBg(type) {
  document.body.classList.remove('bg-cream','bg-gray','bg-paper','bg-softblue','bg-sepia','bg-dark','bg-midnight','bg-custom');
  richBox.style.background = mdBox.style.background = mdPreviewBox.style.background = '';
  if(type==='custom') { document.body.classList.add('bg-custom'); customBgColorInput.style.display='block'; }
  else { document.body.classList.add('bg-'+type); customBgColorInput.style.display='none'; }
  calcWordCount();
}
function resetDefaultBg() {
  document.body.className='';
  richBox.style.background = mdBox.style.background = mdPreviewBox.style.background = '';
  customBgColorInput.style.display='none';
}

// 初始化
window.addEventListener("DOMContentLoaded", () => { renderMdPreview(); calcWordCount(); });
</script>
