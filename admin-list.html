<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记管理列表</title>
<!-- 同目录相对路径 + 版本号防缓存 -->
<script src="./data.js?v=1"></script>
<style>
*{
  margin:0;padding:0;box-sizing:border-box;
  font-family: system-ui, sans-serif;
}
body{
  background:#f7f8fc;
  padding:0 2px;
  max-width:100%;
  margin:0 auto;
}
header{
  margin-bottom:16px;
  padding-bottom:10px;
  border-bottom:1px solid #e4e7f3;
}
.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  flex-wrap:wrap;
  gap:8px;
}
h1{
  font-size:22px;
  color:#1d2133;
}
.btn-group-header{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.back-btn{
  padding:6px 10px;
  background:#e4e7f3;
  border:none;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
  transition:0.15s;
}
.back-btn:hover{
  background:#d9dcf0;
}
.new-btn{
  padding:6px 10px;
  background:#6366F1;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
  transition:0.15s;
}
.new-btn:hover{
  background:#4f46e5;
}
.blog-btn{
  padding:6px 10px;
  background:#10b981;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
  transition:0.15s;
}
.blog-btn:hover{
  background:#059669;
}
.album-btn{
  padding:6px 10px;
  background:#f97316;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
  transition:0.15s;
}
.album-btn:hover{
  background:#ea580c;
}
.item-box{
  background:#fff;
  border-radius:10px;
  padding:12px;
  box-shadow:0 2px 10px rgba(99,102,241,0.07);
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  transition:0.15s;
}
.item-box:hover{
  box-shadow:0 3px 12px rgba(99,102,241,0.12);
}
.item-info h3{
  font-size:16px;
  color:#1a1e32;
  margin-bottom:4px;
}
.item-info p{
  font-size:13px;
  color:#888;
}
.btn-group{
  display:flex;
  gap:6px;
}
.edit-btn{
  background:#6366F1;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  transition:0.15s;
}
.edit-btn:hover{
  background:#4f46e5;
}
.del-btn{
  background:#f43f5e;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  transition:0.15s;
}
.del-btn:hover{
  background:#e11d48;
}
.empty{
  text-align:center;
  padding:50px 2px;
  color:#999;
}
/* 弹窗样式 修复遮罩交互 */
.login-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  cursor:pointer;
}
.login-box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:320px;
  cursor:default;
}
.login-box input[type="password"]{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
}
.login-box input[type="password"]:focus{
  border-color:#6366F1;
}
.login-box button{
  width:100%;
  padding:10px;
  background:#6366F1;
  color:#fff;
  border:none;
  border-radius:8px;
  margin-top:8px;
  cursor:pointer;
  transition:0.15s;
}
.login-box button:hover{
  background:#4f46e5;
}
.remember-row{
  display:flex;
  gap:6px;
  align-items:center;
}
</style>
</head>
<body>
<div id="loginWrap" class="login-modal">
  <div class="login-box">
    <h3>管理员登录</h3>
    <input type="password" id="pwdInput" placeholder="输入管理员密码">
    <div class="remember-row">
      <input type="checkbox" id="rememberCheck">
      <label for="rememberCheck">记住密码</label>
    </div>
    <button onclick="doLogin()">登录</button>
  </div>
</div>

<header style="display:none" id="mainWrap">
  <div class="header-top">
    <h1>笔记管理后台</h1>
    <div class="btn-group-header">
      <button class="blog-btn" onclick="window.open('https://sxgpyjg.github.io','_blank')">博客主页</button>
      <button class="album-btn" onclick="window.open('https://sxgpyjg.github.io/blog','_blank')">图文相册</button>
      <button class="new-btn" onclick="location.href='edit.html'">+新建笔记</button>
      <button class="back-btn" onclick="forceReloadRemote()">刷新数据</button>
      <!-- 新增复制纯净JSON按钮 -->
      <button class="back-btn" onclick="copyCleanJson()">复制全部笔记JSON</button>
      <button class="back-btn" onclick="location.href='index.html'">笔记首页</button>
      <button class="back-btn" onclick="logoutAdmin()">退出登录</button>
    </div>
  </div>
</header>
<div id="listWrap"></div>

<script>
const ADMIN_PASSWORD = "admin123";
const PWD_STORE_KEY = "admin_save_pwd";
const LOGIN_EXPIRE_KEY = "admin_login_expire";
const LOGIN_EXPIRE_HOUR = 8;
let remoteNoteData = [];

// 转义特殊字符，防止HTML注入、渲染报错
function escapeHtml(str){
  const s = String(str ?? "");
  return s.replace(/&/g,"&amp;")
          .replace(/</g,"&lt;")
          .replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;")
          .replace(/'/g,"&#039;");
}

// 强制刷新远程数据，保留本地缓存兜底
function forceReloadRemote(){
  const url = new URL(location.href);
  // 追加时间戳，绕过缓存拉取最新data.js
  url.searchParams.set("_dt", Date.now());
  location.href = url.toString();
}


// 优先加载线上data.js远程数据，同步本地存储，延时300ms适配手机弱网
window.addEventListener("load", ()=>{
  setTimeout(()=>{
    if(window.NOTE_DATA && Array.isArray(window.NOTE_DATA)){
      remoteNoteData = JSON.parse(JSON.stringify(window.NOTE_DATA));
      saveAllNotes(remoteNoteData);
    }
    render();
  }, 300);
});

// 读取笔记：远程优先，兜底本地缓存
function loadAllNotes(){
  if(remoteNoteData.length > 0) return remoteNoteData;
  const raw = localStorage.getItem("notes");
  try{
    return raw ? JSON.parse(raw) : [];
  }catch(e){
    return [];
  }
}

// 统一写入唯一存储 notes
function saveAllNotes(list){
  localStorage.setItem("notes", JSON.stringify(list));
  window.NOTE_DATA = list;
}

// 退出登录（和编辑器逻辑完全一致）
function logoutAdmin(){
  localStorage.removeItem(PWD_STORE_KEY);
  localStorage.removeItem(LOGIN_EXPIRE_KEY);
  location.reload();
}

// 登录校验
function doLogin(){
  const inputPwd = document.getElementById("pwdInput").value.trim();
  const remember = document.getElementById("rememberCheck").checked;
  if(inputPwd !== ADMIN_PASSWORD){
    alert("密码错误");
    return;
  }
  if(remember){
    localStorage.setItem(PWD_STORE_KEY, inputPwd);
    const expire = Date.now() + LOGIN_EXPIRE_HOUR * 3600 * 1000;
    localStorage.setItem(LOGIN_EXPIRE_KEY, expire);
  }else{
    localStorage.removeItem(PWD_STORE_KEY);
    localStorage.removeItem(LOGIN_EXPIRE_KEY);
  }
  document.getElementById("loginWrap").style.display = "none";
  document.getElementById("mainWrap").style.display = "block";
  window.NOTE_DATA = loadAllNotes();
  render();
}

// 【新增】点击遮罩空白区域关闭登录弹窗
document.getElementById("loginWrap").addEventListener("click", function(e){
  if(e.target === this){
    this.style.display = "none";
  }
});

// 自动登录（增加8小时过期校验，和编辑器同步）
(function autoLogin(){
  const saved = localStorage.getItem(PWD_STORE_KEY);
  const expireTs = Number(localStorage.getItem(LOGIN_EXPIRE_KEY)) || 0;
  const now = Date.now();
  // 过期清空登录信息
  if(expireTs < now){
    localStorage.removeItem(PWD_STORE_KEY);
    localStorage.removeItem(LOGIN_EXPIRE_KEY);
    return;
  }
  if(saved === ADMIN_PASSWORD){
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("mainWrap").style.display = "block";
    window.NOTE_DATA = loadAllNotes();
    render();
  }
})();

// 删除函数：只操作一份存储，全局同步
window.delNote = function(id){
  if(!confirm("确认永久删除这条笔记？删除后无法恢复")){
    return;
  }
  let list = loadAllNotes();
  list = list.filter(item => item.id !== id);
  saveAllNotes(list);
  alert("已删除，请点击【复制全部笔记JSON】同步data.js仓库");
  render();
}

// 渲染列表：取消过滤草稿 _isTempNew，所有笔记全部展示，按时间倒序
function render(){
  const wrap = document.getElementById('listWrap');
  let list = window.NOTE_DATA || loadAllNotes();
  if(!Array.isArray(list)) list = [];

  // 取消草稿过滤，草稿、正式笔记一起显示
  // const realList = list.filter(item => !item._isTempNew);
  const realList = [...list];

  if(realList.length === 0){
    wrap.innerHTML = '<div class="empty">暂无笔记，点击上方【+新建笔记】创建第一条</div>';
    return;
  }
  let html = '';
  // 创建时间倒序，最新在顶部
  realList.sort((a,b)=>new Date(b.date) - new Date(a.date)).forEach(item=>{
    const title = escapeHtml(item.title);
    const type = escapeHtml(item.type);
    const date = escapeHtml(item.date);
    html += `
    <div class="item-box">
      <div class="item-info">
        <h3>${title}</h3>
        <p>${date} | ${type}</p>
      </div>
      <div class="btn-group">
        <button class="edit-btn" onclick="location.href='edit.html?id=${item.id}'">编辑</button>
        <button class="del-btn" onclick="delNote(${item.id})">删除</button>
      </div>
    </div>
    `
  })
  wrap.innerHTML = html;
}

// 新增：复制本地最新纯净JSON（不含已删除笔记）
function copyCleanJson(){
  const freshList = loadAllNotes();
  const jsonText = JSON.stringify(freshList, null, 2);
  navigator.clipboard.writeText(jsonText).then(()=>{
    alert("复制成功！内容已剔除所有删除笔记，直接覆盖data.js即可");
  }).catch(()=>{
    // 兼容低版本浏览器
    const tempTextarea = document.createElement('textarea');
    tempTextarea.value = jsonText;
    document.body.appendChild(tempTextarea);
    tempTextarea.select();
    document.execCommand('copy');
    document.body.removeChild(tempTextarea);
    alert("复制成功！内容已剔除所有删除笔记");
  });
}
</script>
</body>
</html>
