<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公开笔记列表</title>
<script src="./data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{padding:20px;background:#f5f7fa;max-width:700px;margin:0 auto}
.back{display:inline-block;padding:10px 14px;background:#ddd;border-radius:8px;text-decoration:none;color:#333;margin-bottom:20px}
.item{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
.tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:13px;color:#fff;margin-bottom:8px}
.tag-note{background:#6366F1}
.tag-doc{background:#22c55e}
.title{font-size:18px;font-weight:500;margin-bottom:6px}
.time{font-size:14px;color:#888}
.empty{text-align:center;padding:60px 0;color:#999;font-size:16px}
</style>
</head>
<body>
<a class="back" href="index.html">← 返回首页</a>
<div id="listWrap"></div>
<script>
let noteList = window.NOTE_DATA || [];
function render(){
  const wrap = document.getElementById("listWrap");
  if(noteList.length===0){
    wrap.innerHTML="<div class='empty'>暂无笔记内容</div>";
    return;
  }
  let html = "";
  noteList.forEach(item=>{
    const typeText = item.type==="note"?"开发笔记":"实操教程";
    const tagClass = item.type==="note"?"tag tag-note":"tag tag-doc";
    html += `
    <div class="item" onclick="location.href='view.html?id=${item.id}'">
      <div class="${tagClass}">${typeText}</div>
      <div class="title">${item.title}</div>
      <div class="time">${item.date}</div>
    </div>
    `;
  })
  wrap.innerHTML = html;
}
render();
</script>
</body>
</html>
