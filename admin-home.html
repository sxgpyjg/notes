<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{padding:30px 20px;background:#f5f7fa;max-width:600px;margin:0 auto}
.btn{display:block;width:100%;padding:18px;text-align:center;border-radius:12px;font-size:17px;text-decoration:none;margin-bottom:16px;color:#fff}
.btn1{background:#6366F1}
.btn2{background:#22c55e}
.btn3{background:#888}
</style>
</head>
<body>
<script>
if(localStorage.getItem("adminLogin") !== "1"){
  const pwd = prompt("请输入管理密码");
  if(pwd !== "123456"){
    alert("密码错误");
    location.href="index.html";
  }else{
    localStorage.setItem("adminLogin","1");
  }
}
</script>
<a class="btn btn1" href="admin-list.html">全部笔记列表</a>
<a class="btn btn2" href="edit.html">新建笔记</a>
<a class="btn btn3" href="index.html">返回首页</a>
</body>
</html>
