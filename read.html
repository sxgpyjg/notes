<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>笔记阅读</title>
<script src="./data.js"></script>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}
body{
  background: #f7f8fc;
  padding: 0 4px;
  max-width: 1280px;
  margin: 0 auto;
}
header{
  margin-bottom: 16px;
  padding: 12px 6px;
  border-bottom: 1px solid #e4e7f3;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}
.back-btn{
  border:none;
  background:#e0e7ff;
  color:#434bc4;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}
h1{
  font-size: 22px;
  color: #1d2133;
  font-weight: 600;
}
#fullPageBtn{
width:68px;height:68px;
border:none;background:transparent;
display:flex;align-items:center;justify-content:center;
-webkit-tap-highlight-color:transparent;
padding:0;
transition:all 0.12s;
cursor: pointer;
}
#fullPageBtn:active{transform:scale(0.92);}
#fullPageBtn svg{width:46px;height:46px;}
#fullPageBtn path{
  fill:none;
  stroke:#9ca3af;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.card-head{
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: nowrap;
}
.card-head.collapsed {
  margin-bottom: 0;
  padding: 2px 0;
}
.card-head.collapsed .card-title,
.card-head.collapsed .card-date,
.card-head.collapsed .tag-group {
  opacity:0; width:0; font-size:0; overflow:hidden; padding:0; margin:0;
}
.card-title{
  font-size: 20px;
  font-weight: 600;
  color: #1a1e32;
  flex: 1;
  min-width: 80px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta-row{
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.card-date{font-size: 13px; color: #9498b3; white-space: nowrap;}
.tag-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.tag{
  font-size: 12px;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
}
.tag-note{background: #e8eaff;color:#3950cc;}
.tag-doc{background:#e6f8ee;color:#148246;}
.tag-custom{background:#fff0e6;color:#b8460c;}
.tag-编程{background:#e1f5fe;color:#0277bd;}
.collapse-head-btn {
  width: 26px;height:26px;
  border-radius: 50%;border:none;
  background:#e0e7ff;color:#434bc4;
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.collapse-head-btn:active{background:#6366F1;color:#fff;}
.content-wrap{
  background:#fff;
  border-radius:14px;
  padding:16px;
  box-shadow: 0 2px 14px rgba(99, 102, 241, 0.07);
}
.card-content{
  font-size: 16px;
  line-height: 1.8;
  color: #33364a;
  overflow-wrap: break-word;
}
.card-content img{
  max-width: 100%;
  border-radius: 10px;
  margin: 12px 0;
  loading: lazy;
}
.card-content table {
  border-collapse: collapse;
  width: 100%;
  border: 1px solid #999;
  margin: 10px 0;
}
.card-content th,
.card-content td {
  border: 1px solid #999;
  padding: 6px 8px;
}

.card-content pre {
  position: relative !important;
  margin:14px 0;
  padding: 18px 14px !important;
  background: #282c34;
  border-radius: 8px;
  color: #abb2bf;
  white-space: pre !important;
  word-wrap: normal !important;
  overflow-wrap: normal !important;
  word-break: normal !important;
  overflow-x: auto !important;
  max-width: 100%;
  font-size:14px;
  -webkit-overflow-scrolling: touch;
  transition: font-size 0.15s;
}
.card-content pre code {
  white-space: inherit !important;
  word-break: inherit !important;
  font-family: Consolas, Menlo, Monaco, monospace;
}

/* CSDN语法高亮配色 */
.card-content pre span.comment { color: #5c6370; font-style: italic; }
.card-content pre span.keyword  { color: #61afef; }
.card-content pre span.string   { color: #e5c07b; }
.card-content pre span.function { color: #c678dd; }

/* 代码块按钮组 */
.code-toolbar{
  position:absolute;
  top:6px;
  right:6px;
  display:flex;
  gap:4px;
  z-index:9999;
}
.code-btn{
  background:#44475a;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:3px 8px;
  font-size:11px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}
.code-btn:active{background:#6366F1;color:#fff;}

/* API 全屏(桌面) */
.card-content pre:fullscreen {
  width:100vw;height:100vh;margin:0;background:#282c34;
  overflow:auto;display:flex;align-items:flex-start;justify-content:center;
  padding:24px !important;
  font-size:16px !important;
}

/* CSS 模拟全屏(手机,兼容 iOS Safari) */
.card-content pre.pre-mobile-fullscreen{
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  height: 100dvh !important;
  z-index: 99999 !important;
  margin: 0 !important;
  border-radius: 0 !important;
  padding: 24px 16px !important;
  padding-top: max(24px, env(safe-area-inset-top)) !important;
  padding-bottom: max(24px, env(safe-area-inset-bottom)) !important;
  overflow: auto !important;
  background: #282c34 !important;
  font-size: 16px !important;
  -webkit-overflow-scrolling: touch;
}
.copy-code-btn{
  position:absolute;top:6px;right:6px;
  background:#44475a;color:#fff;border:0;border-radius:6px;
  padding:3px 6px;font-size:11px;cursor:pointer;z-index:9999;
}
.slide-wrap {
  width:100%;overflow:hidden;
  border-radius:10px;position:relative;
  margin:12px 0;background:#f0f0f0;
}
.slide-box {display:flex;transition:transform 0.3s ease;touch-action:pan-x;}
.slide-item {width:100%;flex-shrink:0;display:flex;justify-content:center;align-items:center;}
.slide-item img {max-width:100%;max-height:65vh;width:auto;height:auto;object-fit:contain;loading:lazy;}
.slide-dot {position:absolute;bottom:8px;left:50%;transform: translateX(-50%);display:flex;gap:6px;}
.dot {width:8px;height:8px;border-radius:50%;background:#ccc;}
.dot.active {background:#333;}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <button class="back-btn" onclick="location.href='index.html'">← 返回目录</button>
    <h1>笔记阅读</h1>
  </div>
  <button id="fullPageBtn">
    <svg viewBox="0 0 24 24" id="fullSvg">
      <path d="M10 7 H7 V10"/>
      <path d="M14 7 H17 V10"/>
      <path d="M14 17 H17 V14"/>
      <path d="M10 17 H7 V14"/>
    </svg>
  </button>
</header>
<div class="content-wrap" id="readWrap"></div>
<script>
const dataList = window.NOTE_DATA || [];
const wrap = document.getElementById('readWrap');
const fullBtn = document.getElementById('fullPageBtn');
const fullSvg = document.getElementById('fullSvg');
const targetId = localStorage.getItem('readNoteId');

// 是否支持 API 全屏(iOS Safari 为 false)
const API_FULLSCREEN_SUPPORTED = !!document.fullscreenEnabled;

const savedPwd = localStorage.getItem("admin_save_pwd");
const expireTs = Number(localStorage.getItem("admin_login_expire")) || 0;
const now = Date.now();
const isAdminLogin = (savedPwd === "admin123" && expireTs > now);

let item;
if(isAdminLogin){
  item = dataList.find(n=>String(n.id)===targetId);
}else{
  item = dataList.find(n=>String(n.id)===targetId && !n.private);
}
if (item && !Array.isArray(item.tags) && item.type) {
  item.tags = [item.type];
}

const SVG_EXPAND = `<path d="M10 7 H7 V10"/><path d="M14 7 H17 V10"/><path d="M14 17 H17 V14"/><path d="M10 17 H7 V14"/>`;
const SVG_COLLAPSE = `<path d="M7 10 H10 V7"/><path d="M17 10 H14 V7"/><path d="M17 14 H14 V17"/><path d="M7 14 H10 V17"/>`;

function syncPageFullBtn(){
  fullSvg.innerHTML = document.fullscreenElement ? SVG_COLLAPSE : SVG_EXPAND;
}

fullBtn.onclick = async ()=>{
  try{
    if(!document.fullscreenElement){
      await document.documentElement.requestFullscreen();
    }else{
      await document.exitFullscreen();
    }
  }catch(err){
    console.warn('页面全屏失败:', err);
  }
  // 主动同步图标,不依赖事件
  syncPageFullBtn();
};
document.addEventListener('fullscreenchange', syncPageFullBtn);

function toggleCardHead(btn){
  const box = btn.closest('.card-head');
  box.classList.toggle('collapsed');
  btn.textContent = box.classList.contains('collapsed') ? "+" : "−";
}

function parseSlide(raw){
  return raw.replace(/::slide\n([\s\S]*?)\n::end/g,(match,inner)=>{
    const imgs = [];
    const dots = [];
    inner.replace(/!\[(.*?)\]\((.*?)\)/g,(m,a,s)=>{
      imgs.push(`<div class="slide-item"><img loading="lazy" src="${s}" alt="${a}"></div>`);
      dots.push(`<span class="dot"></span>`);
    });
    if(imgs.length<2) return match;
    dots[0] = `<span class="dot active">`;
    return `<div class="slide-wrap" data-total="${imgs.length}"><div class="slide-box" style="width:${imgs.length*100}%">${imgs.join('')}</div><div class="slide-dot">${dots.join('')}</div></div>`;
  });
}

/* ============ 代码块全屏(兼容手机) ============ */
function createCodeToolbar(pre){
  if(pre.querySelector('.code-toolbar')) return;

  const toolbar = document.createElement('div');
  toolbar.className = 'code-toolbar';

  let fontSize = parseInt(getComputedStyle(pre).fontSize) || 14;

  // A+ 放大
  const plus = document.createElement('button');
  plus.className = 'code-btn';
  plus.textContent = 'A+';
  plus.onclick = (e)=>{
    e.stopPropagation();
    fontSize = Math.min(fontSize + 2, 32);
    pre.style.fontSize = fontSize + 'px';
  };
  toolbar.appendChild(plus);

  // A- 缩小
  const minus = document.createElement('button');
  minus.className = 'code-btn';
  minus.textContent = 'A-';
  minus.onclick = (e)=>{
    e.stopPropagation();
    fontSize = Math.max(fontSize - 2, 10);
    pre.style.fontSize = fontSize + 'px';
  };
  toolbar.appendChild(minus);

  // 全屏/退出全屏
  const fullBtnCode = document.createElement('button');
  fullBtnCode.className = 'code-btn code-full-btn';
  fullBtnCode.textContent = '全屏';

  function syncBtnText(){
    const inFs = (document.fullscreenElement === pre)
              || pre.classList.contains('pre-mobile-fullscreen');
    fullBtnCode.textContent = inFs ? '退出全屏' : '全屏';
  }

  fullBtnCode.onclick = async (e)=>{
    e.stopPropagation();
    e.preventDefault();
    try{
      const inFs = (document.fullscreenElement === pre)
                || pre.classList.contains('pre-mobile-fullscreen');
      if(!inFs){
        // 进入全屏
        if(API_FULLSCREEN_SUPPORTED && pre.requestFullscreen){
          await pre.requestFullscreen();
        }else{
          // 移动端 / API 不可用:用 CSS 模拟全屏
          pre.classList.add('pre-mobile-fullscreen');
          document.body.style.overflow = 'hidden';
        }
      }else{
        // 退出全屏
        if(API_FULLSCREEN_SUPPORTED && document.fullscreenElement === pre){
          await document.exitFullscreen();
        }else{
          pre.classList.remove('pre-mobile-fullscreen');
          document.body.style.overflow = '';
        }
      }
    }catch(err){
      console.warn('代码块全屏失败,回落 CSS 全屏:', err);
      pre.classList.add('pre-mobile-fullscreen');
      document.body.style.overflow = 'hidden';
    }
    // 不管 API 异步没异步完成,先按本地状态切文字
    syncBtnText();
    // 再延迟一次保险(等 fullscreenchange 触发完)
    setTimeout(syncBtnText, 200);
  };

  toolbar.appendChild(fullBtnCode);

  // 复制
  const copyBtn = document.createElement('button');
  copyBtn.className = 'code-btn copy-code-btn';
  copyBtn.textContent = '复制';
  copyBtn.dataset.code = pre.innerText;
  copyBtn.onclick = (e)=>{
    e.stopPropagation();
    const codeText = copyBtn.dataset.code;
    navigator.clipboard.writeText(codeText).then(()=>{
      copyBtn.textContent = "已复制";
      setTimeout(()=> copyBtn.textContent = "复制", 1200);
    }).catch(()=>{
      const textarea = document.createElement('textarea');
      textarea.value = codeText;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      copyBtn.textContent = "已复制";
      setTimeout(()=> copyBtn.textContent = "复制", 1200);
    });
  };
  toolbar.appendChild(copyBtn);

  pre.appendChild(toolbar);

  // 监听 API 全屏变化(桌面 ESC / 其他入口)
  document.addEventListener('fullscreenchange', () => {
    // 如果用户用 ESC 退出了 API 全屏,清理 body 锁
    if(!document.fullscreenElement && !document.querySelector('.pre-mobile-fullscreen')){
      document.body.style.overflow = '';
    }
    syncBtnText();
  });
}

function injectCopyBtn(){
  document.querySelectorAll('.card-content pre').forEach(createCodeToolbar);
}

/* ============ 旧的全局复制监听保留兼容(其实现在不需要了) ============ */
document.body.addEventListener('click', e=>{
  const btn = e.target.closest('.copy-code-btn');
  if(!btn) return;
  // 复制逻辑已迁移到 toolbar 内,这里留个空兜底
});

function initSlide(){
  document.querySelectorAll('.slide-wrap').forEach(w=>{
    const box = w.querySelector('.slide-box');
    const dots = w.querySelectorAll('.dot');
    const total = Number(w.dataset.total);
    let cur = 0, sx=0, mx=0;
    function render(){
      box.style.transform = `translateX(-${cur*100}%)`;
      dots.forEach((d,i)=>d.classList.toggle('active', i===cur));
    }
    w.addEventListener('touchstart',e=>sx=e.touches[0].clientX);
    w.addEventListener('touchmove',e=>mx=e.touches[0].clientX-sx);
    w.addEventListener('touchend',()=>{
      if(mx<-60) cur = Math.min(cur+1,total-1);
      if(mx>60) cur = Math.max(cur-1,0);
      render();mx=0;
    });
    render();
  })
}

function getTagClassByName(name) {
  switch(name) {
    case 'note': return 'tag-note';
    case 'doc': return 'tag-doc';
    case '编程': return 'tag-编程';
    default: return 'tag-custom';
  }
}

function getTagStyle(tagName, colorMap) {
  const color = (colorMap && colorMap[tagName]) || '';
  if (color) {
    const r = parseInt(color.slice(1,3), 16) / 255;
    const g = parseInt(color.slice(3,5), 16) / 255;
    const b = parseInt(color.slice(5,7), 16) / 255;
    const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
    const textColor = brightness > 0.5 ? '#222' : '#fff';
    return `background-color:${color};color:${textColor};`;
  }
  return '';
}

function render(){
  if(!item){
    wrap.innerHTML = `<div style="text-align:center;padding:60px;color:#888;">笔记不存在</div>`;
    return;
  }
  const tagHtml = (item.tags || []).map(tag => {
    const cls = getTagClassByName(tag);
    return `<span class="tag ${cls}" data-tag="${tag}" style="${getTagStyle(tag, item.tagColors)}">${tag}</span>`;
  }).join('');

  const htmlStr = parseSlide(item.content);
  wrap.innerHTML = `
    <div class="card-head">
      <div class="card-title">${item.title}</div>
      <div class="card-meta-row">
        <span class="card-date">${item.date}</span>
        <div class="tag-group">${tagHtml}</div>
        <button class="collapse-head-btn" onclick="toggleCardHead(this)">−</button>
      </div>
    </div>
    <div class="card-content">${htmlStr}</div>
  `;
  injectCopyBtn();
  initSlide();
}
render();
</script>
</body>
</html>
