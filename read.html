<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记阅读</title>
<script src="./data.js"></script>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}
body{
  background: #f7f8fc;
  padding: 0 4px;
  max-width: 1280px;
  margin: 0 auto;
}
header{
  margin-bottom: 16px;
  padding: 12px 6px;
  border-bottom: 1px solid #e4e7f3;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}
.back-btn{
  border:none;
  background:#e0e7ff;
  color:#434bc4;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}
h1{
  font-size: 22px;
  color: #1d2133;
  font-weight: 600;
}
/* 改成和主页一致：容器68px，图标46px */
#fullPageBtn{
width:68px;height:68px;
border:none;background:transparent;
display:flex;align-items:center;justify-content:center;
-webkit-tap-highlight-color:transparent;
padding:0;
transition:all 0.12s;
cursor: pointer;
}
#fullPageBtn:active{transform:scale(0.92);}
#fullPageBtn svg{width:46px;height:46px;}
#fullPageBtn path{
  fill:none;
  stroke:#9ca3af;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.card-head{
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: nowrap;
}
.card-head.collapsed {
  margin-bottom: 0;
  padding: 2px 0;
}
.card-head.collapsed .card-title,
.card-head.collapsed .card-date,
.card-head.collapsed .tag {
  opacity:0; width:0; font-size:0; overflow:hidden; padding:0; margin:0;
}
.card-title{
  font-size: 20px;
  font-weight: 600;
  color: #1a1e32;
  flex: 1;
  min-width: 80px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta-row{
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: nowrap;
}
.card-date{font-size: 13px; color: #9498b3; white-space: nowrap;}
.tag{
  font-size: 12px;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
}
.tag-note{background: #e8eaff;color:#3950cc;}
.tag-doc{background:#e6f8ee;color:#148246;}
.tag-custom{background:#fff0e6;color:#b8460c;}
.tag-编程{background:#e1f5fe;color:#0277bd;}

.collapse-head-btn {
  width: 26px;height:26px;
  border-radius: 50%;border:none;
  background:#e0e7ff;color:#434bc4;
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.collapse-head-btn:active{background:#6366F1;color:#fff;}

.content-wrap{
  background:#fff;
  border-radius:14px;
  padding:16px;
  box-shadow: 0 2px 14px rgba(99, 102, 241, 0.07);
}
.card-content{
  font-size: 16px;
  line-height: 1.8;
  color: #33364a;
  overflow-wrap: break-word;
}
.card-content img{
  max-width: 100%;
  border-radius: 10px;
  margin: 12px 0;
}

/* 修复QQ浏览器代码块不换行核心样式 */
.card-content pre {
  position: relative !important;
  margin:14px 0;
  padding: 10px 12px !important;
  white-space: pre-wrap !important;
  word-wrap: break-word !important;
  overflow-wrap: break-word !important;
  word-break: break-all !important;
  max-width: 100%;
  box-sizing: border-box;
  overflow-x: hidden;
}
.card-content pre code {
  white-space: inherit !important;
  word-break: inherit !important;
}

.copy-code-btn{
  position:absolute;
  top:6px;
  right:6px;
  background:#44475a;color:#fff;
  border:0;border-radius:6px;
  padding:3px 8px;font-size:12px;
  cursor:pointer;z-index:9999;
}
.copy-code-btn:active{background:#6366F1;}


/*轮播*/
.slide-wrap {
  width:100%;overflow:hidden;
  border-radius:10px;position:relative;
  margin:12px 0;background:#f0f0f0;
}
.slide-box {display:flex;transition:transform 0.3s ease;touch-action:pan-x;}
.slide-item {width:100%;flex-shrink:0;display:flex;justify-content:center;align-items:center;}
.slide-item img {max-width:100%;max-height:65vh;width:auto;height:auto;object-fit:contain;}
.slide-dot {position:absolute;bottom:8px;left:50%;transform: translateX(-50%);display:flex;gap:6px;}
.dot {width:8px;height:8px;border-radius:50%;background:#ccc;}
.dot.active {background:#333;}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <button class="back-btn" onclick="location.href='index.html'">← 返回目录</button>
    <h1>笔记阅读</h1>
  </div>
  <button id="fullPageBtn">
    <svg viewBox="0 0 24 24" id="fullSvg">
      <path d="M10 7 H7 V10"/>
      <path d="M14 7 H17 V10"/>
      <path d="M14 17 H17 V14"/>
      <path d="M10 17 H7 V14"/>
    </svg>
  </button>
</header>
<div class="content-wrap" id="readWrap"></div>
<script>
const dataList = window.NOTE_DATA || [];
const wrap = document.getElementById('readWrap');
const fullBtn = document.getElementById('fullPageBtn');
const fullSvg = document.getElementById('fullSvg');
const targetId = localStorage.getItem('readNoteId');

// 判断管理员登录状态
const savedPwd = localStorage.getItem("admin_save_pwd");
const expireTs = Number(localStorage.getItem("admin_login_expire")) || 0;
const now = Date.now();
const isAdminLogin = (savedPwd === "admin123" && expireTs > now);

let item;
if(isAdminLogin){
  // 已登录管理员：所有笔记都能打开，包括私密
  item = dataList.find(n=>String(n.id)===targetId);
}else{
  // 游客：只允许打开公开笔记
  item = dataList.find(n=>String(n.id)===targetId && !n.private);
}


fullBtn.onclick = ()=>{
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
    fullSvg.innerHTML = `<path d="M7 10 H10 V7"/><path d="M17 10 H14 V7"/><path d="M17 14 H14 V17"/><path d="M7 14 H10 V17"/>`;
  }else{
    document.exitFullscreen();
    fullSvg.innerHTML = `<path d="M10 7 H7 V10"/><path d="M14 7 H17 V10"/><path d="M14 17 H17 V14"/><path d="M10 17 H7 V14"/>`;
  }
};

function toggleCardHead(btn){
  const box = btn.closest('.card-head');
  box.classList.toggle('collapsed');
  btn.textContent = box.classList.contains('collapsed') ? "+" : "−";
}

// 只处理轮播，完全不动pre代码块
function parseSlide(raw){
  return raw.replace(/::slide\n([\s\S]*?)\n::end/g,(match,inner)=>{
    const imgs = [];
    const dots = [];
    inner.replace(/!\[(.*?)\]\((.*?)\)/g,(m,a,s)=>{
      imgs.push(`<div class="slide-item"><img src="${s}" alt="${a}"></div>`);
      dots.push(`<span class="dot"></span>`);
    });
    if(imgs.length<2) return match;
    dots[0] = `<span class="dot active">`;
    return `<div class="slide-wrap" data-total="${imgs.length}"><div class="slide-box" style="width:${imgs.length*100}%">${imgs.join('')}</div><div class="slide-dot">${dots.join('')}</div></div>`;
  });
}

// 渲染完成后，给页面所有pre自动插入复制按钮
function injectCopyBtn(){
  const preAll = document.querySelectorAll('.card-content pre');
  preAll.forEach(pre=>{
    // 已有按钮跳过
    if(pre.querySelector('.copy-code-btn')) return;
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-code-btn';
    copyBtn.textContent = '复制代码';
    // 存储完整代码文本
    copyBtn.dataset.code = pre.innerText;
    pre.appendChild(copyBtn);
  })
}

// 全局复制点击监听
document.body.addEventListener('click', e=>{
  const btn = e.target.closest('.copy-code-btn');
  if(!btn) return;
  const codeText = btn.dataset.code;
  navigator.clipboard.writeText(codeText).then(()=>{
    btn.textContent = "已复制";
    setTimeout(()=> btn.textContent = "复制代码",1200);
  }).catch(()=>{
    const textarea = document.createElement('textarea');
    textarea.value = codeText;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    btn.textContent = "已复制";
    setTimeout(()=> btn.textContent = "复制代码",1200);
  })
})

function initSlide(){
  document.querySelectorAll('.slide-wrap').forEach(w=>{
    const box = w.querySelector('.slide-box');
    const dots = w.querySelectorAll('.dot');
    const total = Number(w.dataset.total);
    let cur = 0, sx=0, mx=0;
    function render(){
      box.style.transform = `translateX(-${cur*100}%)`;
      dots.forEach((d,i)=>d.classList.toggle('active', i===cur));
    }
    w.addEventListener('touchstart',e=>sx=e.touches[0].clientX);
    w.addEventListener('touchmove',e=>mx=e.touches[0].clientX-sx);
    w.addEventListener('touchend',()=>{
      if(mx<-60) cur = Math.min(cur+1,total-1);
      if(mx>60) cur = Math.max(cur-1,0);
      render();mx=0;
    });
    render();
  })
}

function render(){
  if(!item){
    wrap.innerHTML = `<div style="text-align:center;padding:60px;color:#888;">笔记不存在</div>`;
    return;
  }
  let tagClass = 'tag-custom';
  if(item.type === 'note') tagClass='tag-note';
  if(item.type === 'doc') tagClass='tag-doc';
  if(item.type === '编程') tagClass='tag-编程';
  const htmlStr = parseSlide(item.content);
  wrap.innerHTML = `
    <div class="card-head">
      <div class="card-title">${item.title}</div>
      <div class="card-meta-row">
        <span class="card-date">${item.date}</span>
        <span class="tag ${tagClass}">${item.type}</span>
        <button class="collapse-head-btn" onclick="toggleCardHead(this)">−</button>
      </div>
    </div>
    <div class="card-content">${htmlStr}</div>
  `;
  injectCopyBtn();
  initSlide();
}
render();
</script>
</body>
</html>
