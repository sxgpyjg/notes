<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记阅读</title>
<script src="./data.js"></script>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}
body{
  background: #f7f8fc;
  padding: 0 4px;
  max-width: 1280px;
  margin: 0 auto;
}
header{
  margin-bottom: 16px;
  padding: 12px 6px;
  border-bottom: 1px solid #e4e7f3;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}
.back-btn{
  border:none;
  background:#e0e7ff;
  color:#434bc4;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}
h1{
  font-size: 22px;
  color: #1d2133;
  font-weight: 600;
}
#fullPageBtn{
width:68px;height:68px;
border:none;background:transparent;
display:flex;align-items:center;justify-content:center;
-webkit-tap-highlight-color:transparent;
padding:0;
transition:all 0.12s;
cursor: pointer;
}
#fullPageBtn:active{transform:scale(0.92);}
#fullPageBtn svg{width:46px;height:46px;}
#fullPageBtn path{
  fill:none;
  stroke:#9ca3af;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.card-head{
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: nowrap;
}
.card-head.collapsed {
  margin-bottom: 0;
  padding: 2px 0;
}
.card-head.collapsed .card-title,
.card-head.collapsed .card-date,
.card-head.collapsed .tag-group {
  opacity:0; width:0; font-size:0; overflow:hidden; padding:0; margin:0;
}
.card-title{
  font-size: 20px;
  font-weight: 600;
  color: #1a1e32;
  flex: 1;
  min-width: 80px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta-row{
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.card-date{font-size: 13px; color: #9498b3; white-space: nowrap;}
.tag-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.tag{
  font-size: 12px;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
}
.tag-note{background: #e8eaff;color:#3950cc;}
.tag-doc{background:#e6f8ee;color:#148246;}
.tag-custom{background:#fff0e6;color:#b8460c;}
.tag-编程{background:#e1f5fe;color:#0277bd;}
.collapse-head-btn {
  width: 26px;height:26px;
  border-radius: 50%;border:none;
  background:#e0e7ff;color:#434bc4;
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.collapse-head-btn:active{background:#6366F1;color:#fff;}
.content-wrap{
  background:#fff;
  border-radius:14px;
  padding:16px;
  box-shadow: 0 2px 14px rgba(99, 102, 241, 0.07);
}
.card-content{
  font-size: 16px;
  line-height: 1.8;
  color: #33364a;
  overflow-wrap: break-word;
}
.card-content img{
  max-width: 100%;
  border-radius: 10px;
  margin: 12px 0;
  loading: lazy;
}
.card-content table {
  border-collapse: collapse;
  width: 100%;
  border: 1px solid #999;
  margin: 10px 0;
}
.card-content th,
.card-content td {
  border: 1px solid #999;
  padding: 6px 8px;
}

.card-content pre {
  position: relative !important;
  margin:14px 0;
  padding: 18px 14px !important;
  background: #282c34;
  border-radius: 8px;
  color: #abb2bf;
  white-space: pre !important;
  word-wrap: normal !important;
  overflow-wrap: normal !important;
  word-break: normal !important;
  overflow-x: auto !important;
  max-width: 100%;
  font-size:14px;
}
.card-content pre code {
  white-space: inherit !important;
  word-break: inherit !important;
  font-family: Consolas, Menlo, Monaco, monospace;
}

/* CSDN语法高亮配色 */
.card-content pre span.comment { color: #5c6370; font-style: italic; }
.card-content pre span.keyword  { color: #61afef; }
.card-content pre span.string   { color: #e5c07b; }
.card-content pre span.function { color: #c678dd; }

/* 手机适配代码按钮组 */
.code-size-plus{
  position:absolute;top:6px;right: 230px;
  background:#44475a;color:#fff;border:none;border-radius:6px;
  padding:3px 6px;font-size:11px;cursor:pointer;z-index:9999;
}
.code-size-minus{
  position:absolute;top:6px;right:185px;
  background:#44475a;color:#fff;border:none;border-radius:6px;
  padding:3px 6px;font-size:11px;cursor:pointer;z-index:9999;
}
.code-full-btn{
  position:absolute;top:6px;right: 140px;
  background:#44475a;color:#fff;border:0;border-radius:6px;
  padding:3px 6px;font-size:11px;cursor:pointer;z-index:9999;
}

.code-size-minus:active,.code-size-plus:active,.code-full-btn:active,.copy-code-btn:active{
  background:#6366F1;color:#fff;
}
pre:fullscreen {
  width:100vw;height:100vh;margin:0;background:#282c34;
  overflow:auto;display:flex;align-items:flex-start;justify-content:center;
}

.copy-code-btn{
  position:absolute;top:6px;right:6px;
  background:#44475a;color:#fff;border:0;border-radius:6px;
  padding:3px 6px;font-size:11px;cursor:pointer;z-index:9999;
}
.slide-wrap {
  width:100%;overflow:hidden;
  border-radius:10px;position:relative;
  margin:12px 0;background:#f0f0f0;
}
.slide-box {display:flex;transition:transform 0.3s ease;touch-action:pan-x;}
.slide-item {width:100%;flex-shrink:0;display:flex;justify-content:center;align-items:center;}
.slide-item img {max-width:100%;max-height:65vh;width:auto;height:auto;object-fit:contain;loading:lazy;}
.slide-dot {position:absolute;bottom:8px;left:50%;transform: translateX(-50%);display:flex;gap:6px;}
.dot {width:8px;height:8px;border-radius:50%;background:#ccc;}
.dot.active {background:#333;}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <button class="back-btn" onclick="location.href='index.html'">← 返回目录</button>
    <h1>笔记阅读</h1>
  </div>
  <button id="fullPageBtn">
    <svg viewBox="0 0 24 24" id="fullSvg">
      <path d="M10 7 H7 V10"/>
      <path d="14 7 H17 V10"/>
      <path d="14 17 H17 V14"/>
      <path d="10 17 H7 V14"/>
    </svg>
  </button>
</header>
<div class="content-wrap" id="readWrap"></div>
<script>
const dataList = window.NOTE_DATA || [];
const wrap = document.getElementById('readWrap');
const fullBtn = document.getElementById('fullPageBtn');
const fullSvg = document.getElementById('fullSvg');
const targetId = localStorage.getItem('readNoteId');

const savedPwd = localStorage.getItem("admin_save_pwd");
const expireTs = Number(localStorage.getItem("admin_login_expire")) || 0;
const now = Date.now();
const isAdminLogin = (savedPwd === "admin123" && expireTs > now);

let item;
if(isAdminLogin){
  item = dataList.find(n=>String(n.id)===targetId);
}else{
  item = dataList.find(n=>String(n.id)===targetId && !n.private);
}
if (item && !Array.isArray(item.tags) && item.type) {
  item.tags = [item.type];
}

fullBtn.onclick = ()=>{
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
    fullSvg.innerHTML = `<path d="M7 10 H10 V7"/><path d="M17 10 H14 V7"/><path d="M17 14 H14 V17"/><path d="M7 14 H10 V17"/>`;
  }else{
    document.exitFullscreen();
    fullSvg.innerHTML = `<path d="M10 7 H7 V10"/><path d="M14 7 H17 V10"/><path d="M14 17 H17 V14"/><path d="M10 17 H7 V14"/>`;
  }
};

function toggleCardHead(btn){
  const box = btn.closest('.card-head');
  box.classList.toggle('collapsed');
  btn.textContent = box.classList.contains('collapsed') ? "+" : "−";
}

function parseSlide(raw){
  return raw.replace(/::slide\n([\s\S]*?)\n::end/g,(match,inner)=>{
    const imgs = [];
    const dots = [];
    inner.replace(/!\[(.*?)\]\((.*?)\)/g,(m,a,s)=>{
      imgs.push(`<div class="slide-item"><img loading="lazy" src="${s}" alt="${a}"></div>`);
      dots.push(`<span class="dot"></span>`);
    });
    if(imgs.length<2) return match;
    dots[0] = `<span class="dot active">`;
    return `<div class="slide-wrap" data-total="${imgs.length}"><div class="slide-box" style="width:${imgs.length*100}%">${imgs.join('')}</div><div class="slide-dot">${dots.join('')}</div></div>`;
  });
}

function injectCopyBtn(){
  const preAll = document.querySelectorAll('.card-content pre');
  preAll.forEach(pre=>{
    if(pre.querySelector('.copy-code-btn')) return;
    let fontSize = 14;

    //A+ 放大字体
    const plus = document.createElement('button');
    plus.className = 'code-size-plus';
    plus.textContent = 'A+';
    plus.onclick = ()=>{
      fontSize +=2;
      pre.style.fontSize = fontSize+'px';
    }
    pre.appendChild(plus);

    //A- 缩小字体
    const minus = document.createElement('button');
    minus.className = 'code-size-minus';
    minus.textContent = 'A-';
    minus.onclick = ()=>{
      if(fontSize>8){
        fontSize -=2;
        pre.style.fontSize = fontSize+'px';
      }
    }
    pre.appendChild(minus);

    //代码全屏放大
codeFullBtn.onclick = async ()=>{
  try {
    if(!document.fullscreenElement){
      await pre.requestFullscreen();
      codeFullBtn.innerText = '退出全屏';
    }else{
      await document.exitFullscreen();
      codeFullBtn.innerText = '全屏';
    }
  } catch (err) {
    console.log(err)
  }
}

pre.appendChild(codeFullBtn);

    //复制代码
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-code-btn';
    copyBtn.textContent = '复制';
    copyBtn.dataset.code = pre.innerText;
    pre.appendChild(copyBtn);
  })
}

document.body.addEventListener('click', e=>{
  const btn = e.target.closest('.copy-code-btn');
  if(!btn) return;
  const codeText = btn.dataset.code;
  navigator.clipboard.writeText(codeText).then(()=>{
    btn.textContent = "已复制";
    setTimeout(()=> btn.textContent = "复制",1200);
  }).catch(()=>{
    const textarea = document.createElement('textarea');
    textarea.value = codeText;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    btn.textContent = "已复制";
    setTimeout(()=> btn.textContent = "复制",1200);
  })
})

function initSlide(){
  document.querySelectorAll('.slide-wrap').forEach(w=>{
    const box = w.querySelector('.slide-box');
    const dots = w.querySelectorAll('.dot');
    const total = Number(w.dataset.total);
    let cur = 0, sx=0, mx=0;
    function render(){
      box.style.transform = `translateX(-${cur*100}%)`;
      dots.forEach((d,i)=>d.classList.toggle('active', i===cur));
    }
    w.addEventListener('touchstart',e=>sx=e.touches[0].clientX);
    w.addEventListener('touchmove',e=>mx=e.touches[0].clientX-sx);
    w.addEventListener('touchend',()=>{
      if(mx<-60) cur = Math.min(cur+1,total-1);
      if(mx>60) cur = Math.max(cur-1,0);
      render();mx=0;
    });
    render();
  })
}

function getTagClassByName(name) {
  switch(name) {
    case 'note': return 'tag-note';
    case 'doc': return 'tag-doc';
    case '编程': return 'tag-编程';
    default: return 'tag-custom';
  }
}

function getTagStyle(tagName, colorMap) {
  const color = (colorMap && colorMap[tagName]) || '';
  if (color) {
    const r = parseInt(color.slice(1,3), 16) / 255;
    const g = parseInt(color.slice(3,5), 16) / 255;
    const b = parseInt(color.slice(5,7), 16) / 255;
    const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
    const textColor = brightness > 0.5 ? '#222' : '#fff';
    return `background-color:${color};color:${textColor};`;
  }
  return '';
}

function render(){
  if(!item){
    wrap.innerHTML = `<div style="text-align:center;padding:60px;color:#888;">笔记不存在</div>`;
    return;
  }
  const tagHtml = (item.tags || []).map(tag => {
    const cls = getTagClassByName(tag);
    return `<span class="tag ${cls}" data-tag="${tag}" style="${getTagStyle(tag, item.tagColors)}">${tag}</span>`;
  }).join('');

  const htmlStr = parseSlide(item.content);
  wrap.innerHTML = `
    <div class="card-head">
      <div class="card-title">${item.title}</div>
      <div class="card-meta-row">
        <span class="card-date">${item.date}</span>
        <div class="tag-group">${tagHtml}</div>
        <button class="collapse-head-btn" onclick="toggleCardHead(this)">−</button>
      </div>
    </div>
    <div class="card-content">${htmlStr}</div>
  `;
  injectCopyBtn();
  initSlide();
}
render();
</script>
</body>
</html>
