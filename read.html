<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>笔记阅读</title>
<script src="./data.js"></script>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, sans-serif;
}
body{
  background: #f7f8fc;
  padding: 0 4px;
  max-width: 1280px;
  margin: 0 auto;
}
header{
  margin-bottom: 16px;
  padding: 12px 6px;
  border-bottom: 1px solid #e4e7f3;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
}
.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}
.back-btn{
  border:none;
  background:#e0e7ff;
  color:#434bc4;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}
h1{
  font-size: 22px;
  color: #1d2133;
  font-weight: 600;
}
#fullPageBtn{
width:68px;height:68px;
border:none;background:transparent;
display:flex;align-items:center;justify-content:center;
-webkit-tap-highlight-color:transparent;
padding:0;
transition:all 0.12s;
cursor: pointer;
}
#fullPageBtn:active{transform:scale(0.92);}
#fullPageBtn svg{width:46px;height:46px;}
#fullPageBtn path{
  fill:none;
  stroke:#9ca3af;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.card-head{
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: nowrap;
}
.card-head.collapsed {
  margin-bottom: 0;
  padding: 2px 0;
}
.card-head.collapsed .card-title,
.card-head.collapsed .card-date,
.card-head.collapsed .tag-group {
  opacity:0; width:0; font-size:0; overflow:hidden; padding:0; margin:0;
}
.card-title{
  font-size: 20px;
  font-weight: 600;
  color: #1a1e32;
  flex: 1;
  min-width: 80px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta-row{
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.card-date{font-size: 13px; color: #9498b3; white-space: nowrap;}
.tag-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.tag{
  font-size: 12px;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
}
.tag-note{background: #e8eaff;color:#3950cc;}
.tag-doc{background:#e6f8ee;color:#148246;}
.tag-编程{background:#e1f5fe;color:#0277bd;}
.tag-custom{background:#fff0e6;color:#b8460c;}
.collapse-head-btn {
  width: 26px;height:26px;
  border-radius:50%;border:none;
  background:#e0e7ff;color:#434bc4;
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.collapse-head-btn:active{background:#6366F1;color:#fff;}
.content-wrap{
  background:#fff;
  border-radius:14px;
  padding:16px;
  box-shadow: 0 2px 14px rgba(99, 102, 241, 0.07);
}
.card-content{
  font-size: 16px;
  line-height: 1.8;
  color: #33364a;
  overflow-wrap: break-word;
}
.card-content img{
  max-width: 100%;
  border-radius: 10px;
  margin: 12px 0;
  loading: lazy;
}
.card-content table {
  border-collapse: collapse;
  width: 100%;
  border: 1px solid #999;
  margin: 10px 0;
}
.card-content th,
.card-content td {
  border: 1px solid #999;
  padding: 6px 8px;
}

.card-content pre {
  position: relative !important;
  margin:14px 0;
  padding: 18px 14px !important;
  background: #282c34;
  border-radius: 8px;
  color: #abb2bf;
  white-space: pre !important;
  word-wrap: normal !important;
  overflow-wrap: normal !important;
  word-break: normal !important;
  overflow-x: auto !important;
  max-width: 100%;
  font-size:14px;
  -webkit-overflow-scrolling: touch;
  transition: font-size 0.15s;
}
.card-content pre code {
  white-space: inherit !important;
  word-break: inherit !important;
  font-family: Consolas, Menlo, Monaco, monospace;
}

/* CSDN语法高亮配色 */
.card-content pre span.comment { color: #5c6370; font-style: italic; }
.card-content pre span.keyword  { color: #61afef; }
.card-content pre span.string   { color: #e5c07b; }
.card-content pre span.function { color: #c678dd; }

/* 代码块按钮组 横向整齐不重叠 */
.code-toolbar{
  position:absolute;
  top:6px;
  right:6px;
  display:flex;
  gap:5px;
  z-index:9999;
}
.code-btn{
  background:#44475a;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:3px 7px;
  font-size:11px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}
.code-btn:active{background:#6366F1;color:#fff;}

/* 隐藏旧重复复制按钮 彻底消除重叠 */
.copy-code-btn{
  display: none !important;
}

/* API 全屏(桌面) */
.card-content pre:fullscreen {
  width:100vw;height:100vh;margin:0;background:#282c34;
  overflow:auto;display:flex;align-items:flex-start;justify-content:center;
  padding:24px !important;
  font-size:16px !important;
}

/* CSS 模拟全屏+旋转横屏（全浏览器兼容） */
.card-content pre.pre-mobile-fullscreen{
  position: fixed !important;
  inset: 0 !important;
  width: 100vh !important;
  height: 100vw !important;
  left: 0;
  top: 0;
  transform: rotate(90deg) translateY(-100%);
  transform-origin: top left;
  z-index: 99999 !important;
  margin: 0 !important;
  border-radius: 0 !important;
  padding: 24px 16px !important;
  padding-top: max(24px, env(safe-area-inset-top)) !important;
  padding-bottom: max(24px, env(safe-area-inset-bottom)) !important;
  overflow: auto !important;
  background: #282c34 !important;
  font-size: 16px !important;
  -webkit-overflow-scrolling: touch;
}

/* ========== 和编辑器完全统一的轮播样式（核心保留） ========== */
.carousel-render{position:relative;border-radius:12px;overflow:hidden;background:#0f172a;margin:12px 0;}
.carousel-render .track{display:flex;width:100%;transition:transform .45s cubic-bezier(.22,.61,.36,1);will-change:transform;}
.carousel-render .slide{flex:0 0 100%;min-width:100%;position:relative;background:#000;}
.carousel-render .slide img{width:100%;height:auto;display:block;max-height:520px;object-fit:contain;background:#000;}
.carousel-render .slide .intro{position:absolute;left:0;right:0;bottom:0;padding:16px 14px 18px;color:#fff;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);font-size:14px;line-height:1.5;}
.carousel-render .slide .intro b{font-size:15px;display:block;margin-bottom:2px;}
.carousel-render .arrow{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;border:none;background:rgba(0,0,0,.45);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;z-index:5;backdrop-filter:blur(6px);}
.carousel-render:hover .arrow{opacity:1;}
.carousel-render .arrow:hover{background:rgba(0,0,0,.7);}
.carousel-render .arrow.prev{left:10px;}
.carousel-render .arrow.next{right:10px;}
.carousel-render .dots{position:absolute;left:0;right:0;bottom:8px;display:flex;justify-content:center;gap:6px;z-index:5;}
.carousel-render .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:all .3s;border:none;padding:0;}
.carousel-render .dot.active{width:22px;border-radius:3px;background:#fff;}
.carousel-render .counter{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.5);color:#fff;font-size:11px;padding:3px 9px;border-radius:99px;z-index:5;font-variant-numeric:tabular-nums;}

/* 删除旧slide-wrap废弃样式，不再使用 */
.slide-wrap, .slide-box, .slide-item, .slide-dot, .dot {
  display: none !important;
}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <button class="back-btn" onclick="location.href='index.html'">← 返回目录</button>
    <h1>笔记阅读</h1>
  </div>
  <button id="fullPageBtn">
    <svg viewBox="0 0 24 24" id="fullSvg">
      <path d="M10 7 H7 V10"/>
      <path d="M14 7 H17 V10"/>
      <path d="M14 17 H17 V14"/>
      <path d="M10 17 H7 V14"/>
    </svg>
  </button>
</header>
<div class="content-wrap" id="readWrap"></div>

<script>
const dataList = window.NOTE_DATA || [];
const wrap = document.getElementById('readWrap');
const fullBtn = document.getElementById('fullPageBtn');
const fullSvg = document.getElementById('fullSvg');
const targetId = localStorage.getItem('readNoteId');

// 是否支持 API 全屏(iOS Safari 为 false)
const API_FULLSCREEN_SUPPORTED = !!document.fullscreenEnabled;

const savedPwd = localStorage.getItem("admin_save_pwd");
const expireTs = Number(localStorage.getItem("admin_login_expire")) || 0;
const now = Date.now();
const isAdminLogin = (savedPwd === "admin123" && expireTs > now);

let item;
if(isAdminLogin){
  item = dataList.find(n=>String(n.id)===targetId);
}else{
  item = dataList.find(n=>String(n.id)===targetId && !n.private);
}
if (item && !Array.isArray(item.tags) && item.type) {
  item.tags = [item.type];
}

const SVG_EXPAND = `<path d="M10 7 H7 V10"/><path d="M14 7 H17 V10"/><path d="M14 17 H17 V14"/><path d="M10 17 H7 V14"/>`;
const SVG_COLLAPSE = `<path d="M7 10 H10 V7"/><path d="M17 10 H14 V7"/><path d="M17 14 H14 V17"/><path d="M7 14 H10 V17"/>`;

function syncPageFullBtn(){
  fullSvg.innerHTML = document.fullscreenElement ? SVG_COLLAPSE : SVG_EXPAND;
}

// 页面全局全屏按钮，增加横屏锁定
fullBtn.onclick = async ()=>{
  try{
    if(!document.fullscreenElement){
      await document.documentElement.requestFullscreen();
      if(screen.orientation?.lock){
        screen.orientation.lock('landscape').catch(e=>console.log('页面横屏锁定失败',e));
      }
    }else{
      await document.exitFullscreen();
      if(screen.orientation?.unlock) screen.orientation.unlock();
    }
  }catch(err){
    console.warn('页面全屏失败:', err);
  }
  syncPageFullBtn();
};
document.addEventListener('fullscreenchange', syncPageFullBtn);

function toggleCardHead(btn){
  const box = btn.closest('.card-head');
  box.classList.toggle('collapsed');
  btn.textContent = box.classList.contains('collapsed') ? "+" : "−";
}

// ===================== 从编辑器完整复刻核心轮播解析函数（不要修改内部代码） =====================
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function mdToHtml(s){
  // 解析 ::slide + ::intro 轮播标记，转换成carousel-render结构
  s = s.replace(/::slide\n([\s\S]*?)\n::end/g, (_, inner) => {
    const items = [];
    // 以图片标签分割区块，清除空内容
    inner.trim().split(/(?=!\[.*?\]\()/).filter(Boolean).forEach(chunk => {
      const m = chunk.match(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)/);
      if (!m) return;

      // 修复：匹配多行intro，直到下一张图片/轮播结束为止
      const introMatch = chunk.match(/::intro\s+([\s\S]*?)(?=\n!\[|\n::end|$)/);
      const intro = introMatch ? introMatch[1].trim() : '';

      items.push({
        alt: m[1] || '',
        url: m[2],
        intro: intro
      });
    });

    if (!items.length) return '';
    const slides = items.map(it =>
      `<div class="slide"><img src="${it.url}" alt="${escapeHtml(it.alt)}" loading="lazy">${it.intro ? `<div class="intro"><b>${escapeHtml(it.alt||'图')}</b>${escapeHtml(it.intro)}</div>` : ''}</div>`
    ).join('');
    const dots = items.map((_, i) => `<button class="dot ${i===0?'active':''}" data-idx="${i}" aria-label="第${i+1}张"></button>`).join('');
    return `<div class="carousel-render" data-idx="0">` +
           `<div class="counter" style="display:${items.length>1?'block':'none'}">1 / ${items.length}</div>` +
           `<div class="track">${slides}</div>` +
           (items.length>1 ? `<button class="arrow prev" aria-label="上一张">‹</button><button class="arrow next" aria-label="下一张">›</button>` : '') +
           (items.length>1 ? `<div class="dots">${dots}</div>` : '') +
           `</div>`;
  });

  // 常规Markdown转HTML（这部分原样保留，未改动）
  let html=s.replace(/```([\s\S]*?)```/g,'<pre style="background:#f5f5f5;padding:8px;border-radius:6px;white-space:pre-wrap;"><code>$1</code></pre>');
  html=html.replace(/(^|\n)(\|.+\|\n)((?:\|[-:| ]+\|)(?:\n|$))+(\|.+\|)/g,(_,pre,hRow,sep,cRow)=>{
    const rows=(hRow+sep+cRow).split('\n').filter(r=>r.trim());
    let table='<table style="width:100%;border-collapse:collapse;margin:6px 0;"><tr>';
    rows[0].split('|').filter(s=>s.trim()).forEach(t=>table+=`<th style="border:1px solid #999;padding:4px 6px;">${t.trim()}</th>`);
    table+='</tr>';
    for(let i=1;i<rows.length;i++){
      table+='<tr>';
      rows[i].split('|').filter(s=>s.trim()).forEach(t=>table+=`<td style="border:1px solid #999;padding:4px 6px;">${t.trim()}</td>`);
      table+='</tr>';
    }
    return pre+table+'</table>';
  });
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>').replace(/^\- (.+)$/gm,'<li>$1</li>')
    .replace(/!\[(.*?)\]\((https?:\/\/[^\s)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;margin:6px 0;display:block;">');
  return html.replace(/\n/g,'<br>');
}

// 初始化单个轮播
function initOneCarousel(el){
  if (el.__inited) return;
  el.__inited = true;
  const track = el.querySelector('.track');
  const slides = el.querySelectorAll('.slide');
  const dots = el.querySelectorAll('.dot');
  const prev = el.querySelector('.arrow.prev');
  const next = el.querySelector('.arrow.next');
  const counter = el.querySelector('.counter');
  const total = slides.length;
  if (total <= 1) return;

  let idx = 0;
  let autoplay = null;
  const INTERVAL = 4500;

  function show(i){
    idx = (i + total) % total;
    track.style.transform = `translateX(-${idx*100}%)`;
    dots.forEach((d,j)=>d.classList.toggle('active', j===idx));
    if (counter) counter.textContent = `${idx+1} / ${total}`;
  }
  function start(){ stop(); autoplay = setInterval(()=> show(idx+1), INTERVAL); }
  function stop(){ if (autoplay){ clearInterval(autoplay); autoplay=null; } }

  prev && (prev.onclick = ()=>{ show(idx-1); start(); });
  next && (next.onclick = ()=>{ show(idx+1); start(); });
  dots.forEach(d => d.onclick = ()=>{ show(+d.dataset.idx); start(); });
  el.addEventListener('mouseenter', stop);
  el.addEventListener('mouseleave', start);
  el.addEventListener('click', e => {
    if (e.target.closest('.arrow')||e.target.closest('.dot')) return;
    show(idx+1); start();
  });

  // 移动端触摸左右滑动
  let sx=0, dx=0, dragging=false;
  el.addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; dragging=true; stop(); }, {passive:true});
  el.addEventListener('touchmove',  e=>{ if(!dragging) return; dx=e.touches[0].clientX - sx; }, {passive:true});
  el.addEventListener('touchend',   ()=>{
    if (!dragging) return;
    dragging = false;
    if (Math.abs(dx) > 50) show(idx + (dx<0?1:-1));
    dx = 0;
    start();
  });

  start();
}

// 批量初始化页面所有轮播
function initAllCarousels(scope){
  (scope||document).querySelectorAll('.carousel-render').forEach(el => initOneCarousel(el));
}
// ===================== 轮播代码结束 =====================

/* ============ 代码块全屏(兼容手机+横屏) ============ */
function createCodeToolbar(pre){
  if(pre.querySelector('.code-toolbar')) return;

  const toolbar = document.createElement('div');
  toolbar.className = 'code-toolbar';

  let fontSize = parseInt(getComputedStyle(pre).fontSize) || 14;

  // A+ 放大
  const plus = document.createElement('button');
  plus.className = 'code-btn';
  plus.textContent = 'A+';
  plus.onclick = (e)=>{
    e.stopPropagation();
    fontSize = Math.min(fontSize + 2, 32);
    pre.style.fontSize = fontSize + 'px';
  };
  toolbar.appendChild(plus);

  // A- 缩小
  const minus = document.createElement('button');
  minus.className = 'code-btn';
  minus.textContent = 'A-';
  minus.onclick = (e)=>{
    e.stopPropagation();
    fontSize = Math.max(fontSize - 2, 10);
    pre.style.fontSize = fontSize + 'px';
  };
  toolbar.appendChild(minus);

  // 全屏/退出全屏（带横竖屏切换）
  const fullBtnCode = document.createElement('button');
  fullBtnCode.className = 'code-btn code-full-btn';
  fullBtnCode.textContent = '全屏';

  function syncBtnText(){
    const inFs = (document.fullscreenElement === pre)
              || pre.classList.contains('pre-mobile-fullscreen');
    fullBtnCode.textContent = inFs ? '退出全屏' : '全屏';
  }

  fullBtnCode.onclick = async (e)=>{
    e.stopPropagation();
    e.preventDefault();
    try{
      const inFs = (document.fullscreenElement === pre)
                || pre.classList.contains('pre-mobile-fullscreen');
      if(!inFs){
        // 进入全屏
        if(API_FULLSCREEN_SUPPORTED && pre.requestFullscreen){
          await pre.requestFullscreen();
          // 锁定横屏
          if(screen.orientation?.lock){
            screen.orientation.lock('landscape').catch(err=>{
              console.log("原生横屏锁定被浏览器限制，自动使用CSS旋转方案",err)
            });
          }
        }else{
          // iOS / 微信QQ内置浏览器：CSS旋转模拟横屏
          pre.classList.add('pre-mobile-fullscreen');
          document.body.style.overflow = 'hidden';
        }
      }else{
        // 退出全屏，恢复竖屏
        if(API_FULLSCREEN_SUPPORTED && document.fullscreenElement === pre){
          await document.exitFullscreen();
          if(screen.orientation?.unlock) screen.orientation.unlock();
        }else{
          pre.classList.remove('pre-mobile-fullscreen');
          document.body.style.overflow = '';
          if(screen.orientation?.unlock) screen.orientation.unlock();
        }
      }
    }catch(err){
      console.warn('代码块全屏失败,回落 CSS 横屏方案:', err);
      pre.classList.add('pre-mobile-fullscreen');
      document.body.style.overflow = 'hidden';
    }
    syncBtnText();
    setTimeout(syncBtnText, 200);
  };
  toolbar.appendChild(fullBtnCode);

  // 复制按钮 统一放进工具栏
  const copyBtn = document.createElement('button');
  copyBtn.className = 'code-btn';
  copyBtn.textContent = '复制';
  copyBtn.dataset.code = pre.innerText;
  copyBtn.onclick = (e)=>{
    e.stopPropagation();
    const codeText = copyBtn.dataset.code;
    navigator.clipboard.writeText(codeText).then(()=>{
      copyBtn.textContent = "已复制";
      setTimeout(()=> copyBtn.textContent = "复制", 1200);
    }).catch(()=>{
      const textarea = document.createElement('textarea');
      textarea.value = codeText;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      copyBtn.textContent = "已复制";
      setTimeout(()=> copyBtn.textContent = "复制", 1200);
    });
  };
  toolbar.appendChild(copyBtn);

  pre.appendChild(toolbar);

  document.addEventListener('fullscreenchange', () => {
    if(!document.fullscreenElement && !document.querySelector('.pre-mobile-fullscreen')){
      document.body.style.overflow = '';
      // 兜底解锁屏幕方向
      if(screen.orientation?.unlock) screen.orientation.unlock();
    }
    syncBtnText();
  });
}

function injectCopyBtn(){
  document.querySelectorAll('.card-content pre').forEach(createCodeToolbar);
}

function getTagClassByName(name) {
  switch(name) {
    case 'note': return 'tag-note';
    case 'doc': return 'tag-doc';
    case '编程': return 'tag-编程';
    default: return 'tag-custom';
  }
}

function getTagStyle(tagName, colorMap) {
  const color = (colorMap && colorMap[tagName]) || '';
  if (color) {
    const r = parseInt(color.slice(1,3), 16) / 255;
    const g = parseInt(color.slice(3,5), 16) / 255;
    const b = parseInt(color.slice(5,7), 16) / 255;
    const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
    const textColor = brightness > 0.5 ? '#222' : '#fff';
    return `background-color:${color};color:${textColor};`;
  }
  return '';
}

function render(){
  if(!item){
    wrap.innerHTML = `<div style="text-align:center;padding:60px;color:#888;">笔记不存在</div>`;
    return;
  }
  const tagHtml = (item.tags || []).map(tag => {
    const cls = getTagClassByName(tag);
    return `<span class="tag ${cls}" data-tag="${tag}" style="${getTagStyle(tag, item.tagColors)}">${tag}</span>`;
  }).join('');

  // 清理旧渲染残留样式
  let cleanContent = item.content
  .replace(/(<div class="track")\s+style="transform:[^"]*"/g, '$1')
  .replace(/(<button class="dot)( active)/g, '$1');

  // 关键：使用mdToHtml转换内容（解析::slide轮播标记）
  const htmlStr = mdToHtml(cleanContent);

  // ===================== 这里清空，删掉所有replace替换代码 =====================

  wrap.innerHTML = `
    <div class="card-head">
      <div class="card-title">${item.title}</div>
      <div class="card-meta-row">
        <span class="card-date">${item.date}</span>
        <div class="tag-group">${tagHtml}</div>
        <button class="collapse-head-btn" onclick="toggleCardHead(this)">−</button>
      </div>
    </div>
    <div class="card-content">${htmlStr}</div>
  `;
  injectCopyBtn();

  // 初始化所有轮播组件
  setTimeout(()=>{
    initAllCarousels(document.body);
    // 把补全intro的逻辑放到DOM渲染完成后执行，不会破坏字符串解析
    fillCarouselIntroAfterRender();
  }, 120);
}

// 新增：DOM加载完成后，遍历元素补全intro，最安全不会破坏HTML字符串
function fillCarouselIntroAfterRender(){
  document.querySelectorAll('.carousel-render .slide').forEach(slide => {
    // 如果已经有intro就跳过
    if(slide.querySelector('.intro')) return;
    const img = slide.querySelector('img');
    if(!img) return;
    const altText = img.getAttribute('alt')?.trim() || '';
    if(!altText) return;
    // 插入和编辑器一模一样的intro结构
    const introDiv = document.createElement('div');
    introDiv.className = 'intro';
    introDiv.innerHTML = `<b>${escapeHtml(altText)}</b>`;
    slide.appendChild(introDiv);
  });
}

// 保留末尾执行调用，不能删
render();
</script>
